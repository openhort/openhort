worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 30;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Large buffers for JPEG stream frames
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    upstream app {
        server host.docker.internal:8940;
        keepalive 32;
    }

    server {
        listen 8950 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Auto-retry page shown during uvicorn --reload restarts
        location @reloading {
            default_type text/html;
            return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Reloading...</title><style>body{background:#1a1a2e;color:#aaa;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}.box{text-align:center}.spinner{width:32px;height:32px;border:3px solid #0f3460;border-top-color:#e94560;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><div class="box"><div class="spinner"></div><div>Server restarting&hellip;</div></div><script>setTimeout(()=>location.reload(),1000)</script></body></html>';
        }

        # Pages — show retry page on 502/503 (server restarting)
        location / {
            error_page 502 503 @reloading;

            proxy_pass http://app;
            proxy_connect_timeout 2s;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
            proxy_buffering off;
        }

        # Static assets — pass 502 through (no retry page for JS/CSS)
        location /static/ {
            proxy_pass http://app;
            proxy_connect_timeout 2s;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
