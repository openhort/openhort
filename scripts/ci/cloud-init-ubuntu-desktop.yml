#cloud-config
# Ubuntu Desktop VM for openhort testing
# Installs: XFCE desktop, xrdp (for remote access), openhort + all deps

package_update: true
package_upgrade: true

packages:
  # Desktop environment (lightweight)
  - xfce4
  - xfce4-goodies
  - xfce4-terminal
  # Remote desktop
  - xrdp
  # X11 virtual framebuffer
  - xvfb
  # X11 tools for openhort
  - wmctrl
  - xdotool
  - imagemagick
  - x11-utils
  - x11-apps
  # Python
  - python3.12
  - python3.12-venv
  - python3-pip
  - python3.12-dev
  # Build tools
  - gcc
  - g++
  - pkg-config
  - git
  # Misc
  - curl
  - dbus-x11

write_files:
  - path: /opt/openhort/install.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      echo "=== Installing openhort ==="

      # Create venv owned by hortuser
      python3.12 -m venv /opt/openhort/venv
      source /opt/openhort/venv/bin/activate

      # Install deps
      pip install --upgrade pip
      pip install "git+https://github.com/Alyxion/llming-com.git@main"
      pip install httpx aiogram

      # Clone and install openhort
      git clone https://github.com/openhort/openhort.git /opt/openhort/src || true
      cd /opt/openhort/src
      git checkout feature/linux-support || true
      pip install -e .

      # Create logs dir
      mkdir -p /opt/openhort/src/logs

      echo "=== openhort installed ==="

  - path: /etc/systemd/system/openhort-desktop.service
    content: |
      [Unit]
      Description=openhort virtual desktop (Xvfb + XFCE)
      After=network.target

      [Service]
      Type=forking
      User=hortuser
      Environment=HOME=/home/hortuser
      ExecStart=/opt/openhort/start-desktop.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/openhort.service
    content: |
      [Unit]
      Description=openhort server
      After=network.target openhort-desktop.service
      Requires=openhort-desktop.service

      [Service]
      Type=simple
      User=hortuser
      Environment=DISPLAY=:10
      Environment=LLMING_AUTH_SECRET=openhort-test
      ExecStart=/opt/openhort/venv/bin/python -m uvicorn hort.app:app --host 0.0.0.0 --port 8940
      WorkingDirectory=/opt/openhort/src
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

  - path: /opt/openhort/start-desktop.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      # Start a persistent X session for openhort to capture
      /usr/bin/Xvfb :10 -screen 0 1920x1080x24 -ac &
      sleep 2
      DISPLAY=:10 /usr/bin/startxfce4 &
      sleep 3
      DISPLAY=:10 /usr/bin/xfce4-terminal --geometry=100x30+50+50 &
      echo "Desktop session ready on DISPLAY=:10"

runcmd:
  # Create openhort user
  - useradd -m -s /bin/bash -G sudo hortuser
  - echo "hortuser:OpenHort2026!" | chpasswd

  # Configure xrdp to use XFCE
  - systemctl enable xrdp
  - systemctl start xrdp
  - |
    echo "xfce4-session" > /home/hortuser/.xsession
    chown hortuser:hortuser /home/hortuser/.xsession

  # Install openhort (as hortuser so venv perms are correct)
  - chown -R hortuser:hortuser /opt/openhort
  - sudo -u hortuser bash /opt/openhort/install.sh

  # Start desktop + openhort services
  - systemctl daemon-reload
  - systemctl enable openhort-desktop openhort
  - systemctl start openhort-desktop
  - sleep 3
  - systemctl start openhort

  - echo "=== VM ready ==="
