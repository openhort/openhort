    function dropToNewDesktop(e){
      if(!_dragW||!_dragDesk)return;
      const name='Desktop '+(desktops.length);
      const nd={id:'d_'+Date.now(),name,isHome:false,tint:desktops.length%desktopTints.length,widgets:[]};
      _dragDesk.widgets=_dragDesk.widgets.filter(w=>w.id!==_dragW.id);
      _dragW.order=0;
      nd.widgets.push(_dragW);
      desktops.push(nd);
      deskIdx.value=desktops.length-1;
      showT('Created "'+name+'"');
      _dragW=null;_dragDesk=null;
    }
    function dropToTrash(e){
      if(!_dragW||!_dragDesk)return;
      _dragDesk.widgets=_dragDesk.widgets.filter(w=>w.id!==_dragW.id);
      showT('Widget removed');
      _dragW=null;_dragDesk=null;
    }

    // Drag-to-resize
    function resizeStart(e,w,axis){
      e.preventDefault();
      const startX=e.clientX,startY=e.clientY;
      const [cols,rows]=w.size.split('x').map(Number);
      const threshold=30;

      function onMove(ev){
        const dx=ev.clientX-startX,dy=ev.clientY-startY;
        if(axis==='w'){
          const newCols=dx>threshold?2:dx<-threshold?1:cols;
          w.size=newCols+'x'+rows;
          if(w.pos)w.pos.w=newCols;
        }else{
          const newRows=dy>threshold?2:dy<-threshold?1:rows;
          w.size=cols+'x'+newRows;
          if(w.pos)w.pos.h=newRows;
        }
      }
      function onUp(){
        document.removeEventListener('pointermove',onMove);
        document.removeEventListener('pointerup',onUp);
      }
      document.addEventListener('pointermove',onMove);
      document.addEventListener('pointerup',onUp);
    }
    function gridLpE(){clearTimeout(_glp)}

    function openPicker(){pickerSearch.value='';pickerCat.value=null;lensMode.value=null;picker.value=true}

    // Favorites: top llmings that are active
    const favWidgets=computed(()=>catalog.filter(c=>['system-monitor','llming-lens','llming-wire'].includes(c.id)).map(c=>({id:c.id,name:c.name,iconClass:c.iconClass,cat:c})));
    // Recents: last 3 added widget types (deduped)
    const recentWidgets=computed(()=>{
      const seen=new Set();
      return recentAdds.filter(r=>{if(seen.has(r.key))return false;seen.add(r.key);return true}).slice(0,4);
    });

    function onGridCtx(e){
      if(dragW.value||swipeDrag.value||_sw)return; // no context menu while any drag active
      gridCtx.x=Math.min(e.clientX,innerWidth-240);
      gridCtx.y=Math.min(e.clientY,innerHeight-300);
      gridCtx.open=true;
    }
    function addFromFav(f){addFromCat(f.cat)}
    function addFromRecent(r){addW(r.type,r.extId,r.subId,r.size,{...r.c})}
    function openScreenPicker(){screenPicker.value=true}
    function addScreenWidget(scr){addW('extension-sub','llming-lens',scr.id,'1x1',{title:scr.app,iconClass:scr.iconClass,iconColor:scr.color,screenName:scr.title})}
    function onWCtx(e,w,desk){if(dragW.value||swipeDrag.value||_sw)return;wctx.x=Math.min(e.clientX,innerWidth-200);wctx.y=Math.min(e.clientY,innerHeight-250);wctx.w=w;wctx.desk=desk;wctx.open=true}

    function addW(type,extId,subId,size,c){
      const d=activeDesktop.value;
      const sz=size.replace(/\u00d7/g,'x');
      d.widgets.push({id:wid(),type,extId,subId,size:sz,order:d.widgets.length,c:c||{},borderStyle:{}});
      // Track recent
      const key=type+':'+(extId||'')+'/'+(subId||'');
      recentAdds.unshift({key,name:c?.title||extId||type,iconClass:c?.iconClass||'ph ph-puzzle-piece',type,extId,subId,size:sz,c:{...c}});
      if(recentAdds.length>10)recentAdds.length=10;
      showT('Widget added');
    }
    function addFromCat(cat){
      addW('extension',cat.extId,null,cat.defaultSize.replace(/\u00d7/g,'x'),{...cat.c});
    }
    function addSubWidget(cat,child){
      addW('extension-sub',cat.extId,child.id,
        (child.size||'1\u00d71').replace(/\u00d7/g,'x'),
        {title:child.name,iconClass:child.iconClass||cat.iconClass,screenName:child.name});
    }
    function rmW(w,desk){desk.widgets=desk.widgets.filter(x=>x.id!==w.id);showT('Widget removed')}
    function spawnClaude(){const n='claude_'+Math.random().toString(36).slice(2,5);addW('terminal',null,n,'1x2',{title:n,iconClass:'ph ph-terminal-window',iconColor:'var(--purple)',state:'idle',idle:0,output:'$ claude\n\nWelcome! How can I help?'})}
    function spawnTerm(){addW('terminal',null,'shell','1x1',{title:'Terminal',iconClass:'ph ph-terminal',state:'idle',output:'$ \nReady.'})}
    function addDesk(){nameEd.value={title:'New Desktop',value:'',btn:'Create',save:()=>{const n=nameEd.value.value.trim()||'Desktop '+desktops.length;desktops.push({id:'d_'+Date.now(),name:n,isHome:false,tint:desktops.length%desktopTints.length,widgets:[]});deskIdx.value=desktops.length-1;nameEd.value=null;showT('"'+n+'" created')}}}
    function editDesktopName(){const d=activeDesktop.value;if(d.isHome)return;nameEd.value={title:'Rename Desktop',value:d.name,btn:'Save',save:()=>{d.name=nameEd.value.value.trim()||d.name;nameEd.value=null}}}
    function onTap(w){showT('Opening '+(w.c.title||w.type)+'...')}
    function onWidgetClick(w){
      if(selectedWidget.value===w.id){
        // Second tap — open it
        selectedWidget.value=null;
        onTap(w);
      }else{
        // First tap — select (show resize handles)
        selectedWidget.value=w.id;
      }
    }
    function showT(m){toast.value=m;clearTimeout(_tt);_tt=setTimeout(()=>{toast.value=''},2000)}

    function onKey(e){
      if(e.key==='Escape'){
        if(deviceView.value){deviceView.value=false;return}
        if(zoomedOut.value){zoomedOut.value=false;return}
        editMode.value=false;picker.value=false;drawer.value=false;nameEd.value=null;wctx.open=false;gridCtx.open=false;selectedWidget.value=null;
      }
      if(e.key==='ArrowLeft'&&deskIdx.value>0&&!picker.value&&!drawer.value)deskIdx.value--;
      if(e.key==='ArrowRight'&&deskIdx.value<desktops.length-1&&!picker.value&&!drawer.value)deskIdx.value++;
    }
    onMounted(()=>{
      document.addEventListener('keydown',onKey);
    });
    onUnmounted(()=>document.removeEventListener('keydown',onKey));

    return{drawer,picker,pickerSearch,pickerCat,dwSearch,editMode,deskIdx,toast,nameEd,viewers,wctx,gridCtx,
      fabOpen,screenPicker,screens,
      lensMode,lensWinSearch,lensFilterText,lensFilters,lensFilterSize,lensWinSize,lensScreens,filteredLensWindows,selectedLensWindows,lensAllFilterMatches,
      hortGroups,getHortGroup,getGroupedWidgets,desktopTints,widgetStyle,widgetGridStyle,viewportStyle,colOffset,
      gridCells,dragW,dragGhost,onDragStart,onDrop,onGridDragOver,onGridDrop,
      desktops,activeDesktop,lemmingColor,trackStyle,getWidgets,cpu,spark,timeStr,llmings,catalog,filteredCatalog,activeCatData,dwResults,
      favWidgets,recentWidgets,
      selectedWidget,zoomedOut,overviewDrop,lpCircle,trackEl,vpEl,swipeDrag,ovCardW,ovCardH,ovScale,ovContentW,ovContentH,
      deviceView,activeDevice,devices,pullDown,deviceHeaderH,pageEls,
      mSwWheel,lpS,lpE,gridLpS,gridLpE,dotLpS,dotLpE,dotEls,dotTrackClick,openPicker,openScreenPicker,onGridCtx,onWCtx,onTap,onWidgetClick,
      addW,addFromCat,addFromFav,addFromRecent,addSubWidget,addScreenWidget,addSelectedWindows,addMultiFilterWidget,addFilterTag,rmW,
      spawnClaude,spawnTerm,addDesk,editDesktopName,showT,
      dropToDesktop,dropToNewDesktop,dropToTrash,resizeStart}
  }
}).mount('#app');
</script>
</body>
</html>
