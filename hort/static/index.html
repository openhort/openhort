<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- manifest loaded dynamically to avoid 401 through proxy -->
<link rel="icon" href="api/icon/192" type="image/png">
<link rel="apple-touch-icon" href="api/icon/192">
<title>hort</title>
<link rel="stylesheet" href="static/vendor/phosphor/regular.css">
<link rel="stylesheet" href="static/vendor/phosphor/bold.css">
<link rel="stylesheet" href="static/vendor/phosphor/fill.css">
<link rel="stylesheet" href="static/vendor/material-icons.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,700;1,700&display=swap">
<link rel="stylesheet" href="static/vendor/quasar.prod.css">
<link rel="stylesheet" href="static/vendor/xterm.css">
<link rel="stylesheet" href="static/hort.css">
</head>
<body>

<div id="q-app">
  <hort-app></hort-app>
</div>

<script src="static/vendor/xterm.min.js"></script>
<script src="static/vendor/xterm-addon-fit.min.js"></script>
<script src="static/vendor/xterm-addon-web-links.min.js"></script>
<script src="static/vendor/vue.global.prod.js"></script>
<script src="static/vendor/quasar.umd.prod.js"></script>
<script src="static/vendor/hort-ext.js"></script>
<script src="static/vendor/hort-widgets.js"></script>
<script src="static/vendor/hort-plugins-ui.js"></script>
<!-- Connector extension panels -->
<script src="ext/lan_connector/static/panel.js"></script>
<script src="ext/cloud_connector/static/panel.js"></script>
<script src="ext/telegram_connector/static/panel.js"></script>
<script>
(function () {
  'use strict';

  const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted, nextTick, toRaw } = Vue;

  // Detect proxy base path from <base> tag (injected by access server)
  const _baseEl = document.querySelector('base');
  const _basePath = _baseEl ? new URL(_baseEl.href).pathname.replace(/\/$/, '') : '';

  function wsUrl(path) {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}${_basePath}${path}`;
  }

  // Prefix API paths with base path (for cloud proxy support)
  function apiUrl(path) { return _basePath + path; }
  window.__hortBasePath = _basePath;
  window.__hortState = null; // set after state is created

  // ===== STREAM SETTINGS PERSISTENCE (IndexedDB) =====
  const _STREAM_DB = 'hort-stream-settings';
  const _STREAM_STORE = 'config';
  const _STREAM_KEY = 'streaming';
  const _STREAM_FIELDS = ['quality', 'fps', 'maxWidth', 'codec'];

  function _openStreamDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(_STREAM_DB, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(_STREAM_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function _saveStreamSettings(st) {
    try {
      const db = await _openStreamDB();
      const tx = db.transaction(_STREAM_STORE, 'readwrite');
      const obj = {};
      for (const k of _STREAM_FIELDS) obj[k] = st[k];
      tx.objectStore(_STREAM_STORE).put(obj, _STREAM_KEY);
      db.close();
    } catch (e) { /* IndexedDB not available */ }
  }

  async function _loadStreamSettings() {
    try {
      const db = await _openStreamDB();
      return new Promise((resolve) => {
        const tx = db.transaction(_STREAM_STORE, 'readonly');
        const req = tx.objectStore(_STREAM_STORE).get(_STREAM_KEY);
        req.onsuccess = () => { db.close(); resolve(req.result || null); };
        req.onerror = () => { db.close(); resolve(null); };
      });
    } catch (e) { return null; }
  }

  // ===== SHARED STATE =====
  const state = reactive({
    // Connection
    sessionId: null,
    _pendingStreamWindow: null,
    controlWs: null,
    streamWs: null,
    connected: false,
    serverVersion: '',

    // P2P connection health (updated by viewer.html ping/pong)
    p2pConnected: false,
    p2pRttMs: 0,
    p2pRemoteIp: '',
    p2pSessionNum: 0,
    p2pTotalSessions: 0,
    p2pHealthy: true,  // false when RTT > 2000ms
    mseActive: false,  // true when VP8/VP9 MSE is rendering

    // View: 'picker' | 'viewer' | 'terminal'
    view: 'picker',

    // Targets
    targets: [],          // [{id, name, provider_type, status}]
    activeTarget: 'all',  // 'all' or a target id

    // Terminals
    terminals: [],        // [{terminal_id, target_id, title, alive}]
    activeTerminalId: null,

    // Session
    isLocal: true,  // true = direct access, false = through proxy

    // Connectors (only shown when local)
    connectors: {
      lan: { active: false, ip: '', http_url: '', https_url: '', qr: '' },
      cloud: { active: false, server_url: '' },
      messaging: {},  // {telegram: {active, token_set, allowed_users, polling, plugin_id}, ...}
    },
    connectorPanelOpen: null,  // null | 'lan' | 'cloud' | 'telegram'
    sidebarOpen: false,

    // Windows
    allWindows: [],
    navWindows: [],
    navIndex: 0,
    appNames: [],
    appFilter: '',

    // Groups
    navMode: 'all', // 'all' | 'app' | group name
    activeGroupName: null,

    // Spaces
    spacesData: { spaces: [], current: 1, count: 0 },

    // Viewer
    activeMode: false,
    fitMode: 'auto', // 'auto' | 'vertical' | 'custom'
    scale: 1,
    tx: 0,
    ty: 0,
    imgNatW: 0,
    imgNatH: 0,

    // Stream
    streamBlobUrl: null,
    prevBlobUrl: null,
    frameCount: 0,
    fpsText: '',
    observerCount: 0,

    // Settings
    quality: 70,
    fps: 15,
    maxWidth: 1920,
    codec: 'jpeg',  // 'jpeg', 'vp8', 'vp9'
    settingsOpen: false,

    // Overview
    overviewOpen: false,

    // Group modal
    groupModalOpen: false,
    groupModalTitle: 'New Group',
    groupModalName: '',
    groupModalEditing: null,
    groupModalCallback: null,

    // Thumbnails (for cache busting)
    thumbCounter: 0,

    // Extension panels
    extensionPanels: [],
  });
  window.__hortState = state;

  // Restore stream settings from IndexedDB
  _loadStreamSettings().then(saved => {
    if (saved) {
      for (const k of _STREAM_FIELDS) {
        if (saved[k] !== undefined) state[k] = saved[k];
      }
    }
  });

  // ===== PERSISTENCE HELPERS =====
  function loadGroups() {
    try { return JSON.parse(localStorage.getItem('llming-groups') || '{}'); } catch { return {}; }
  }
  function saveGroups(g) { localStorage.setItem('llming-groups', JSON.stringify(g)); }

  function saveWindowState(winId) {
    if (!winId) return;
    const states = loadAllWindowStates();
    states[winId] = { scale: state.scale, tx: state.tx, ty: state.ty, fitMode: state.fitMode };
    localStorage.setItem('llming-wstates', JSON.stringify(states));
  }
  function loadWindowState(winId) {
    return loadAllWindowStates()[winId] || null;
  }
  function loadAllWindowStates() {
    try { return JSON.parse(localStorage.getItem('llming-wstates') || '{}'); } catch { return {}; }
  }

  // ===== CONTROL WS =====
  let pendingRequests = {};
  let requestId = 0;
  let heartbeatTimer = null;
  let reconnectTimer = null;

  function sendControl(msg) {
    if (state.controlWs && state.controlWs.readyState === WebSocket.OPEN) {
      state.controlWs.send(JSON.stringify(msg));
    }
  }

  function sendControlRequest(msg) {
    return new Promise((resolve) => {
      const id = ++requestId;
      pendingRequests[id] = resolve;
      msg._req_id = id;
      sendControl(msg);
      // Timeout after 10s
      setTimeout(() => {
        if (pendingRequests[id]) {
          delete pendingRequests[id];
          resolve(null);
        }
      }, 10000);
    });
  }

  async function initSession() {
    try {
      const resp = await fetch(apiUrl('/api/session'), { method: 'POST' });
      const data = await resp.json();
      state.sessionId = data.session_id;
      state.isLocal = data.is_local !== false;
      connectControlWs();
      // Fetch connectors if local
      if (state.isLocal) fetchConnectors();
    } catch (e) {
      console.error('Failed to create session:', e);
      setTimeout(initSession, 2000);
    }
  }

  let _cloudOptimisticUntil = 0;

  async function fetchConnectors() {
    try {
      const resp = await fetch(apiUrl('/api/connectors'));
      if (resp.ok) {
        const data = await resp.json();
        // Preserve optimistic cloud state while tunnel is still connecting
        if (_cloudOptimisticUntil > Date.now() && !data.cloud.active) {
          data.cloud = state.connectors.cloud;
        }
        if (!data.messaging) data.messaging = {};
        state.connectors = data;
      }
    } catch {}
  }

  function connectControlWs() {
    if (state.controlWs) {
      state.controlWs.close();
      state.controlWs = null;
    }
    const ws = new WebSocket(wsUrl(`/ws/control/${state.sessionId}`));
    state.controlWs = ws;

    ws.onopen = () => {
      state.connected = true;
      startHeartbeat();
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleControlMessage(msg);
      } catch {}
    };

    ws.onclose = () => {
      state.connected = false;
      stopHeartbeat();
      // Reconnect
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        if (state.sessionId) connectControlWs();
      }, 1000);
    };

    ws.onerror = () => {};
  }

  function handleControlMessage(msg) {
    // Check if this is a response to a pending request
    if (msg._req_id && pendingRequests[msg._req_id]) {
      pendingRequests[msg._req_id](msg);
      delete pendingRequests[msg._req_id];
      // Still process the message for side effects
    }

    switch (msg.type) {
      case 'connected':
        state.serverVersion = msg.version || '';
        requestTargets();
        requestTerminalList();
        sendControl({ type: 'tunnel_status' });
        break;
      case 'windows_list':
        handleWindowsList(msg);
        break;
      case 'thumbnail':
        handleThumbnail(msg);
        break;
      case 'status':
        state.observerCount = msg.observers || 0;
        break;
      case 'spaces':
        handleSpaces(msg);
        break;
      case 'space_switched':
        if (msg.ok) {
          requestSpaces();
          requestWindows();
        }
        break;
      case 'stream_config_ack':
        break;
      case 'codec_change':
        // Server switched codec — reset client frame tracking (seq restarts from 0)
        console.log('[codec_change] → ' + msg.codec + ', resetting seq from ' + _lastRenderedSeq);
        _lastRenderedSeq = -1;
        _pendingFrame = null;
        _clientStreamStart = 0;
        _serverTimeOffset = 0;
        break;
      case 'stream_error':
        handleStreamError(msg);
        break;
      case 'targets_list':
        state.targets = msg.targets || [];
        state.activeTarget = msg.active || 'all';
        break;
      case 'target_changed':
        // Server acknowledges target change — already handled client-side
        break;
      case 'terminal_spawned':
        state.terminals.push({
          terminal_id: msg.terminal_id,
          target_id: msg.target_id,
          title: msg.title,
          alive: true,
        });
        state.activeTerminalId = msg.terminal_id;
        state.view = 'terminal';
        break;
      case 'terminal_list':
        state.terminals = msg.terminals || [];
        break;
      case 'terminal_closed':
        state.terminals = state.terminals.filter(t => t.terminal_id !== msg.terminal_id);
        if (state.activeTerminalId === msg.terminal_id) {
          state.activeTerminalId = null;
          if (state.view === 'terminal') state.view = 'picker';
        }
        break;
      case 'tunnel_status':
        state.connectors.cloud = {
          active: msg.active || false,
          server_url: msg.server_url || '',
        };
        break;
      case 'token_created':
      case 'token_list':
      case 'token_verified':
      case 'tokens_revoked':
        // Handled by extension/plugin that requested them
        break;
      case 'heartbeat_ack':
        break;
    }
  }

  function startHeartbeat() {
    stopHeartbeat();
    heartbeatTimer = setInterval(() => {
      sendControl({ type: 'heartbeat' });
    }, 15000);
  }

  function stopHeartbeat() {
    clearInterval(heartbeatTimer);
  }

  // ===== TARGETS =====

  function requestTargets() {
    sendControl({ type: 'list_targets' });
  }

  function setTarget(targetId) {
    // Target switching is client-side only — no server round-trip needed.
    // We already have all windows from all targets in allWindows.
    state.activeTarget = targetId;
    computeNavWindows();
  }

  // ===== TERMINAL =====

  function spawnTerminal(targetId) {
    sendControl({ type: 'terminal_spawn', target_id: targetId });
  }

  function closeTerminal(terminalId) {
    sendControl({ type: 'terminal_close', terminal_id: terminalId });
  }

  function requestTerminalList() {
    sendControl({ type: 'terminal_list' });
  }

  // ===== WINDOW LIST =====
  let thumbnailCache = {};

  function requestWindows() {
    sendControl({ type: 'list_windows', app_filter: state.appFilter || '' });
  }

  function handleWindowsList(msg) {
    const newWindows = msg.windows || [];
    const newNames = msg.app_names || [];
    // Only update if data actually changed — prevents unnecessary re-renders
    const oldIds = state.allWindows.map(w => w.window_id).join(',');
    const newIds = newWindows.map(w => w.window_id).join(',');
    if (oldIds !== newIds || JSON.stringify(state.appNames) !== JSON.stringify(newNames)) {
      state.allWindows = newWindows;
      state.appNames = newNames;
      computeNavWindows();
    }
  }

  function requestThumbnail(windowId, targetId) {
    const msg = { type: 'get_thumbnail', window_id: windowId };
    if (targetId) msg.target_id = targetId;
    sendControl(msg);
  }

  // 1x1 transparent PNG (valid, generated by PIL)
  const PLACEHOLDER_THUMB = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR4nGNgYGBgAAAABQABpfZFQAAAAABJRU5ErkJggg==';

  function handleThumbnail(msg) {
    if (msg.data) {
      thumbnailCache[msg.window_id] = 'data:image/jpeg;base64,' + msg.data;
    } else {
      thumbnailCache[msg.window_id] = PLACEHOLDER_THUMB;
    }
    state.thumbCounter++; // Trigger reactivity
  }

  function getThumbnailSrc(windowId) {
    // Access thumbCounter to make this reactive
    void state.thumbCounter;
    return thumbnailCache[windowId] || PLACEHOLDER_THUMB;
  }

  function onThumbError(event) {
    // Hide broken image — CSS background shows through
    event.target.style.visibility = 'hidden';
  }

  function requestStatus() {
    sendControl({ type: 'get_status' });
  }

  function requestSpaces() {
    sendControl({ type: 'get_spaces' });
  }

  function handleSpaces(msg) {
    state.spacesData = {
      spaces: msg.spaces || [],
      current: msg.current || 1,
      count: msg.count || 0,
    };
  }

  function switchSpace(index) {
    sendControl({ type: 'switch_space', index });
  }

  // ===== NAV =====
  function currentWindow() {
    return state.navWindows[state.navIndex] || null;
  }

  function computeNavWindows() {
    // Auto-select first target if still "all"
    if (state.activeTarget === 'all' && state.targets.length > 0) {
      state.activeTarget = state.targets[0].id;
    }
    // Filter by active target
    let base = state.allWindows;
    if (state.activeTarget && state.activeTarget !== 'all') {
      base = base.filter(w => w.target_id === state.activeTarget);
    }

    if (state.navMode === 'all') {
      state.navWindows = [...base];
    } else if (state.navMode === 'app') {
      const cur = currentWindow();
      const appName = cur ? cur.owner_name : '';
      state.navWindows = base.filter(w => w.owner_name === appName);
    } else {
      const groups = loadGroups();
      const ids = groups[state.navMode] || [];
      state.navWindows = ids.map(id => base.find(w => w.window_id === id)).filter(Boolean);
    }
  }

  // ===== STREAM WS =====
  let fpsTimer = null;
  let statusTimer = null;


  let _streamGeneration = 0;
  let _lastRenderedSeq = -1;
  let _pendingFrame = null;
  let _renderScheduled = false;
  let _clientStreamStart = 0;
  let _serverTimeOffset = 0;
  let _droppedStale = 0;
  const STALE_THRESHOLD_MS = 2000;

  // MSE state for VP8/VP9 video streaming
  let _mediaSource = null;
  let _sourceBuffer = null;
  let _mseQueue = [];
  let _mseReady = false;

  function _initMSE(initData) {
    const video = document.getElementById('mse-video');
    if (!video) return;

    // Clean up previous MSE
    if (_mediaSource && _mediaSource.readyState === 'open') {
      try { _mediaSource.endOfStream(); } catch(e) {}
    }
    _sourceBuffer = null;
    _mseQueue = [];
    _mseReady = false;

    const codec = state.codec === 'vp9' ? 'vp9' : 'vp8';
    _mediaSource = new MediaSource();
    video.src = URL.createObjectURL(_mediaSource);

    _mediaSource.addEventListener('sourceopen', () => {
      try {
        _sourceBuffer = _mediaSource.addSourceBuffer('video/webm; codecs="' + codec + '"');
        _sourceBuffer.mode = 'sequence';
        _sourceBuffer.addEventListener('updateend', () => {
          // Priority: append queued frames as fast as possible
          if (_mseQueue.length > 0 && !_sourceBuffer.updating) {
            try { _sourceBuffer.appendBuffer(_mseQueue.shift()); }
            catch (e) { _mseQueue = []; }
          }
        });
        _sourceBuffer.appendBuffer(initData);
        _mseReady = true;
        state.mseActive = true;

        // Live-edge seeker — keeps video within 0.3s of the live edge
        // Uses playbackRate adjustment instead of seeking (smoother)
        const liveSeeker = setInterval(() => {
          if (!_mseReady || !video.buffered.length) return;
          try {
            const liveEdge = video.buffered.end(video.buffered.length - 1);
            const lag = liveEdge - video.currentTime;
            if (lag > 2.0) {
              // Way behind — hard seek
              video.currentTime = liveEdge - 0.1;
              video.playbackRate = 1.0;
            } else if (lag > 0.8) {
              // Behind — speed up proportionally to catch up
              video.playbackRate = 1.0 + Math.min(lag, 2.0);
            } else if (lag > 0.3) {
              video.playbackRate = 1.2;
            } else {
              video.playbackRate = 1.0;
            }
          } catch(e) {}
        }, 200);
        video._liveSeeker = liveSeeker;
      } catch (e) {
        console.error('MSE init error:', e);
      }
    });
  }

  function connectStreamWs() {
    disconnectStreamWs();
    const gen = ++_streamGeneration;
    const ws = new WebSocket(wsUrl(`/ws/stream/${state.sessionId}`));
    ws.binaryType = 'arraybuffer';
    state.streamWs = ws;

    ws.onopen = () => {
      startFpsCounter();
      // Reset timestamp sync for new stream
      _clientStreamStart = 0;
      _serverTimeOffset = 0;
      _lastRenderedSeq = -1;
      _pendingFrame = null;
      _droppedStale = 0;
      // Send pending stream config now that WS is open
      if (state._pendingStreamWindow) {
        const { windowId, targetId } = state._pendingStreamWindow;
        state._pendingStreamWindow = null;
        sendStreamConfig(windowId, targetId);
      }
    };

    // Frame handling differs by codec:
    // JPEG/WebP: drop-safe — only render latest frame per rAF
    // VP8/VP9: ordered — append every frame to MSE SourceBuffer

    ws.onmessage = (e) => {
      if (!(e.data instanceof ArrayBuffer) || e.data.byteLength < 10) return;

      const hdr = new DataView(e.data, 0, 10);
      const streamId = hdr.getUint16(0);
      const seq = hdr.getUint32(2);
      const serverTs = hdr.getUint32(6);
      const payload = e.data.slice(10);
      const b = new Uint8Array(payload);

      if (_clientStreamStart === 0) {
        _clientStreamStart = performance.now();
        _serverTimeOffset = serverTs;
      }

      const clientElapsed = performance.now() - _clientStreamStart;
      const serverElapsed = serverTs - _serverTimeOffset;
      const frameAge = clientElapsed - serverElapsed;

      // Detect data type from first 4 bytes of payload
      const isEBML = b.length > 4 && b[0] === 0x1A && b[1] === 0x45 && b[2] === 0xDF && b[3] === 0xA3;
      const isCluster = b.length > 4 && b[0] === 0x1F && b[1] === 0x43 && b[2] === 0xB6 && b[3] === 0x75;
      const isVideo = isEBML || isCluster;

      if (isVideo) {
        if (isEBML) {
          _initMSE(payload);
        } else {
          // Always queue, let updateend drain as fast as possible
          // Keep max 30 frames (~2s at 15fps) — drop oldest if full
          if (_mseQueue.length >= 30) _mseQueue.shift();
          _mseQueue.push(payload);
          // Kick the drain if SourceBuffer is idle
          if (_sourceBuffer && !_sourceBuffer.updating && _mseQueue.length > 0) {
            try { _sourceBuffer.appendBuffer(_mseQueue.shift()); }
            catch(ex) { /* skip */ }
          }
        }
        _lastRenderedSeq = seq;
        state.frameCount++;
        sendControl({ type: 'stream_ack', stream_id: streamId, seq: seq });
      } else {
        // JPEG/WebP image — drop stale, render latest via rAF
        if (frameAge > STALE_THRESHOLD_MS) {
          _droppedStale++;
          sendControl({ type: 'stream_ack', stream_id: streamId, seq: seq });
          return;
        }
        if (seq <= _lastRenderedSeq) return;

        _pendingFrame = { streamId, seq, payload };
        if (!_renderScheduled) {
          _renderScheduled = true;
          requestAnimationFrame(() => {
            _renderScheduled = false;
            if (!_pendingFrame) return;
            const { streamId: sid, seq: s, payload: p } = _pendingFrame;
            _pendingFrame = null;
            const blob = new Blob([p], { type: 'image/jpeg' });
            const url = URL.createObjectURL(blob);
            if (state.prevBlobUrl) URL.revokeObjectURL(state.prevBlobUrl);
            state.prevBlobUrl = state.streamBlobUrl;
            state.streamBlobUrl = url;
            _lastRenderedSeq = s;
            state.frameCount++;
            sendControl({ type: 'stream_ack', stream_id: sid, seq: s });
          });
        }
      }
    };

    ws.onclose = () => {
      // Only reconnect if this WS is still current (not superseded)
      if (gen === _streamGeneration && state.view === 'viewer' && currentWindow()) {
        setTimeout(connectStreamWs, 1000);
      }
    };
  }

  function disconnectStreamWs() {
    // Increment generation so no stale callbacks fire
    _streamGeneration++;

    if (state.streamWs) {
      state.streamWs.close();
      state.streamWs = null;
    }

    // Reset ALL client-side stream state
    _clientStreamStart = 0;
    _serverTimeOffset = 0;
    _lastRenderedSeq = -1;
    _pendingFrame = null;
    _renderScheduled = false;
    _droppedStale = 0;

    // Clean up MSE
    const mseVid = document.getElementById('mse-video');
    if (mseVid && mseVid._liveSeeker) {
      clearInterval(mseVid._liveSeeker);
      mseVid._liveSeeker = null;
    }
    if (_mediaSource && _mediaSource.readyState === 'open') {
      try { _mediaSource.endOfStream(); } catch(e) {}
    }
    _mediaSource = null;
    _sourceBuffer = null;
    _mseQueue = [];
    _mseReady = false;
    state.mseActive = false;

    // Clear any displayed frame
    if (state.streamBlobUrl) {
      URL.revokeObjectURL(state.streamBlobUrl);
      state.streamBlobUrl = null;
    }
    if (state.prevBlobUrl) {
      URL.revokeObjectURL(state.prevBlobUrl);
      state.prevBlobUrl = null;
    }

    stopFpsCounter();
  }

  function sendStreamConfig(windowId, targetId) {
    const msg = {

  function setupDrag(el) {
    let startX, startY, origX, origY;
    const handle = el.querySelector('.drag-handle');
    if (!handle) return;
    const onStart = (e) => {
      const touch = e.touches ? e.touches[0] : e;
      startX = touch.clientX; startY = touch.clientY;
      const rect = el.getBoundingClientRect();
      origX = rect.left; origY = rect.top;
      const onMove = (e2) => {
        const t = e2.touches ? e2.touches[0] : e2;
        el.style.left = (origX + t.clientX - startX) + 'px';
        el.style.top = (origY + t.clientY - startY) + 'px';
        el.style.bottom = 'auto';
      };
      const onEnd = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
    };
    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart, { passive: false });

        const cy = clientY - rect.top;
        const imgX = (cx - state.tx) / state.scale;

        if (remoteCursor.value) {
          remoteCursor.value.style.left = cx + 'px';
          remoteCursor.value.style.top = cy + 'px';

        const el = clickRipple.value;
        if (!el) return;

          e.preventDefault();

          case 'Escape': goBack(); e.preventDefault(); break;

          case 'v': applyFitVertical(); e.preventDefault(); break;

        <!-- Llming launcher dialog -->

    `,
    emits: ['select-window'],
    setup() {
      const groupsList = computed(() => loadGroups());

      function isInAnyGroup(win) {
        const groups = loadGroups();
        return Object.values(groups).some(ids => ids.includes(win.window_id));
      }

      function onAppFilterChange(e) {
        state.appFilter = e.target.value;
        state.navMode = 'all';
        requestWindows();
      }

      function setNavMode(mode) {
        state.navMode = mode;
        state.activeGroupName = null;
        computeNavWindows();
      }

      function toggleGroup(name) {
        state.navMode = (state.navMode === name) ? 'all' : name;
        state.activeGroupName = state.navMode === 'all' ? null : name;
        computeNavWindows();
      }

      function editGroup(name) {
        state.groupModalEditing = name;
        state.groupModalTitle = 'Edit Group';
        state.groupModalName = name;
        state.groupModalCallback = null;
        state.groupModalOpen = true;
      }

      function openNewGroup() {
        state.groupModalEditing = null;
        state.groupModalTitle = 'New Group';
        state.groupModalName = '';
        state.groupModalCallback = null;
        state.groupModalOpen = true;
      }

      function toggleGroupMembership(win) {
        const groups = loadGroups();
        const names = Object.keys(groups);
        if (names.length === 0) {
          state.groupModalEditing = null;
          state.groupModalTitle = 'New Group';
          state.groupModalName = '';
          state.groupModalCallback = (newName) => {
            const g = loadGroups();
            g[newName] = [win.window_id];
            saveGroups(g);
            computeNavWindows();
          };
          state.groupModalOpen = true;
          return;
        }
        const target = (state.navMode !== 'all' && state.navMode !== 'app') ? state.navMode : names[0];
        const g = loadGroups();
        if (!g[target]) g[target] = [];
        const idx = g[target].indexOf(win.window_id);
        if (idx >= 0) g[target].splice(idx, 1);
        else g[target].push(win.window_id);
        saveGroups(g);
        if (state.navMode !== 'all' && state.navMode !== 'app') computeNavWindows();
      }

      function doSwitchSpace(index) {
        switchSpace(index);
      }

      function onSetTarget(targetId) {
        setTarget(targetId);
      }

      // Cloud connector save handler (panel is rendered by extension)
      function onCloudSave(enabled) {
        if (enabled) {
          state.connectors.cloud.active = true;
          _cloudOptimisticUntil = Date.now() + 3000;
        } else {
          state.connectors.cloud.active = false;
          state.connectors.cloud.server_url = '';
          _cloudOptimisticUntil = 0;
        }
        state.connectorPanelOpen = null;
        setTimeout(fetchConnectors, 1000);
      }

      // Group windows by target for the flat "All" view
      const targetGroups = computed(() => {
        const groups = {};
        for (const win of state.navWindows) {
          const tid = win.target_id || 'unknown';
          const tname = win.target_name || tid;
          if (!groups[tid]) {
            const provType = (state.targets.find(t => t.id === tid) || {}).provider_type || '';
            groups[tid] = {
              targetId: tid,
              targetName: tname,
              icon: provType === 'macos' ? 'ph ph-desktop' : provType === 'linux-docker' ? 'ph ph-linux-logo' : 'ph ph-monitor',
              windows: [],
            };
          }
          groups[tid].windows.push(win);
        }
        return Object.values(groups);
      });

      const currentTargetName = computed(() => {
        const t = state.targets.find(t => t.id === state.activeTarget);
        return t ? t.name : state.activeTarget;
      });

      function navWindowIndex(win) {
        return state.navWindows.findIndex(w => w.window_id === win.window_id && w.target_id === win.target_id);
      }

      // View tabs + config sub-screens
      const viewTab = ref('screens');
      const configScreen = ref(null); // null | 'general' | 'extensions'
      const generalConfig = reactive({ caffeinate: false, display_sleep_disabled: false });

      // Load general config from server
      async function loadGeneralConfig() {
        try {
          const r = await fetch(apiUrl('/api/config/general'));
          if (r.ok) Object.assign(generalConfig, await r.json());
        } catch {}
      }
      async function toggleGeneral(key, value) {
        generalConfig[key] = value;
        await fetch(apiUrl('/api/config/general'), {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({...generalConfig}),
        }).catch(() => {});
        // Apply caffeinate immediately
        if (key === 'caffeinate' || key === 'display_sleep_disabled') {
          fetch(apiUrl('/api/system/apply-power'), { method: 'POST' }).catch(() => {});
        }
      }
      loadGeneralConfig();
      const targetDropdownOpen = ref(false);
      const activeTargetLabel = computed(() => {
        const t = state.targets.find(t => t.id === state.activeTarget);
        return t ? t.name : state.targets[0]?.name || 'System';
      });
      const activeTargetIcon = computed(() => {
        const t = state.targets.find(t => t.id === state.activeTarget);
        const pt = t?.provider_type || state.targets[0]?.provider_type || '';
        if (pt === 'macos') return 'ph ph-desktop';
        if (pt === 'linux-docker') return 'ph ph-linux-logo';
        return 'ph ph-monitor';
      });
      // Auto-select first target — never show "all"
      watch(() => state.targets.length, () => {
        if ((state.activeTarget === 'all' || !state.targets.find(t => t.id === state.activeTarget)) && state.targets.length > 0) {
          state.activeTarget = state.targets[0].id;
        }
      }, { immediate: true });
      const spiritsList = ref([]);
      const spiritCount = computed(() => spiritsList.value.filter(s => s.running_jobs && s.running_jobs.length > 0).length);
      const allPlugins = ref([]);
      const selectedSpirit = ref(null);
      const selectedPlugin = ref(null);

      async function refreshSpirits() {
        try {
          const r = await fetch(apiUrl('/api/plugins'));
          if (r.ok) {
            const all = await r.json();
            allPlugins.value = all;
            spiritsList.value = all.filter(p => p.loaded && p.running_jobs && p.running_jobs.length);
          }
        } catch {}
      }
      // Track store key counts per spirit (mini stats)
      const spiritStoreKeys = reactive({});
      async function refreshSpiritStores() {
        for (const sp of spiritsList.value) {
          try {
            const r = await fetch(apiUrl(`/api/plugins/${sp.name}/store`));

          items.push({
            type: 'spirit', key: 'spirit:' + sn, id: sn,
            icon: sp?.icon || 'ph ph-ghost', app: sn, name: 'Spirit',

        // Terminals
        for (const t of terminalsForTarget(target)) {

            type: 'terminal', key: 'term:' + t.terminal_id, id: t.terminal_id,

        for (let idx = 0; idx < state.navWindows.length; idx++) {

            type: 'window', key: 'win:' + w.window_id, id: w.window_id, idx,
            app: w.owner_name, name: w.window_name || '(untitled)',
          });
        }

        // Sort: favorites first, then spirits (default priority), then by last interaction
        items.sort((a, b) => {
          const aFav = favorites[a.key] ? 1 : 0;
          const bFav = favorites[b.key] ? 1 : 0;
          if (aFav !== bFav) return bFav - aFav;
          const aTs = lastInteraction[a.key] || 0;
          const bTs = lastInteraction[b.key] || 0;
          if (aTs !== bTs) return bTs - aTs;
          // No interaction data: spirits before windows/terminals
          if (a.type !== b.type) {
            if (a.type === 'spirit') return -1;
            if (b.type === 'spirit') return 1;
          }
          return a.app.localeCompare(b.app);
        });

  // Terminal plugin patterns — auto-detect prompts and show clickable buttons
  const TERMINAL_PLUGINS = [
    {
      name: 'claude-accept',
      pattern: /\b(allow|permit|proceed|accept)\b.*\?\s*$/im,

        { label: 'Accept', input: 'y\n', cls: 'action-accept' },

        { label: 'No', input: 'n\n', cls: 'action-decline' },
      ],
    },
    {
      name: 'continue',
      pattern: /press enter to continue|hit enter/im,

          <button class="llming-close" @click="confirmClose"><i class="ph ph-x"></i> Close</button>
        </div>
        <div class="llming-content" ref="termContainer"></div>
        <div v-if="detectedActions.length" class="term-actions">
          <button v-for="btn in detectedActions" :key="btn.label"
                  :class="btn.cls" @click="sendAction(btn.input)">{{ btn.label }}</button>
        </div>
        <div class="llming-bottom-bar">
          <button @click="softKeysVisible = !softKeysVisible">
            <i class="ph ph-keyboard"></i> {{ softKeysVisible ? 'Hide' : 'Keys' }}
          </button>

        <div class="llming-floating-keys" :class="{ hidden: !softKeysVisible }" ref="floatingKeysEl">
          <div class="drag-handle">&#8943; drag &#8943;</div>
          <button @click="sendKey(KEYS.ESC)">Esc</button>
          <button @click="sendKey(KEYS.TAB)">Tab</button>
          <button @click="sendKey(KEYS.CTRL_C)">^C</button>
          <button @click="sendKey(KEYS.CTRL_D)">^D</button>
          <button @click="sendKey(KEYS.CTRL_Z)">^Z</button>
          <button @click="sendKey(KEYS.UP)">&uarr;</button>
          <button @click="sendKey(KEYS.DOWN)">&darr;</button>
          <button @click="sendKey(KEYS.LEFT)">&larr;</button>
          <button @click="sendKey(KEYS.RIGHT)">&rarr;</button>
          <button @click="sendKey(KEYS.BACKSPACE)">&lArr;</button>
          <button @click="sendKey(KEYS.ENTER)">&crarr;</button>
        </div>
      </div>
    `,
    setup() {
      const termContainer = ref(null);
      const floatingKeysEl = ref(null);
      let xterm = null;
      let fitAddon = null;
      let termWs = null;
      let currentTermId = null;

      const KEYS = {
        ESC: '\x1b', TAB: '\t', CTRL_C: '\x03', CTRL_D: '\x04', CTRL_Z: '\x1a',
        UP: '\x1b[A', DOWN: '\x1b[B', LEFT: '\x1b[D', RIGHT: '\x1b[C',
        BACKSPACE: '\x7f', ENTER: '\r',
      };

      const softKeysVisible = ref(false);
      const detectedActions = ref([]);

      const activeTerminal = computed(() => {
        return state.terminals.find(t => t.terminal_id === state.activeTerminalId) || null;
      });

      // Scan last N chars of terminal buffer for plugin patterns
      function detectActions() {
        if (!xterm) { detectedActions.value = []; return; }
        // Get last 2000 chars from the terminal buffer
        const buf = xterm.buffer.active;
        const lines = [];
        const start = Math.max(0, buf.cursorY - 5);
        for (let i = start; i <= buf.cursorY; i++) {
          const line = buf.getLine(i + buf.baseY);
          if (line) lines.push(line.translateToString().trimEnd());
        }
        const text = lines.join('\n');
        for (const plugin of TERMINAL_PLUGINS) {
          if (plugin.pattern.test(text)) {
            detectedActions.value = plugin.buttons;
            return;
          }
        }
        detectedActions.value = [];
      }

      function connectTerminal(terminalId) {
        if (termWs) { termWs.close(); termWs = null; }
        currentTermId = terminalId;

        termWs = new WebSocket(wsUrl('/ws/terminal/' + terminalId));
        termWs.binaryType = 'arraybuffer';

        termWs.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) {
            const text = new TextDecoder().decode(e.data);
            xterm.write(text);
            // Debounce action detection
            clearTimeout(connectTerminal._detectTimer);
            connectTerminal._detectTimer = setTimeout(detectActions, 200);
          }
        };
        termWs.onclose = () => { termWs = null; };
        termWs.onerror = () => {};
      }
      connectTerminal._detectTimer = null;

      function disconnectTerminal() {
        if (termWs) { termWs.close(); termWs = null; }
        currentTermId = null;
      }

      function sendKey(data) {
        if (termWs && termWs.readyState === WebSocket.OPEN) {
          termWs.send(new TextEncoder().encode(data));
        }
      }

      function sendAction(input) {
        sendKey(input);
        detectedActions.value = [];
      }

      function goBack() {
        disconnectTerminal();
        state.view = 'picker';
        state.activeTerminalId = null;

          const tid = state.activeTerminalId;
          disconnectTerminal();
          if (tid) closeTerminal(tid);
          state.view = 'picker';
          state.activeTerminalId = null;
        });
      }

      function setupXterm() {
        if (!termContainer.value) return;
        if (xterm) { xterm.dispose(); xterm = null; }

        xterm = new Terminal({
          cursorBlink: true,
          fontSize: 14,
          fontFamily: "'Menlo', 'Monaco', 'Courier New', monospace",
          theme: {
            background: '#0a0e1a',
            foreground: '#f0f4ff',
            cursor: '#3b82f6',
            selectionBackground: 'rgba(59,130,246,0.3)',
          },
          scrollback: 10000,
          convertEol: true,
        });

        fitAddon = new FitAddon.FitAddon();
        xterm.loadAddon(fitAddon);
        xterm.loadAddon(new WebLinksAddon.WebLinksAddon());

        xterm.open(termContainer.value);
        fitAddon.fit();
        xterm.focus();

        // Forward keyboard input to the PTY
        xterm.onData((data) => {
          if (termWs && termWs.readyState === WebSocket.OPEN) {
            termWs.send(new TextEncoder().encode(data));
          }
        });

        // Send resize when terminal size changes
        xterm.onResize(({ cols, rows }) => {
          if (termWs && termWs.readyState === WebSocket.OPEN) {
            termWs.send(JSON.stringify({ type: 'resize', cols, rows }));
          }
          sendControl({ type: 'terminal_resize', terminal_id: currentTermId, cols, rows });
        });

        // Debounced resize — fits terminal to container, max once per second
        let resizeTimer = null;
        const debouncedFit = () => {
          if (resizeTimer) return;
          resizeTimer = setTimeout(() => {
            resizeTimer = null;
            if (fitAddon && xterm && state.view === 'terminal') {
              fitAddon.fit();
            }
          }, 1000);
        };
        window.addEventListener('resize', debouncedFit);
        window.addEventListener('orientationchange', debouncedFit);
        // Also observe the container itself (catches CSS layout changes)
        let resizeObserver = null;
        if (typeof ResizeObserver !== 'undefined' && termContainer.value) {
          resizeObserver = new ResizeObserver(debouncedFit);
          resizeObserver.observe(termContainer.value);
        }
        xterm._hortCleanup = () => {
          window.removeEventListener('resize', debouncedFit);
          window.removeEventListener('orientationchange', debouncedFit);
          if (resizeObserver) resizeObserver.disconnect();
          clearTimeout(resizeTimer);
        };
      }

      // Watch for terminal activation
      watch(() => state.activeTerminalId, (newId) => {
        if (newId && state.view === 'terminal') {
          nextTick(() => {
            setupXterm();
            connectTerminal(newId);
            // Send initial resize
            if (xterm && fitAddon) {
              fitAddon.fit();
              sendControl({
                type: 'terminal_resize',
                terminal_id: newId,
                cols: xterm.cols,
                rows: xterm.rows,
              });
            }
            // Setup drag for floating keys
            if (floatingKeysEl.value) {
              setupDrag(floatingKeysEl.value);
            }
          });
        }
      });

      onUnmounted(() => {
        disconnectTerminal();
        if (xterm) {
          if (xterm._hortCleanup) xterm._hortCleanup();
          xterm.dispose();
        }
      });

      return {
        state, termContainer, floatingKeysEl, activeTerminal, detectedActions, KEYS,
        softKeysVisible, goBack, confirmClose, sendKey, sendAction,
      };
    },
  };

        await new Promise(resolve => {
          const check = setInterval(() => {
            if (state.connected) { clearInterval(check); resolve(); }
          }, 100);
          // Timeout after 5s
          setTimeout(() => { clearInterval(check); resolve(); }, 5000);
        });

        // Try to restore last viewed window
        const saved = localStorage.getItem('llming-current-window');
        if (saved) {
          try {
            const { window_id } = JSON.parse(saved);
            // Request windows and wait for response
            requestWindows();
            requestSpaces();
            await new Promise(resolve => setTimeout(resolve, 500));
            computeNavWindows();
            const idx = state.navWindows.findIndex(w => w.window_id === window_id);
            if (idx >= 0) {
              if (viewer.value) viewer.value.doSwitchWindow(idx);
              return;
            }
            localStorage.removeItem('llming-current-window');
          } catch {
            localStorage.removeItem('llming-current-window');
          }
        }

        // Start picker refresh
        startPickerRefresh();
      });

      return {
        state, viewer, onSelectWindow,
        fullscreenSpirit, fullscreenSpiritWidget, closeSpiritFullscreen,
        guideUrl, hortmapUrl, openHelp,
      };
    },
  };


  // ===== CREATE VUE APP =====
  const app = createApp({});

  app.component('hort-app', HortApp);
  app.component('hort-picker', HortPicker);
  app.component('hort-viewer', HortViewer);
  app.component('hort-settings', HortSettings);
  app.component('hort-overview', HortOverview);
  app.component('hort-group-modal', HortGroupModal);
  app.component('hort-terminal', HortTerminal);

  app.use(Quasar, {
    config: {
      dark: true,
      brand: {
        primary: '#3b82f6',
        secondary: '#1e3a5f',
        accent: '#60a5fa',
        dark: '#0a0e1a',
        'dark-page': '#0a0e1a',
      },
    },
  });

  // Activate any registered HortExtensions
  if (typeof HortExtension !== 'undefined') {
    HortExtension.activateAll(app, Quasar, {});
  }
  if (typeof HortPlugins !== 'undefined') {
    HortPlugins.registerPluginManager(app);
  }

  app.mount('#q-app');

  // Load plugin UI scripts asynchronously after mount
  if (typeof HortPlugins !== 'undefined') {
    HortPlugins.discoverAndLoadPlugins().then(() => {
      if (typeof HortExtension !== 'undefined') HortExtension.activateAll(app, Quasar, {});
      pluginsLoaded.value++;
      // Delay second trigger to ensure spirit visibility config has loaded
      setTimeout(() => { pluginsLoaded.value++; }, 2000);
    });
  }

  // Reconnect on tab visibility change (macOS Space switching suspends tabs)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.sessionId) {
      // Check if WS is dead
      if (!state.controlWs || state.controlWs.readyState !== WebSocket.OPEN) {
        connectControlWs();
      }
    }
  });

  // PWA: manifest + service worker (skip when proxied)
  if (!_basePath) {
    const ml = document.createElement('link');
    ml.rel = 'manifest'; ml.href = 'manifest.json';
    document.head.appendChild(ml);
    if ('serviceWorker' in navigator && location.hostname !== 'localhost' && !location.hostname.match(/^(\d+\.){3}\d+$/)) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  }
})();
</script>
