<head>

<style>
:root {
  --el-bg: #0a0e1a;
  --el-surface: #111827;
  --el-border: #1e3a5f;
  --el-primary: #3b82f6;
  --el-accent: #60a5fa;
  --el-text: #f0f4ff;
  --el-text-dim: #94a3b8;
  --el-danger: #ef4444;
  --el-success: #22c55e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--el-bg); color: var(--el-text);
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
}

/* ===== PICKER VIEW ===== */
.picker-header {
    position: sticky; top: 0; z-index: 100;
    background: var(--el-surface); padding: 10px 12px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--el-border);
}
.picker-header h1 { font-size: 15px; color: var(--el-primary); flex-shrink: 0; }
.cloud-badge {
    background: var(--el-success); color: #fff; font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 12px; display: flex; align-items: center; gap: 4px;
    animation: cloud-pulse 2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes cloud-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.picker-header select {
    flex: 1; min-width: 0; background: var(--el-border); color: var(--el-text);
    border: 1px solid var(--el-primary); border-radius: 6px; padding: 7px 10px; font-size: 13px;
    -webkit-appearance: none; appearance: none;
}
.target-divider {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px 4px; margin-top: 4px;
    font-size: 12px; color: var(--el-primary); font-weight: 600;
    border-bottom: 1px solid var(--el-border); margin-bottom: 6px;
}
.target-divider i { font-size: 16px; }
.target-count {
    background: var(--el-border); border-radius: 10px; padding: 1px 8px;
    font-size: 11px; color: var(--el-text-dim); font-weight: normal;
}

/* Unified grid */
.llming-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  padding: 10px;
}
@media (max-width: 480px) {
  .llming-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
}
.grid-card {
  background: var(--el-surface);
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.1s;
  overflow: hidden;
}
.grid-card:hover { border-color: var(--el-primary); transform: translateY(-2px); }
.grid-card-thumb {
  width: 100%;
  aspect-ratio: 16 / 10;
  object-fit: cover;
  background: var(--el-border);
  display: block;
}
.grid-card-info {
  padding: 8px 10px;
}
.grid-card-info .card-app { font-size: 12px; color: var(--el-primary); font-weight: 600; }
.grid-card-info .card-name { font-size: 11px; color: var(--el-text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.grid-card.new-llming {
  border: 2px dashed var(--el-border);
  display: flex; align-items: center; justify-content: center;
  min-height: 140px;
  flex-direction: column; gap: 8px;
  color: var(--el-text-dim); font-size: 14px;
}
.grid-card.new-llming:hover { border-color: var(--el-primary); color: var(--el-primary); }
.grid-card.new-llming i { font-size: 36px; }
.grid-card.terminal-card .card-thumb-icon {
  width: 100%; aspect-ratio: 16 / 10;
  background: var(--el-border);
  display: flex; align-items: center; justify-content: center;
}
.grid-card.terminal-card .card-thumb-icon i { font-size: 40px; color: var(--el-primary); }

/* Llming launcher overlay */
.llming-launcher-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
    padding: 20px;
}
.llming-launcher {
    background: var(--el-surface); border: 1px solid var(--el-border); border-radius: 16px;
    width: 100%; max-width: 700px; max-height: 80vh; display: flex; flex-direction: column;
    overflow: hidden;
}
.llming-launcher-header {
    display: flex; align-items: center; gap: 10px; padding: 16px 20px;
    border-bottom: 1px solid var(--el-border);
}
.llming-launcher-header h3 { color: var(--el-primary); font-size: 16px; margin: 0; flex-shrink: 0; }
.llming-launcher-search {
    flex: 1; background: var(--el-bg); color: var(--el-text); border: 1px solid var(--el-border);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none;
}
.llming-launcher-search:focus { border-color: var(--el-primary); }
.llming-launcher-close {
    background: none; border: none; color: var(--el-text-dim); font-size: 20px; cursor: pointer;
    padding: 4px;
}
.llming-launcher-close:hover { color: var(--el-text); }
.llming-launcher-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px; padding: 16px 20px; overflow-y: auto;
}
@media (min-width: 600px) {
    .llming-launcher-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}
.llming-option {
    background: var(--el-bg); border: 1px solid var(--el-border); border-radius: 10px;
    padding: 16px 10px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
}
.llming-option:hover { border-color: var(--el-primary); transform: translateY(-2px); }
.llming-option.disabled { opacity: 0.4; cursor: not-allowed; }
.llming-option.disabled:hover { border-color: var(--el-border); transform: none; }
.llming-option-icon { font-size: 32px; color: var(--el-primary); display: block; margin-bottom: 8px; }
.llming-option-label { font-size: 13px; color: var(--el-text); font-weight: 600; }
.llming-option-desc { font-size: 10px; color: var(--el-text-dim); margin-top: 4px; }

/* Spaces bar */
.spaces-bar {
    display: none; gap: 6px; padding: 8px 12px 4px; align-items: center;
}
.spaces-bar.visible { display: flex; }
.spaces-bar .spaces-label { font-size: 11px; color: var(--el-text-dim); margin-right: 2px; }
.space-btn {
    width: 32px; height: 24px; border-radius: 6px; border: 1px solid var(--el-border);
    background: var(--el-border); color: var(--el-text-dim); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
}
.space-btn:hover { border-color: var(--el-primary); color: var(--el-text); }
.space-btn.active { background: var(--el-primary); color: #fff; border-color: var(--el-primary); }
.viewer-spaces {
    display: none; align-items: center; gap: 2px; flex-shrink: 0;
    background: var(--el-border); border-radius: 6px; padding: 2px 4px;
}
.viewer-spaces.visible { display: inline-flex; }
.space-label { font-size: 11px; color: var(--el-primary); min-width: 22px; text-align: center; font-variant-numeric: tabular-nums; }
.space-nav-btn {
    background: none; border: none; color: var(--el-text-dim); font-size: 14px;
    cursor: pointer; padding: 2px 4px; display: flex; align-items: center;
}
.space-nav-btn:hover { color: var(--el-primary); }

/* Groups bar */
.groups-bar {
    display: flex; gap: 6px; padding: 8px 12px 4px; overflow-x: auto; scrollbar-width: none;
}
.groups-bar::-webkit-scrollbar { display: none; }
.group-chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 16px;
    background: var(--el-border); border: 1px solid var(--el-border); color: var(--el-text-dim);
    font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.group-chip:hover { border-color: var(--el-primary); color: var(--el-text); }
.group-chip.active { background: var(--el-primary); color: #fff; border-color: var(--el-primary); }
.group-chip.new-group { border-style: dashed; border-color: var(--el-text-dim); color: var(--el-text-dim); }
.group-chip.new-group:hover { border-color: var(--el-primary); color: var(--el-primary); }

/* ===== SHARED LLMING LAYOUT ===== */
.llming-view {
    position: fixed; inset: 0; background: var(--el-bg);
    display: none; flex-direction: column;
}
.llming-view.visible { display: flex; }
.llming-content { flex: 1; overflow: hidden; position: relative; }

/* Shared toolbar */
.llming-toolbar {
    background: var(--el-surface); padding: 6px 10px; display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid var(--el-border); flex-shrink: 0;
    position: sticky; top: 0; z-index: 200;
}
.llming-back, .llming-close {
    background: none; border: 1px solid var(--el-border); color: var(--el-text-dim); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; cursor: pointer; flex-shrink: 0;
}
.llming-back:hover, .llming-close:hover { border-color: var(--el-primary); color: var(--el-text); }
.llming-close { color: var(--el-danger); }
.llming-close:hover { border-color: var(--el-danger); }
.llming-title { flex: 1; font-size: 12px; color: var(--el-text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.llming-action {
    background: none; border: 1px solid var(--el-border); color: var(--el-text-dim); border-radius: 50%;
    width: 32px; height: 32px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.llming-action:hover, .llming-action.active { background: var(--el-primary); color: #fff; border-color: var(--el-primary); }

/* Shared bottom bar */
.llming-bottom-bar {
    background: var(--el-surface); padding: 4px 6px; display: flex; gap: 4px;
    overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    border-top: 1px solid var(--el-border);
}
.llming-bottom-bar::-webkit-scrollbar { display: none; }
.llming-bottom-bar button {
    flex-shrink: 0; background: var(--el-border); color: var(--el-text-dim); border: 1px solid var(--el-border);
    border-radius: 6px; padding: 8px 12px; font-size: 13px; cursor: pointer;
    font-family: monospace; min-width: 40px;
}
.llming-bottom-bar button:active { background: var(--el-primary); color: #fff; }

/* Shared floating soft keys */
.llming-floating-keys {
    position: fixed; bottom: 60px; left: 10px; z-index: 300;
    background: var(--el-surface); border: 1px solid var(--el-border); border-radius: 12px;
    padding: 8px; display: flex; flex-wrap: wrap; gap: 4px;
    max-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    touch-action: none;
}
.llming-floating-keys.hidden { display: none; }
.llming-floating-keys button {
    background: var(--el-border); color: var(--el-text); border: none;
    border-radius: 6px; padding: 10px 14px; font-size: 14px; cursor: pointer;
    font-family: monospace; min-width: 44px; min-height: 44px;
    display: flex; align-items: center; justify-content: center;
}
.llming-floating-keys button:active { background: var(--el-primary); }
.llming-floating-keys .drag-handle {
    width: 100%; text-align: center; color: var(--el-text-dim); font-size: 10px;
    cursor: grab; padding: 2px; user-select: none;
}

/* ===== VIEWER (llming-view variant) ===== */
.llming-view.viewer-llming { background: #000; }
.llming-view.viewer-llming .llming-toolbar {
    background: rgba(17, 24, 39, 0.9);
    padding: calc(6px + env(safe-area-inset-top, 0px)) calc(10px + env(safe-area-inset-right, 0px)) 6px calc(10px + env(safe-area-inset-left, 0px));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    position: fixed; top: 0; left: 0; right: 0;
}
.llming-view.viewer-llming .llming-back {
    background: var(--el-primary); color: white; border: none; font-weight: 600;
}
.nav-mode-select {
    background: var(--el-border); color: var(--el-text); border: 1px solid var(--el-border); border-radius: 6px;
    padding: 5px 8px; font-size: 12px; flex-shrink: 0; max-width: 140px;
    -webkit-appearance: none; appearance: none;
}
.nav-counter { font-size: 11px; color: var(--el-primary); flex-shrink: 0; font-variant-numeric: tabular-nums; }
.fps-display { font-size: 10px; color: #555; flex-shrink: 0; }
.observer-count { font-size: 10px; color: #555; flex-shrink: 0; }

.stream-container {
    position: absolute;
    top: calc(44px + env(safe-area-inset-top, 0px));
    left: env(safe-area-inset-left, 0px);
    right: env(safe-area-inset-right, 0px);
    bottom: env(safe-area-inset-bottom, 0px);
    overflow: hidden;
}
.stream-img {
    position: absolute; top: 0; left: 0; transform-origin: 0 0;
}

/* Active mode */
.llming-view.active-mode .stream-container { cursor: none; }
.llming-view.active-mode .nav-arrow { display: none; }

/* Remote cursor indicator */
.remote-cursor {
    display: none; position: absolute; z-index: 180; pointer-events: none;
    width: 24px; height: 24px; transform: translate(-2px, -2px);
}
.remote-cursor svg { width: 100%; height: 100%; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
.llming-view.active-mode .remote-cursor { display: block; }
.click-ripple {
    display: none; position: absolute; z-index: 179; pointer-events: none;
    width: 40px; height: 40px; transform: translate(-20px, -20px);
    border: 2px solid var(--el-primary); border-radius: 50%;
    animation: ripple 0.4s ease-out forwards;
}
@keyframes ripple {
    0% { transform: translate(-20px,-20px) scale(0.3); opacity: 1; }
    100% { transform: translate(-20px,-20px) scale(1.5); opacity: 0; }
}

/* Nav arrows */
.nav-arrow {
    position: fixed; top: 50%; z-index: 250; transform: translateY(-50%);
    background: rgba(17,24,39,0.6); border: 1px solid rgba(30,58,95,0.5);
    color: var(--el-text-dim); font-size: 26px; width: 40px; height: 72px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
}
.nav-arrow:hover { background: var(--el-primary); color: #fff; }
.nav-arrow.prev { left: env(safe-area-inset-left, 0px); border-radius: 0 8px 8px 0; }
.nav-arrow.next { right: env(safe-area-inset-right, 0px); border-radius: 8px 0 0 8px; }

/* Settings panel */
.settings-panel {
    display: none; position: fixed;
    top: calc(44px + env(safe-area-inset-top, 0px));
    right: calc(12px + env(safe-area-inset-right, 0px));
    z-index: 300;
    background: rgba(17,24,39,0.95); border: 1px solid var(--el-border);
    border-radius: 12px; padding: 14px 18px; min-width: 240px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.settings-panel.open { display: block; }
.settings-panel h3 { font-size: 11px; color: var(--el-primary); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px; }
.setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-row label { font-size: 12px; color: var(--el-text-dim); min-width: 65px; flex-shrink: 0; }
.setting-row input[type=range] { flex: 1; accent-color: var(--el-primary); }
.setting-val { font-size: 12px; color: var(--el-primary); min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
.setting-row select {
    flex: 1; background: var(--el-border); color: var(--el-text); border: 1px solid var(--el-border);
    border-radius: 6px; padding: 5px 8px; font-size: 12px;
}

/* Minimap */
.minimap {
    display: none; position: fixed;
    bottom: calc(70px + env(safe-area-inset-bottom, 0px));
    right: calc(12px + env(safe-area-inset-right, 0px));
    z-index: 250;
    background: rgba(17,24,39,0.9); border: 1px solid var(--el-border); border-radius: 8px;
    padding: 6px; backdrop-filter: blur(8px);
}
.minimap.visible { display: block; }
.minimap-wrap {
    position: relative; width: 180px; cursor: crosshair; overflow: hidden; border-radius: 4px;
}
.minimap-img { width: 100%; display: block; background: var(--el-border); }
.minimap-viewport {
    position: absolute; border: 2px solid var(--el-primary); background: rgba(59,130,246,0.1);
    pointer-events: none; border-radius: 2px;
}
.minimap-nav {
    display: flex; gap: 4px; margin-top: 6px;
}
.minimap-nav button {
    flex: 1; background: var(--el-border); border: 1px solid var(--el-border); color: var(--el-text-dim);
    border-radius: 4px; padding: 4px; font-size: 11px; cursor: pointer; font-weight: 600;
}
.minimap-nav button:hover { background: var(--el-primary); color: #fff; border-color: var(--el-primary); }

/* Overview grid */
.overview {
    display: none; position: fixed; inset: 0; z-index: 350;
    background: rgba(0,0,0,0.85); overflow-y: auto; padding: 50px 16px 16px;
}
.overview.open { display: block; }
.overview-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 360;
    background: rgba(17,24,39,0.95); padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(8px);
}
.overview-spaces { display: inline-flex; gap: 3px; flex-shrink: 0; }
.overview-header h2 { flex: 1; font-size: 15px; color: var(--el-primary); }
.overview-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
}
.overview-card {
    background: var(--el-surface); border-radius: 8px; padding: 8px; cursor: pointer;
    border: 1px solid transparent; transition: border-color 0.15s;
}
.overview-card:hover { border-color: var(--el-primary); }
.overview-card.current { border-color: var(--el-primary); }
.overview-card img {
    width: 100%; aspect-ratio: 16/10; object-fit: cover; border-radius: 5px;
    background: var(--el-border);
}
.overview-card .ov-app { font-size: 11px; color: var(--el-primary); margin-top: 6px; font-weight: 600; }
.overview-card .ov-name { font-size: 10px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Group modal */
.group-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
}
.group-modal-overlay.open { display: flex; }
.group-modal-content {
    background: var(--el-surface); border: 1px solid var(--el-border); border-radius: 12px;
    padding: 20px; width: 90%; max-width: 360px;
}
.group-modal-content h3 { color: var(--el-primary); margin-bottom: 12px; font-size: 15px; }
.group-modal-content input {
    width: 100%; background: var(--el-border); color: var(--el-text); border: 1px solid var(--el-border);
    border-radius: 6px; padding: 10px; font-size: 14px; margin-bottom: 12px;
}
.group-modal-content input:focus { outline: none; border-color: var(--el-primary); }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
    flex: 1; padding: 10px; border: none; border-radius: 6px;
    font-size: 14px; cursor: pointer; font-weight: 600;
}
.modal-save { background: var(--el-primary); color: #fff; }
.modal-cancel { background: var(--el-border); color: var(--el-text-dim); }
.modal-delete { background: var(--el-border); color: var(--el-danger); flex: 0; padding: 10px 16px; }

/* Quasar overrides for dark theme */
.q-dark { background: var(--el-bg) !important; }

/* ===== TERMINAL (llming-view variant) ===== */
.llming-view.terminal-llming { background: #000; }
.llming-view.terminal-llming .llming-content .xterm { height: 100%; }
/* Plugin action buttons */
.term-actions {
    background: rgba(17,24,39,0.95); padding: 6px 10px; display: flex; gap: 6px;
    flex-shrink: 0; border-top: 1px solid var(--el-border);
}
.term-actions button {
    padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px;
    cursor: pointer; font-weight: 600;
}
.term-actions .action-accept { background: var(--el-success); color: #fff; }
.term-actions .action-decline { background: var(--el-danger); color: #fff; }
.term-actions .action-choice { background: var(--el-border); color: var(--el-text); border: 1px solid var(--el-border); }
</style>
</head>
<body>

<div id="q-app">
  <hort-app></hort-app>
</div>

<script src="/static/vendor/xterm.min.js"></script>
<script src="/static/vendor/xterm-addon-fit.min.js"></script>
<script src="/static/vendor/xterm-addon-web-links.min.js"></script>
<script src="/static/vendor/vue.global.prod.js"></script>
<script src="/static/vendor/quasar.umd.prod.js"></script>
<script src="/static/vendor/hort-ext.js"></script>
<script>
(function () {
  'use strict';

  const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted, nextTick, toRaw } = Vue;

  // ===== SHARED STATE =====
  const state = reactive({
    // Connection
    sessionId: null,
    controlWs: null,
    streamWs: null,
    connected: false,
    serverVersion: '',

  // ===== PERSISTENCE HELPERS =====
  function loadGroups() {

  // ===== CONTROL WS =====
  let pendingRequests = {};
  let requestId = 0;
  let heartbeatTimer = null;
  let reconnectTimer = null;

  function sendControl(msg) {
    if (state.controlWs && state.controlWs.readyState === WebSocket.OPEN) {
      state.controlWs.send(JSON.stringify(msg));
    }
  }

  function sendControlRequest(msg) {
    return new Promise((resolve) => {
      const id = ++requestId;
      pendingRequests[id] = resolve;
      msg._req_id = id;
      sendControl(msg);
      // Timeout after 10s
      setTimeout(() => {
        if (pendingRequests[id]) {
          delete pendingRequests[id];
          resolve(null);
        }
      }, 10000);
    });
  }

  async function initSession() {
    try {
      const resp = await fetch('/api/session', { method: 'POST' });
      const data = await resp.json();
      state.sessionId = data.session_id;
      connectControlWs();
    } catch (e) {
      console.error('Failed to create session:', e);
      setTimeout(initSession, 2000);
    }
  }

  function connectControlWs() {
    if (state.controlWs) {
      state.controlWs.close();
      state.controlWs = null;
    }
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws/control/${state.sessionId}`);
    state.controlWs = ws;

    ws.onopen = () => {
      state.connected = true;
      startHeartbeat();
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleControlMessage(msg);
      } catch {}
    };

    ws.onclose = () => {
      state.connected = false;
      stopHeartbeat();
      // Reconnect
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        if (state.sessionId) connectControlWs();
      }, 1000);
    };

    ws.onerror = () => {};
  }

  function handleControlMessage(msg) {
    // Check if this is a response to a pending request
    if (msg._req_id && pendingRequests[msg._req_id]) {
      pendingRequests[msg._req_id](msg);
      delete pendingRequests[msg._req_id];
      // Still process the message for side effects
    }

    switch (msg.type) {
      case 'connected':
        state.serverVersion = msg.version || '';
        requestTargets();
        requestTerminalList();
        sendControl({ type: 'tunnel_status' });
        break;
      case 'windows_list':
        handleWindowsList(msg);
        break;
      case 'thumbnail':
        handleThumbnail(msg);
        break;
      case 'status':
        state.observerCount = msg.observers || 0;
        break;
      case 'spaces':
        handleSpaces(msg);
        break;
      case 'space_switched':
        if (msg.ok) {
          requestSpaces();
          requestWindows();
        }
        break;
      case 'stream_config_ack':
        break;
      case 'stream_error':
        handleStreamError(msg);
        break;
      case 'targets_list':
        state.targets = msg.targets || [];
        state.activeTarget = msg.active || 'all';
        break;
      case 'target_changed':
        // Server acknowledges target change — already handled client-side
        break;
      case 'terminal_spawned':
        state.terminals.push({
          terminal_id: msg.terminal_id,
          target_id: msg.target_id,
          title: msg.title,
          alive: true,
        });
        state.activeTerminalId = msg.terminal_id;
        state.view = 'terminal';
        break;
      case 'terminal_list':
        state.terminals = msg.terminals || [];
        break;
      case 'terminal_closed':
        state.terminals = state.terminals.filter(t => t.terminal_id !== msg.terminal_id);
        if (state.activeTerminalId === msg.terminal_id) {
          state.activeTerminalId = null;
          if (state.view === 'terminal') state.view = 'picker';
        }
        break;
      case 'tunnel_status':
        state.tunnelActive = msg.active || false;
        state.tunnelServerUrl = msg.server_url || '';
        break;
      case 'token_created':
      case 'token_list':
      case 'token_verified':
      case 'tokens_revoked':
        // Handled by extension/plugin that requested them
        break;
      case 'heartbeat_ack':
        break;
    }
  }

  function startHeartbeat() {
    stopHeartbeat();

  function stopHeartbeat() {
    clearInterval(heartbeatTimer);

  function requestTargets() {
    sendControl({ type: 'list_targets' });

    state.activeTarget = targetId;

    sendControl({ type: 'terminal_list' });

  function requestWindows() {
    sendControl({ type: 'list_windows', app_filter: state.appFilter || '' });
  }

  function handleWindowsList(msg) {
    const newWindows = msg.windows || [];
    const newNames = msg.app_names || [];
    // Only update if data actually changed — prevents unnecessary re-renders
    const oldIds = state.allWindows.map(w => w.window_id).join(',');
    const newIds = newWindows.map(w => w.window_id).join(',');
    if (oldIds !== newIds || JSON.stringify(state.appNames) !== JSON.stringify(newNames)) {
      state.allWindows = newWindows;
      state.appNames = newNames;
      computeNavWindows();
    }
  }

  function requestThumbnail(windowId, targetId) {
    const msg = { type: 'get_thumbnail', window_id: windowId };
    if (targetId) msg.target_id = targetId;
    sendControl(msg);
  }

  // 1x1 transparent PNG (valid, generated by PIL)
  const PLACEHOLDER_THUMB = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR4nGNgYGBgAAAABQABpfZFQAAAAABJRU5ErkJggg==';

  function handleThumbnail(msg) {
    if (msg.data) {
      thumbnailCache[msg.window_id] = 'data:image/jpeg;base64,' + msg.data;
    } else {
      thumbnailCache[msg.window_id] = PLACEHOLDER_THUMB;
    }
    state.thumbCounter++; // Trigger reactivity
  }

  function getThumbnailSrc(windowId) {
    // Access thumbCounter to make this reactive
    void state.thumbCounter;
    return thumbnailCache[windowId] || PLACEHOLDER_THUMB;

  function onThumbError(event) {

  function requestStatus() {
    sendControl({ type: 'get_status' });
  }

  function requestSpaces() {
    sendControl({ type: 'get_spaces' });

    state.spacesData = {

      current: msg.current || 1,
      count: msg.count || 0,

  function switchSpace(index) {
    sendControl({ type: 'switch_space', index });
  }

  // ===== NAV =====
  function currentWindow() {
    return state.navWindows[state.navIndex] || null;
  }

  function computeNavWindows() {
    // First filter by active target (client-side, instant)
    let base = state.allWindows;
    if (state.activeTarget !== 'all') {
      base = base.filter(w => w.target_id === state.activeTarget);
    }

    if (state.navMode === 'all') {
      state.navWindows = [...base];
    } else if (state.navMode === 'app') {
      const cur = currentWindow();
      const appName = cur ? cur.owner_name : '';
      state.navWindows = base.filter(w => w.owner_name === appName);
    } else {
      const groups = loadGroups();
      const ids = groups[state.navMode] || [];
      state.navWindows = ids.map(id => base.find(w => w.window_id === id)).filter(Boolean);
    }
  }

  // ===== STREAM WS =====
  let fpsTimer = null;
  let statusTimer = null;

  function connectStreamWs() {
    disconnectStreamWs();
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws/stream/${state.sessionId}`);
    ws.binaryType = 'arraybuffer';
    state.streamWs = ws;

    ws.onopen = () => {
      startFpsCounter();
    };

    ws.onmessage = (e) => {
      if (e.data instanceof ArrayBuffer) {
        const blob = new Blob([e.data], { type: 'image/jpeg' });
        const url = URL.createObjectURL(blob);
        if (state.prevBlobUrl) URL.revokeObjectURL(state.prevBlobUrl);
        state.prevBlobUrl = state.streamBlobUrl;
        state.streamBlobUrl = url;
        state.frameCount++;
      }
    };

    ws.onclose = () => {
      // Reconnect only if we're still in viewer mode with an active window
      if (state.view === 'viewer' && currentWindow()) {
        setTimeout(connectStreamWs, 1000);
      }
    };
  }

  function disconnectStreamWs() {
    if (state.streamWs) {
      state.streamWs.close();
      state.streamWs = null;
    }
    stopFpsCounter();
  }

  function sendStreamConfig(windowId, targetId) {
    const msg = {
      type: 'stream_config',
      window_id: windowId,
      fps: state.fps,
      quality: state.quality,
      max_width: state.maxWidth,
      screen_width: window.innerWidth,
      screen_dpr: window.devicePixelRatio || 1,
    };
    if (targetId) msg.target_id = targetId;
    sendControl(msg);
  }

  function startFpsCounter() {
    state.frameCount = 0;
    fpsTimer = setInterval(() => {
      state.fpsText = state.frameCount + ' fps';
      state.frameCount = 0;
    }, 1000);
    requestStatus();
    statusTimer = setInterval(requestStatus, 5000);
  }

  function stopFpsCounter() {
    clearInterval(fpsTimer);
    clearInterval(statusTimer);
    state.fpsText = '';
    state.observerCount = 0;
  }

  function handleStreamError(msg) {
    // Window likely closed - refresh and switch
    requestWindows();
    // The windows_list response will trigger computeNavWindows and the viewer will adapt
  }

  function sendInput(data) {
    sendControl({ type: 'input', ...data });
  }

  // ===== THUMBNAIL REFRESH =====
  let thumbRefreshTimer = null;

  function startThumbRefresh() {
    stopThumbRefresh();
    thumbRefreshTimer = setInterval(() => {
      if (state.view !== 'viewer' || state.overviewOpen) return;
      state.navWindows.forEach(w => requestThumbnail(w.window_id));
    }, 5000);
  }

  function stopThumbRefresh() {
    clearInterval(thumbRefreshTimer);
  }

  // ===== PICKER REFRESH =====
  let pickerRefreshTimer = null;

  function startPickerRefresh() {
    stopPickerRefresh();
    refreshPicker();
    pickerRefreshTimer = setInterval(refreshPicker, 10000);
  }

  function stopPickerRefresh() {
    clearInterval(pickerRefreshTimer);
  }

  function refreshPicker() {
    // Only refresh when picker is visible — don't waste bandwidth/CPU during viewer/terminal
    if (state.view !== 'picker') return;
    requestTargets();
    requestWindows();
    requestSpaces();
    requestTerminalList();
    // Request thumbnails for current nav windows after a short delay for windows_list to arrive
    setTimeout(() => {
      if (state.view === 'picker') {
        state.navWindows.forEach(w => requestThumbnail(w.window_id));
      }
    }, 300);
  }

  // ===== ESCAPE HELPER =====
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ===== DRAG HELPER for floating keys =====
  function setupDrag(el) {
    let startX, startY, origX, origY;
    const handle = el.querySelector('.drag-handle');
    if (!handle) return;
    const onStart = (e) => {
      const touch = e.touches ? e.touches[0] : e;
      startX = touch.clientX; startY = touch.clientY;
      const rect = el.getBoundingClientRect();
      origX = rect.left; origY = rect.top;
      const onMove = (e2) => {
        const t = e2.touches ? e2.touches[0] : e2;
        el.style.left = (origX + t.clientX - startX) + 'px';
        el.style.top = (origY + t.clientY - startY) + 'px';
        el.style.bottom = 'auto';
      };
      const onEnd = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onEnd);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
    };
    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart, { passive: false });
  }

  // COMPONENT: hort-group-modal

  const HortGroupModal = {
    template: `
      <div class="group-modal-overlay" :class="{ open: state.groupModalOpen }" @click.self="cancel">

            <button v-if="state.groupModalEditing" class="modal-delete" @click="doDelete">Delete</button>
            <button class="modal-save" @click="save">Save</button>
          </div>
        </div>
      </div>
    `,
    setup() {
      const nameInput = ref(null);

      watch(() => state.groupModalOpen, (open) => {
        if (open) nextTick(() => { if (nameInput.value) nameInput.value.focus(); });
      });

      function save() {
        const n = state.groupModalName.trim();
        if (!n) return;
        if (state.groupModalCallback) {
          state.groupModalCallback(n);
          closeModal();
          return;
        }
        const g = loadGroups();
        if (state.groupModalEditing && state.groupModalEditing !== n) {
          g[n] = g[state.groupModalEditing] || [];
          delete g[state.groupModalEditing];
          if (state.navMode === state.groupModalEditing) state.navMode = n;
        } else if (!state.groupModalEditing) {
          g[n] = [];
        }
        saveGroups(g);
        closeModal();
        computeNavWindows();
      }

      function doDelete() {
        if (!state.groupModalEditing) return;
        const g = loadGroups();
        delete g[state.groupModalEditing];
        saveGroups(g);
        if (state.navMode === state.groupModalEditing) state.navMode = 'all';
        closeModal();
        computeNavWindows();
      }

      function cancel() {
        closeModal();
      }

      function closeModal() {
        state.groupModalOpen = false;
        state.groupModalEditing = null;
        state.groupModalCallback = null;
      }

      return { state, nameInput, save, doDelete, cancel };
    },
  };
