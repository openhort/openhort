<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link rel="apple-touch-icon" href="/api/icon/192">
<title>hort</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e; color: #eee;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
}

/* ===== PICKER VIEW ===== */
.header {
    position: sticky; top: 0; z-index: 100;
    background: #16213e; padding: 10px 12px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    border-bottom: 1px solid #0f3460;
}
.header h1 { font-size: 15px; color: #e94560; flex-shrink: 0; }
.header select {
    flex: 1; min-width: 0; background: #0f3460; color: #eee;
    border: 1px solid #e94560; border-radius: 6px; padding: 7px 10px; font-size: 13px;
    -webkit-appearance: none; appearance: none;
}
#picker { padding: 8px; }
.win-card {
    display: flex; align-items: center; gap: 10px;
    background: #16213e; border-radius: 10px; padding: 8px 12px;
    margin-bottom: 6px; cursor: pointer;
    border: 1px solid transparent; transition: border-color 0.15s; min-height: 54px;
}
.win-card:active, .win-card:hover { border-color: #e94560; }
.win-card.in-group { border-color: #0f3460; }
.win-thumb { width: 80px; height: 50px; border-radius: 5px; object-fit: cover; background: #0f3460; flex-shrink: 0; }
.win-info { flex: 1; overflow: hidden; }
.win-app { font-size: 12px; color: #e94560; font-weight: 600; }
.win-name { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.win-add-btn {
    background: none; border: 1px solid #333; color: #666; border-radius: 50%;
    width: 28px; height: 28px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
}
.win-add-btn:hover { border-color: #e94560; color: #e94560; }
.win-add-btn.added { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.15); }
#status { text-align: center; padding: 40px 20px; color: #666; font-size: 14px; }

/* Groups bar */
#spaces-bar {
    display: none; gap: 6px; padding: 8px 12px 4px; align-items: center;
}
#spaces-bar.visible { display: flex; }
#spaces-bar .spaces-label { font-size: 11px; color: #666; margin-right: 2px; }
.space-btn {
    width: 32px; height: 24px; border-radius: 6px; border: 1px solid #333;
    background: #0f3460; color: #aaa; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
}
.space-btn:hover { border-color: #e94560; color: #eee; }
.space-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
#viewer-spaces {
    display: none; align-items: center; gap: 2px; flex-shrink: 0;
    background: #0f3460; border-radius: 6px; padding: 2px 4px;
}
#viewer-spaces.visible { display: inline-flex; }
#space-label { font-size: 11px; color: #e94560; min-width: 22px; text-align: center; font-variant-numeric: tabular-nums; }
.space-nav-btn {
    background: none; border: none; color: #aaa; font-size: 14px;
    cursor: pointer; padding: 2px 4px; display: flex; align-items: center;
}
.space-nav-btn:hover { color: #e94560; }

#groups-bar {
    display: flex; gap: 6px; padding: 8px 12px 4px; overflow-x: auto; scrollbar-width: none;
}
#groups-bar::-webkit-scrollbar { display: none; }
.group-chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 16px;
    background: #0f3460; border: 1px solid #333; color: #aaa;
    font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.group-chip:hover { border-color: #e94560; color: #eee; }
.group-chip.active { background: #e94560; color: #fff; border-color: #e94560; }
.group-chip.new-group { border-style: dashed; border-color: #666; color: #666; }
.group-chip.new-group:hover { border-color: #e94560; color: #e94560; }

/* ===== VIEWER ===== */
#viewer {
    display: none; position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh; background: #000;
    touch-action: none; overflow: hidden;
}
#stream-container {
    position: absolute;
    top: calc(44px + env(safe-area-inset-top, 0px));
    left: env(safe-area-inset-left, 0px);
    right: env(safe-area-inset-right, 0px);
    bottom: calc(62px + env(safe-area-inset-bottom, 0px));
    overflow: hidden;
}
#stream-img {
    position: absolute; top: 0; left: 0; transform-origin: 0 0;
}

/* Active mode */
#viewer.active-mode #stream-container { cursor: none; }
#viewer.active-mode .nav-arrow { display: none; }
#mode-btn.active { background: #e94560; color: #fff; border-color: #e94560; }

/* Remote cursor indicator */
#remote-cursor {
    display: none; position: absolute; z-index: 180; pointer-events: none;
    width: 24px; height: 24px; transform: translate(-2px, -2px);
}
#remote-cursor svg { width: 100%; height: 100%; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8)); }
#viewer.active-mode #remote-cursor { display: block; }
#click-ripple {
    display: none; position: absolute; z-index: 179; pointer-events: none;
    width: 40px; height: 40px; transform: translate(-20px, -20px);
    border: 2px solid #e94560; border-radius: 50%;
    animation: ripple 0.4s ease-out forwards;
}
@keyframes ripple {
    0% { transform: translate(-20px,-20px) scale(0.3); opacity: 1; }
    100% { transform: translate(-20px,-20px) scale(1.5); opacity: 0; }
}

/* Viewer header */
#viewer-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(22, 33, 62, 0.9);
    padding: calc(6px + env(safe-area-inset-top, 0px)) calc(10px + env(safe-area-inset-right, 0px)) 6px calc(10px + env(safe-area-inset-left, 0px));
    display: flex; align-items: center; gap: 6px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.back-btn {
    background: #e94560; color: white; border: none; border-radius: 6px;
    padding: 6px 10px; font-size: 13px; cursor: pointer; font-weight: 600; flex-shrink: 0;
}
#nav-mode-select {
    background: #0f3460; color: #eee; border: 1px solid #333; border-radius: 6px;
    padding: 5px 8px; font-size: 12px; flex-shrink: 0; max-width: 140px;
    -webkit-appearance: none; appearance: none;
}
#viewer-title {
    flex: 1; font-size: 12px; color: #aaa; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#nav-counter { font-size: 11px; color: #e94560; flex-shrink: 0; font-variant-numeric: tabular-nums; }
#fps-display { font-size: 10px; color: #555; flex-shrink: 0; }
#observer-count { font-size: 10px; color: #555; flex-shrink: 0; }
.hdr-btn {
    background: rgba(22, 33, 62, 0.7); border: 1px solid #0f3460;
    color: #aaa; font-size: 16px; width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s; flex-shrink: 0;
}
.hdr-btn:hover, .hdr-btn.active { background: #e94560; color: #fff; border-color: #e94560; }

/* Nav arrows */
.nav-arrow {
    position: fixed; top: 50%; z-index: 250; transform: translateY(-50%);
    background: rgba(22,33,62,0.6); border: 1px solid rgba(15,52,96,0.5);
    color: #aaa; font-size: 26px; width: 40px; height: 72px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
}
.nav-arrow:hover { background: #e94560; color: #fff; }
#nav-prev { left: env(safe-area-inset-left, 0px); border-radius: 0 8px 8px 0; }
#nav-next { right: env(safe-area-inset-right, 0px); border-radius: 8px 0 0 8px; }

/* Bottom thumbnail strip */
#thumb-strip {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(22,33,62,0.92);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; overflow-x: auto; gap: 6px;
    padding: 6px calc(10px + env(safe-area-inset-right, 0px)) calc(6px + env(safe-area-inset-bottom, 0px)) calc(10px + env(safe-area-inset-left, 0px));
    scrollbar-width: none;
}
#thumb-strip::-webkit-scrollbar { display: none; }
.strip-item {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer;
}
.strip-item img {
    width: 68px; height: 44px; border-radius: 5px; object-fit: cover;
    background: #0f3460; border: 2px solid transparent; opacity: 0.5;
    transition: opacity 0.15s, border-color 0.15s;
}
.strip-item:hover img { opacity: 0.9; }
.strip-item.active img { border-color: #e94560; opacity: 1; }
.strip-item span {
    font-size: 9px; color: #666; max-width: 68px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
}
.strip-item.active span { color: #e94560; }

/* Settings panel */
#settings-panel {
    display: none; position: fixed;
    top: calc(44px + env(safe-area-inset-top, 0px));
    right: calc(12px + env(safe-area-inset-right, 0px));
    z-index: 300;
    background: rgba(22,33,62,0.95); border: 1px solid #0f3460;
    border-radius: 12px; padding: 14px 18px; min-width: 240px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#settings-panel.open { display: block; }
#settings-panel h3 { font-size: 11px; color: #e94560; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px; }
.setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.setting-row:last-child { margin-bottom: 0; }
.setting-row label { font-size: 12px; color: #999; min-width: 65px; flex-shrink: 0; }
.setting-row input[type=range] { flex: 1; accent-color: #e94560; }
.setting-val { font-size: 12px; color: #e94560; min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
.setting-row select {
    flex: 1; background: #0f3460; color: #eee; border: 1px solid #333;
    border-radius: 6px; padding: 5px 8px; font-size: 12px;
}

/* Minimap */
#minimap {
    display: none; position: fixed;
    bottom: calc(70px + env(safe-area-inset-bottom, 0px));
    right: calc(12px + env(safe-area-inset-right, 0px));
    z-index: 250;
    background: rgba(22,33,62,0.9); border: 1px solid #0f3460; border-radius: 8px;
    padding: 6px; backdrop-filter: blur(8px);
}
#minimap.visible { display: block; }
#minimap-wrap {
    position: relative; width: 180px; cursor: crosshair; overflow: hidden; border-radius: 4px;
}
#minimap-img { width: 100%; display: block; background: #0f3460; }
#minimap-viewport {
    position: absolute; border: 2px solid #e94560; background: rgba(233,69,96,0.1);
    pointer-events: none; border-radius: 2px;
}
#minimap-nav {
    display: flex; gap: 4px; margin-top: 6px;
}
#minimap-nav button {
    flex: 1; background: #0f3460; border: 1px solid #333; color: #aaa;
    border-radius: 4px; padding: 4px; font-size: 11px; cursor: pointer; font-weight: 600;
}
#minimap-nav button:hover { background: #e94560; color: #fff; border-color: #e94560; }

/* Overview grid */
#overview {
    display: none; position: fixed; inset: 0; z-index: 350;
    background: rgba(0,0,0,0.85); overflow-y: auto; padding: 50px 16px 16px;
}
#overview.open { display: block; }
#overview-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 360;
    background: rgba(22,33,62,0.95); padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(8px);
}
#overview-spaces { display: inline-flex; gap: 3px; flex-shrink: 0; }
#overview-header h2 { flex: 1; font-size: 15px; color: #e94560; }
#overview-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
}
.overview-card {
    background: #16213e; border-radius: 8px; padding: 8px; cursor: pointer;
    border: 1px solid transparent; transition: border-color 0.15s;
}
.overview-card:hover { border-color: #e94560; }
.overview-card.current { border-color: #e94560; }
.overview-card img {
    width: 100%; aspect-ratio: 16/10; object-fit: cover; border-radius: 5px;
    background: #0f3460;
}
.overview-card .ov-app { font-size: 11px; color: #e94560; margin-top: 6px; font-weight: 600; }
.overview-card .ov-name { font-size: 10px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Group modal */
#group-modal {
    display: none; position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
}
#group-modal.open { display: flex; }
#group-modal-content {
    background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
    padding: 20px; width: 90%; max-width: 360px;
}
#group-modal-content h3 { color: #e94560; margin-bottom: 12px; font-size: 15px; }
#group-modal-content input {
    width: 100%; background: #0f3460; color: #eee; border: 1px solid #333;
    border-radius: 6px; padding: 10px; font-size: 14px; margin-bottom: 12px;
}
#group-modal-content input:focus { outline: none; border-color: #e94560; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
    flex: 1; padding: 10px; border: none; border-radius: 6px;
    font-size: 14px; cursor: pointer; font-weight: 600;
}
.modal-save { background: #e94560; color: #fff; }
.modal-cancel { background: #0f3460; color: #aaa; }
.modal-delete { background: #333; color: #e94560; flex: 0; padding: 10px 16px; }
</style>
</head>
<body>

<!-- PICKER VIEW -->
<div id="picker-view">
    <div class="header">
        <h1>llming-control</h1>
        <select id="app-filter"><option value="">All Apps</option></select>
    </div>
    <div id="spaces-bar"></div>
    <div id="groups-bar"></div>
    <div id="picker"></div>
    <div id="status">Loading windows...</div>
</div>

<!-- VIEWER -->
<div id="viewer">
    <div id="viewer-header">
        <button class="back-btn" id="back-btn"><i class="ph ph-arrow-left"></i></button>
        <span id="viewer-spaces">
            <button class="space-nav-btn" id="space-prev" title="Previous Space"><i class="ph-bold ph-caret-left"></i></button>
            <span id="space-label">1/2</span>
            <button class="space-nav-btn" id="space-next" title="Next Space"><i class="ph-bold ph-caret-right"></i></button>
        </span>
        <select id="nav-mode-select"></select>
        <span id="viewer-title"></span>
        <span id="nav-counter"></span>
        <span id="observer-count"></span>
        <span id="fps-display"></span>
        <button class="hdr-btn" id="mode-btn" title="Toggle active mode (I)"><i class="ph ph-eye"></i></button>
        <button class="hdr-btn" id="fit-btn" title="Auto-fit (F)"><i class="ph-bold ph-corners-out"></i></button>
        <button class="hdr-btn" id="fitv-btn" title="Fit vertical (V)"><i class="ph-bold ph-arrows-out-line-vertical"></i></button>
        <button class="hdr-btn" id="overview-btn" title="Overview (G)"><i class="ph ph-squares-four"></i></button>
        <button class="hdr-btn" id="gear-btn"><i class="ph ph-gear-six"></i></button>
    </div>
    <button class="nav-arrow" id="nav-prev"><i class="ph-bold ph-caret-left"></i></button>
    <button class="nav-arrow" id="nav-next"><i class="ph-bold ph-caret-right"></i></button>
    <div id="stream-container">
        <img id="stream-img" alt="">
        <div id="remote-cursor">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 4L10.5 20L13 13L20 10.5L4 4Z" fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
        </div>
        <div id="click-ripple"></div>
    </div>
    <div id="minimap">
        <div id="minimap-wrap">
            <img id="minimap-img" alt="">
            <div id="minimap-viewport"></div>
        </div>
        <div id="minimap-nav">
            <button id="mm-left">L</button>
            <button id="mm-center">M</button>
            <button id="mm-right">R</button>
        </div>
    </div>
    <div id="thumb-strip"></div>
    <div id="settings-panel">
        <h3>Settings</h3>
        <div class="setting-row">
            <label>Quality</label>
            <input type="range" id="quality-slider" min="10" max="100" value="70" step="5">
            <span class="setting-val" id="quality-val">70</span>
        </div>
        <div class="setting-row">
            <label>FPS</label>
            <input type="range" id="fps-slider" min="1" max="60" value="15" step="1">
            <span class="setting-val" id="fps-val">15</span>
        </div>
        <div class="setting-row">
            <label>Max Width</label>
            <select id="resolution-select">
                <option value="640">640px</option>
                <option value="800">800px</option>
                <option value="1200">1200px</option>
                <option value="1920" selected>1920px</option>
                <option value="2560">2560px</option>
                <option value="3840">3840px</option>
                <option value="5140">5140px (full)</option>
            </select>
        </div>
        <div class="setting-row">
            <label>Fullscreen</label>
            <button class="hdr-btn" id="fullscreen-btn" style="width:auto;border-radius:6px;padding:4px 12px;font-size:12px"><i class="ph ph-arrows-out"></i> Toggle</button>
        </div>
    </div>
</div>

<!-- OVERVIEW -->
<div id="overview">
    <div id="overview-header">
        <button class="back-btn" id="overview-close"><i class="ph ph-x"></i></button>
        <span id="overview-spaces"></span>
        <h2>All Windows</h2>
    </div>
    <div id="overview-grid"></div>
</div>

<!-- GROUP MODAL -->
<div id="group-modal">
    <div id="group-modal-content">
        <h3 id="group-modal-title">New Group</h3>
        <input id="group-name-input" placeholder="Group name (e.g. Debug Pair)" maxlength="30">
        <div class="modal-btns">
            <button class="modal-cancel" id="group-cancel">Cancel</button>
            <button class="modal-delete" id="group-delete" style="display:none">Delete</button>
            <button class="modal-save" id="group-save">Save</button>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== ELEMENTS =====
    const $ = id => document.getElementById(id);
    const pickerView = $('picker-view'), viewer = $('viewer'), picker = $('picker');
    const statusEl = $('status'), appFilter = $('app-filter');
    const backBtn = $('back-btn'), viewerTitle = $('viewer-title');
    const fpsDisplay = $('fps-display'), navCounter = $('nav-counter'), observerCount = $('observer-count');
    const streamImg = $('stream-img'), streamContainer = $('stream-container');
    const qualitySlider = $('quality-slider'), qualityVal = $('quality-val');
    const fpsSlider = $('fps-slider'), fpsVal = $('fps-val');
    const resolutionSelect = $('resolution-select');
    const gearBtn = $('gear-btn'), settingsPanel = $('settings-panel');
    const fitBtn = $('fit-btn'), fitvBtn = $('fitv-btn'), modeBtn = $('mode-btn');
    const overviewBtn = $('overview-btn'), overviewEl = $('overview');
    const overviewGrid = $('overview-grid'), overviewClose = $('overview-close');
    const navPrev = $('nav-prev'), navNext = $('nav-next');
    const thumbStrip = $('thumb-strip'), groupsBar = $('groups-bar');
    const spacesBar = $('spaces-bar'), viewerSpaces = $('viewer-spaces'), overviewSpaces = $('overview-spaces');
    const spacePrev = $('space-prev'), spaceNext = $('space-next'), spaceLabel = $('space-label');
    const navModeSelect = $('nav-mode-select');
    const groupModal = $('group-modal'), groupNameInput = $('group-name-input');
    const groupSave = $('group-save'), groupCancel = $('group-cancel');
    const groupDelete = $('group-delete'), groupModalTitle = $('group-modal-title');
    const minimapEl = $('minimap'), minimapImg = $('minimap-img');
    const minimapViewport = $('minimap-viewport'), minimapWrap = $('minimap-wrap');

    // ===== STATE =====
    let ws = null, currentConfig = null, refreshTimer = null;
    let prevBlobUrl = null, frameCount = 0, fpsTimer = null;
    let allWindows = [], navWindows = [], navIndex = 0;
    let activeGroupName = null;
    let navMode = 'all'; // 'all' | 'app' | group name
    let scale = 1, tx = 0, ty = 0;
    let fitMode = 'auto'; // 'auto' | 'vertical' | 'custom'
    let activeMode = false; // true = interact with remote, false = viewer only
    let imgNatW = 0, imgNatH = 0;

    // Touch/gesture state
    let lastDist = 0, lastMid = null;
    let isPanning = false, panStartX = 0, panStartY = 0, panTxStart = 0, panTyStart = 0;
    let lastTapTime = 0;
    let swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
    let mousePanning = false, mousePanStartX = 0, mousePanStartY = 0, mousePanTxStart = 0, mousePanTyStart = 0;

    const apiBase = window.location.origin;

    // ===== PERSISTENCE (all client-side) =====
    function loadGroups() { try { return JSON.parse(localStorage.getItem('llming-groups') || '{}'); } catch { return {}; } }
    function saveGroups(g) { localStorage.setItem('llming-groups', JSON.stringify(g)); }

    function saveWindowState(winId) {
        if (!winId) return;
        const states = loadAllWindowStates();
        states[winId] = { scale, tx, ty, fitMode };
        localStorage.setItem('llming-wstates', JSON.stringify(states));
    }
    function loadWindowState(winId) {
        const states = loadAllWindowStates();
        return states[winId] || null;
    }
    function loadAllWindowStates() {
        try { return JSON.parse(localStorage.getItem('llming-wstates') || '{}'); } catch { return {}; }
    }

    // ===== API =====
    async function fetchWindows(filter) {
        const params = filter ? `?app_filter=${encodeURIComponent(filter)}` : '';
        const resp = await fetch(`${apiBase}/api/windows${params}`);
        return await resp.json();
    }

    // ===== WINDOW LIST =====
    function currentWindow() { return navWindows[navIndex] || null; }

    function computeNavWindows() {
        if (navMode === 'all') {
            navWindows = [...allWindows];
        } else if (navMode === 'app') {
            const cur = currentWindow();
            const appName = cur ? cur.owner_name : '';
            navWindows = allWindows.filter(w => w.owner_name === appName);
        } else {
            // group name
            const groups = loadGroups();
            const ids = groups[navMode] || [];
            navWindows = ids.map(id => allWindows.find(w => w.window_id === id)).filter(Boolean);
        }
    }

    // ===== SPACES =====
    let spacesData = { spaces: [], current: 1, count: 0 };

    async function refreshSpaces() {
        try {
            const resp = await fetch(`${apiBase}/api/spaces`);
            spacesData = await resp.json();
        } catch { return; }
        const hidden = spacesData.count <= 1;

        // Picker bar
        spacesBar.classList.toggle('visible', !hidden);
        if (!hidden) {
            spacesBar.innerHTML = '<span class="spaces-label"><i class="ph ph-monitor"></i></span>';
            overviewSpaces.innerHTML = '';
            spacesData.spaces.forEach(sp => {
                const btn = document.createElement('button');
                btn.className = 'space-btn' + (sp.is_current ? ' active' : '');
                btn.textContent = sp.index;
                btn.addEventListener('click', () => doSwitchSpace(sp.index));
                spacesBar.appendChild(btn);
                const btn2 = btn.cloneNode(true);
                btn2.addEventListener('click', () => doSwitchSpace(sp.index));
                overviewSpaces.appendChild(btn2);
            });
        }

        // Viewer header: prev/next
        viewerSpaces.classList.toggle('visible', !hidden);
        if (!hidden) {
            spaceLabel.textContent = `${spacesData.current}/${spacesData.count}`;
        }
    }

    async function doSwitchSpace(index) {
        await fetch(`${apiBase}/api/spaces/${index}`, { method: 'POST' });
        // Server waits for the switch to complete, so we can refresh immediately
        await refreshSpaces();
        const allData = await fetchWindows('');
        allWindows = allData.windows;
        computeNavWindows();
        if (overviewEl.classList.contains('open')) showOverview();
        renderThumbStrip();
    }

    spacePrev.addEventListener('click', () => {
        const target = spacesData.current > 1 ? spacesData.current - 1 : spacesData.count;
        doSwitchSpace(target);
    });
    spaceNext.addEventListener('click', () => {
        const target = spacesData.current < spacesData.count ? spacesData.current + 1 : 1;
        doSwitchSpace(target);
    });

    async function refreshWindowList() {
        refreshSpaces();
        try {
            // Always fetch all windows (unfiltered) for overview/nav
            const allData = await fetchWindows('');
            allWindows = allData.windows;

            // Fetch filtered list for picker display
            const filter = appFilter.value;
            const data = filter ? await fetchWindows(filter) : allData;

            const currentVal = appFilter.value;
            appFilter.innerHTML = '<option value="">All Apps</option>';
            allData.app_names.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.textContent = name;
                if (name === currentVal) opt.selected = true;
                appFilter.appendChild(opt);
            });

            computeNavWindows();
            renderGroupsBar();
            renderPicker();
        } catch {
            statusEl.style.display = 'block';
            statusEl.textContent = 'Connection error. Retrying...';
        }
    }

    function renderPicker() {
        const groups = loadGroups();
        if (navWindows.length === 0) {
            statusEl.style.display = 'block';
            statusEl.textContent = navMode !== 'all' ? 'Group is empty. Select "All" and add windows with +' : 'No windows found';
            picker.innerHTML = '';
            return;
        }
        statusEl.style.display = 'none';
        picker.innerHTML = '';

        navWindows.forEach((win, idx) => {
            const inAnyGroup = Object.values(groups).some(ids => ids.includes(win.window_id));
            const card = document.createElement('div');
            card.className = 'win-card';
            card.innerHTML = `
                <img class="win-thumb" src="${apiBase}/api/windows/${win.window_id}/thumbnail"
                     loading="lazy" alt="" onerror="this.style.display='none'">
                <div class="win-info">
                    <div class="win-app">${esc(win.owner_name)}</div>
                    <div class="win-name">${esc(win.window_name || '(untitled)')}</div>
                </div>`;
            const addBtn = document.createElement('button');
            addBtn.className = 'win-add-btn' + (inAnyGroup ? ' added' : '');
            addBtn.innerHTML = inAnyGroup ? '<i class="ph-fill ph-star"></i>' : '<i class="ph ph-plus"></i>';
            addBtn.addEventListener('click', e => { e.stopPropagation(); toggleGroupMembership(win); });
            card.appendChild(addBtn);
            card.addEventListener('click', () => { navIndex = idx; switchToWindow(navIndex); });
            picker.appendChild(card);
        });
    }

    function toggleGroupMembership(win) {
        const groups = loadGroups();
        const names = Object.keys(groups);
        if (names.length === 0) {
            openGroupModal(null, newName => { const g = loadGroups(); g[newName] = [win.window_id]; saveGroups(g); refreshWindowList(); });
            return;
        }
        const target = (navMode !== 'all' && navMode !== 'app') ? navMode : names[0];
        const g = loadGroups();
        if (!g[target]) g[target] = [];
        const idx = g[target].indexOf(win.window_id);
        if (idx >= 0) g[target].splice(idx, 1); else g[target].push(win.window_id);
        saveGroups(g);
        if (navMode !== 'all' && navMode !== 'app') computeNavWindows();
        renderPicker();
        renderGroupsBar();
    }

    // ===== GROUPS BAR =====
    function renderGroupsBar() {
        const groups = loadGroups();
        groupsBar.innerHTML = '';
        const chip = (text, isActive, onClick) => {
            const el = document.createElement('div');
            el.className = 'group-chip' + (isActive ? ' active' : '');
            el.textContent = text;
            el.addEventListener('click', onClick);
            return el;
        };
        groupsBar.appendChild(chip('All', navMode === 'all', () => { navMode = 'all'; activeGroupName = null; computeNavWindows(); renderGroupsBar(); renderPicker(); }));
        Object.keys(groups).forEach(name => {
            const c = chip(`${name} (${groups[name].length})`, navMode === name, () => {
                navMode = (navMode === name) ? 'all' : name;
                activeGroupName = navMode === 'all' ? null : name;
                computeNavWindows(); renderGroupsBar(); renderPicker();
            });
            c.addEventListener('contextmenu', e => { e.preventDefault(); openGroupModal(name); });
            c.addEventListener('dblclick', e => { e.preventDefault(); openGroupModal(name); });
            groupsBar.appendChild(c);
        });
        const nc = document.createElement('div');
        nc.className = 'group-chip new-group';
        nc.innerHTML = '<i class="ph ph-plus"></i> Group';
        nc.addEventListener('click', () => openGroupModal(null));
        groupsBar.appendChild(nc);
    }

    // ===== GROUP MODAL =====
    let editingGroupName = null, groupModalCallback = null;
    function openGroupModal(existing, cb) {
        editingGroupName = existing; groupModalCallback = cb || null;
        groupModalTitle.textContent = existing ? 'Edit Group' : 'New Group';
        groupNameInput.value = existing || '';
        groupDelete.style.display = existing ? 'block' : 'none';
        groupModal.classList.add('open');
        setTimeout(() => groupNameInput.focus(), 50);
    }
    function closeGroupModal() { groupModal.classList.remove('open'); editingGroupName = null; groupModalCallback = null; }
    groupSave.addEventListener('click', () => {
        const n = groupNameInput.value.trim(); if (!n) return;
        if (groupModalCallback) { groupModalCallback(n); closeGroupModal(); return; }
        const g = loadGroups();
        if (editingGroupName && editingGroupName !== n) {
            g[n] = g[editingGroupName] || []; delete g[editingGroupName];
            if (navMode === editingGroupName) navMode = n;
        } else if (!editingGroupName) { g[n] = []; }
        saveGroups(g); closeGroupModal(); computeNavWindows(); renderGroupsBar(); renderPicker();
    });
    groupDelete.addEventListener('click', () => {
        if (!editingGroupName) return;
        const g = loadGroups(); delete g[editingGroupName]; saveGroups(g);
        if (navMode === editingGroupName) navMode = 'all';
        closeGroupModal(); computeNavWindows(); renderGroupsBar(); renderPicker();
    });
    groupCancel.addEventListener('click', closeGroupModal);
    groupNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') groupSave.click(); if (e.key === 'Escape') closeGroupModal(); });
    groupModal.addEventListener('click', e => { if (e.target === groupModal) closeGroupModal(); });

    // ===== STREAMING & NAVIGATION =====
    function updateNavModeSelect() {
        const groups = loadGroups();
        const cur = currentWindow();
        navModeSelect.innerHTML = '';
        const add = (val, text) => { const o = document.createElement('option'); o.value = val; o.textContent = text; if (val === navMode) o.selected = true; navModeSelect.appendChild(o); };
        add('all', 'All Windows');
        if (cur) add('app', `App: ${cur.owner_name}`);
        Object.keys(groups).forEach(n => add(n, `Group: ${n} (${groups[n].length})`));
    }

    function switchToWindow(index) {
        if (navWindows.length === 0) return;
        // Save state of previous window
        if (currentConfig) saveWindowState(currentConfig.window_id);

        navIndex = ((index % navWindows.length) + navWindows.length) % navWindows.length;
        const win = navWindows[navIndex];

        // Persist current window so it survives page reload
        localStorage.setItem('llming-current-window', JSON.stringify({
            window_id: win.window_id, owner_name: win.owner_name,
            window_name: win.window_name
        }));

        pickerView.style.display = 'none';
        viewer.style.display = 'block';
        closeOverview();
        viewerTitle.textContent = `${win.owner_name} — ${win.window_name || '(untitled)'}`;
        navCounter.textContent = `${navIndex + 1}/${navWindows.length}`;
        refreshSpaces();
        clearInterval(refreshTimer);
        updateNavModeSelect();

        const quality = parseInt(qualitySlider.value, 10);
        const fps = parseInt(fpsSlider.value, 10);
        const maxWidth = parseInt(resolutionSelect.value, 10);

        // Always auto-fit on window switch — apply once first new frame arrives
        fitMode = 'auto';
        imgNatW = 0; imgNatH = 0;

        if (!currentConfig) {
            currentConfig = {
                window_id: win.window_id, fps, quality, max_width: maxWidth,
                screen_width: window.innerWidth, screen_dpr: window.devicePixelRatio || 1
            };
            connectWebSocket();
        } else {
            currentConfig.window_id = win.window_id;
            sendConfigUpdate();
        }

        renderThumbStrip();
    }

    function navPrevWindow() { switchToWindow(navIndex - 1); }
    function navNextWindow() { switchToWindow(navIndex + 1); }

    let windowLostPending = false;
    async function handleWindowLost() {
        if (windowLostPending) return;
        windowLostPending = true;
        try {
            // Refresh window list
            const data = await fetchWindows('');
            allWindows = data.windows;
            computeNavWindows();
            if (navWindows.length === 0) {
                stopStream();
                return;
            }
            // Clamp index and switch to next available window
            if (navIndex >= navWindows.length) navIndex = 0;
            switchToWindow(navIndex);
        } finally {
            windowLostPending = false;
        }
    }

    function renderThumbStrip() {
        thumbStrip.innerHTML = '';
        navWindows.forEach((win, idx) => {
            const item = document.createElement('div');
            item.className = 'strip-item' + (idx === navIndex ? ' active' : '');
            item.dataset.windowId = win.window_id;
            const img = document.createElement('img');
            img.src = thumbUrl(win.window_id);
            img.alt = '';
            const span = document.createElement('span');
            span.textContent = win.window_name || win.owner_name;
            item.appendChild(img); item.appendChild(span);
            item.addEventListener('click', () => switchToWindow(idx));
            thumbStrip.appendChild(item);
        });
        const active = thumbStrip.querySelector('.strip-item.active');
        if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    // Refresh thumb strip thumbnails every 5s during streaming
    setInterval(() => {
        if (viewer.style.display !== 'block' || overviewEl.classList.contains('open')) return;
        thumbCounter++;
        thumbStrip.querySelectorAll('.strip-item').forEach(item => {
            const img = item.querySelector('img');
            const wid = item.dataset.windowId;
            if (img && wid) img.src = thumbUrl(parseInt(wid, 10));
        });
    }, 5000);

    function connectWebSocket() {
        if (ws) { ws.close(); ws = null; }
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws/stream`);
        ws.binaryType = 'arraybuffer';
        ws.onopen = () => { ws.send(JSON.stringify(currentConfig)); startFpsCounter(); };
        ws.onmessage = e => {
            if (e.data instanceof ArrayBuffer) {
                const blob = new Blob([e.data], { type: 'image/jpeg' });
                const url = URL.createObjectURL(blob);
                streamImg.onload = () => {
                    if (prevBlobUrl) URL.revokeObjectURL(prevBlobUrl);
                    prevBlobUrl = url;
                    const newW = streamImg.naturalWidth;
                    const newH = streamImg.naturalHeight;
                    if (newW !== imgNatW || newH !== imgNatH) {
                        imgNatW = newW;
                        imgNatH = newH;
                        // Always auto-fit on first frame of a new window
                        applyAutoFit();
                    }
                    updateMinimap();
                };
                streamImg.src = url;
                minimapImg.src = url;
                frameCount++;
            } else {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.error) {
                        // Window likely closed — refresh list and switch to next
                        handleWindowLost();
                    }
                } catch {}
            }
        };
        ws.onclose = () => { if (viewer.style.display === 'block' && currentConfig) setTimeout(connectWebSocket, 1000); };
    }

    function stopStream() {
        if (currentConfig) saveWindowState(currentConfig.window_id);
        if (ws) { ws.close(); ws = null; }
        currentConfig = null;
        viewer.style.display = 'none';
        pickerView.style.display = 'block';
        closeOverview();
        if (prevBlobUrl) { URL.revokeObjectURL(prevBlobUrl); prevBlobUrl = null; }
        stopFpsCounter();
        settingsPanel.classList.remove('open');
        gearBtn.classList.remove('active');
        localStorage.removeItem('llming-current-window');
        startRefreshTimer();
    }

    function sendConfigUpdate() {
        if (currentConfig && ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(currentConfig));
    }

    // ===== FPS =====
    let statusTimer = null;
    function startFpsCounter() {
        frameCount = 0;
        fpsTimer = setInterval(() => { fpsDisplay.textContent = frameCount + ' fps'; frameCount = 0; }, 1000);
        pollStatus();
        statusTimer = setInterval(pollStatus, 5000);
    }
    function stopFpsCounter() {
        clearInterval(fpsTimer); fpsDisplay.textContent = '';
        clearInterval(statusTimer); observerCount.textContent = '';
    }
    async function pollStatus() {
        try {
            const resp = await fetch(`${apiBase}/api/status`);
            const data = await resp.json();
            observerCount.textContent = data.observers + (data.observers === 1 ? ' viewer' : ' viewers');
        } catch {}
    }

    // ===== ZOOM / PAN / FIT =====
    function applyTransform() {
        streamImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    }

    function containerSize() {
        const r = streamContainer.getBoundingClientRect();
        return { w: r.width, h: r.height };
    }

    function applyAutoFit() {
        if (!imgNatW || !imgNatH) return;
        const { w: vw, h: vh } = containerSize();
        scale = Math.min(vw / imgNatW, vh / imgNatH);
        tx = (vw - imgNatW * scale) / 2;
        ty = (vh - imgNatH * scale) / 2;
        fitMode = 'auto';
        applyTransform();
        updateMinimap();
    }

    function applyFitVertical() {
        if (!imgNatW || !imgNatH) return;
        const { w: vw, h: vh } = containerSize();
        scale = vh / imgNatH;
        tx = (vw - imgNatW * scale) / 2;
        ty = 0;
        fitMode = 'vertical';
        applyTransform();
        updateMinimap();
    }

    function jumpTo(position) {
        // position: 'left' | 'center' | 'right'
        if (!imgNatW) return;
        const vw = containerSize().w;
        const totalW = imgNatW * scale;
        if (position === 'left') tx = 0;
        else if (position === 'right') tx = -(totalW - vw);
        else tx = -(totalW - vw) / 2;
        fitMode = 'custom';
        applyTransform();
        updateMinimap();
    }

    // ===== MINIMAP =====
    function updateMinimap() {
        const cs = containerSize();
        const isZoomed = scale > Math.min(cs.w / imgNatW, cs.h / imgNatH) * 1.05;
        minimapEl.classList.toggle('visible', isZoomed && imgNatW > 0);
        if (!isZoomed || !imgNatW) return;

        const mmW = minimapWrap.clientWidth;
        const mmH = mmW * (imgNatH / imgNatW);
        minimapImg.style.height = mmH + 'px';
        const mmScale = mmW / imgNatW;

        const vl = Math.max(0, -tx / scale);
        const vt = Math.max(0, -ty / scale);
        const vw = Math.min(imgNatW, cs.w / scale);
        const vh = Math.min(imgNatH, cs.h / scale);

        minimapViewport.style.left = (vl * mmScale) + 'px';
        minimapViewport.style.top = (vt * mmScale) + 'px';
        minimapViewport.style.width = (vw * mmScale) + 'px';
        minimapViewport.style.height = (vh * mmScale) + 'px';
    }

    minimapWrap.addEventListener('click', e => {
        const rect = minimapWrap.getBoundingClientRect();
        const mmScale = minimapWrap.clientWidth / imgNatW;
        const imgX = (e.clientX - rect.left) / mmScale;
        const imgY = (e.clientY - rect.top) / mmScale;
        const cs = containerSize();
        tx = cs.w / 2 - imgX * scale;
        ty = cs.h / 2 - imgY * scale;
        fitMode = 'custom';
        applyTransform();
        updateMinimap();
    });

    $('mm-left').addEventListener('click', () => jumpTo('left'));
    $('mm-center').addEventListener('click', () => jumpTo('center'));
    $('mm-right').addEventListener('click', () => jumpTo('right'));

    // ===== OVERVIEW GRID =====
    let overviewTimer = null;
    let thumbCounter = 0;

    function thumbUrl(windowId) {
        return `${apiBase}/api/windows/${windowId}/thumbnail?v=${thumbCounter}`;
    }

    async function showOverview() {
        overviewEl.classList.add('open');
        thumbCounter++;
        renderOverviewGrid();
        clearInterval(overviewTimer);
        overviewTimer = setInterval(() => {
            if (!overviewEl.classList.contains('open')) { clearInterval(overviewTimer); return; }
            thumbCounter++;
            // Only update thumbnail src attributes, don't rebuild DOM
            overviewGrid.querySelectorAll('.overview-card img').forEach(img => {
                const wid = img.dataset.windowId;
                if (wid) img.src = thumbUrl(parseInt(wid, 10));
            });
        }, 5000);
    }

    function renderOverviewGrid() {
        overviewGrid.innerHTML = '';
        const cur = currentWindow();
        allWindows.forEach(win => {
            const card = document.createElement('div');
            card.className = 'overview-card' + (cur && cur.window_id === win.window_id ? ' current' : '');
            const spaceTag = win.space_index ? `<span style="color:#e94560;font-size:10px;float:right">S${win.space_index}</span>` : '';
            const img = document.createElement('img');
            img.dataset.windowId = String(win.window_id);
            img.src = thumbUrl(win.window_id);
            img.alt = '';
            img.onerror = () => { img.style.opacity = '0.2'; };
            card.appendChild(img);
            const info = document.createElement('div');
            info.innerHTML = `<div class="ov-app">${spaceTag}${esc(win.owner_name)}</div><div class="ov-name">${esc(win.window_name || '(untitled)')}</div>`;
            card.appendChild(info);
            card.addEventListener('click', () => {
                closeOverview();
                let idx = navWindows.findIndex(w => w.window_id === win.window_id);
                if (idx < 0) { navMode = 'all'; computeNavWindows(); idx = navWindows.findIndex(w => w.window_id === win.window_id); }
                if (idx >= 0) switchToWindow(idx);
            });
            overviewGrid.appendChild(card);
        });
    }

    function closeOverview() {
        clearInterval(overviewTimer);
        overviewEl.classList.remove('open');
    }
    overviewClose.addEventListener('click', closeOverview);
    overviewEl.addEventListener('click', e => { if (e.target === overviewEl) closeOverview(); });

    // ===== MOUSE ZOOM & PAN =====

    streamContainer.addEventListener('mousedown', e => {
        if (e.button !== 0 || fitMode === 'auto' || activeMode) return;
        mousePanning = true;
        mousePanStartX = e.clientX; mousePanStartY = e.clientY;
        mousePanTxStart = tx; mousePanTyStart = ty;
        streamContainer.style.cursor = 'grabbing';
        e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
        if (!mousePanning) return;
        const dx = e.clientX - mousePanStartX;
        const dy = e.clientY - mousePanStartY;
        if (fitMode === 'vertical') {
            // Vertical panning only
            ty = mousePanTyStart + dy;
        } else {
            tx = mousePanTxStart + dx;
            ty = mousePanTyStart + dy;
        }
        applyTransform();
        updateMinimap();
    });
    window.addEventListener('mouseup', () => { mousePanning = false; streamContainer.style.cursor = ''; });

    streamContainer.addEventListener('dblclick', e => {
        e.preventDefault();
        if (activeMode && imgNatW) {
            const { nx, ny } = imgCoordsFromEvent(e);
            sendInput({ type: 'double_click', nx, ny });
            return;
        }
        if (fitMode !== 'auto') applyAutoFit();
        else {
            scale = 2.5;
            tx = window.innerWidth / 2 - ((e.clientX - tx) / (scale / 2.5)) * scale;
            ty = window.innerHeight / 2 - ((e.clientY - ty) / (scale / 2.5)) * scale;
            fitMode = 'custom';
            applyTransform();
            updateMinimap();
        }
    });

    // ===== TOUCH GESTURES =====
    let touchMoved = false;

    streamContainer.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            lastDist = dist(e.touches[0], e.touches[1]);
            lastMid = midpoint(e.touches[0], e.touches[1]);
            isPanning = false;
            touchMoved = true; // multi-touch is not a tap
        } else if (e.touches.length === 1) {
            touchMoved = false;
            swipeStartX = e.touches[0].clientX; swipeStartY = e.touches[0].clientY;
            swipeStartTime = Date.now();

            if (activeMode) return; // Active mode: handle tap in touchend

            const now = Date.now();
            if (now - lastTapTime < 300) {
                e.preventDefault();
                if (fitMode !== 'auto') applyAutoFit();
                else {
                    const prevScale = scale;
                    scale = 2.5;
                    const cs = containerSize();
                    tx = cs.w / 2 - ((e.touches[0].clientX - streamContainer.getBoundingClientRect().left - tx) / prevScale) * scale;
                    ty = cs.h / 2 - ((e.touches[0].clientY - streamContainer.getBoundingClientRect().top - ty) / prevScale) * scale;
                    fitMode = 'custom';
                    applyTransform(); updateMinimap();
                }
                lastTapTime = 0; return;
            }
            lastTapTime = now;
            if (fitMode === 'custom' || fitMode === 'vertical') {
                isPanning = true;
                panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
                panTxStart = tx; panTyStart = ty;
            }
        }
    }, { passive: false });

    streamContainer.addEventListener('touchmove', e => {
        touchMoved = true;
        if (activeMode) return; // Active mode: no pan/zoom via touch

        if (e.touches.length === 2) {
            e.preventDefault();
            const d = dist(e.touches[0], e.touches[1]);
            const mid = midpoint(e.touches[0], e.touches[1]);
            const newScale = Math.max(0.1, Math.min(20, scale * (d / lastDist)));
            if (lastMid) { tx += mid.x - lastMid.x; ty += mid.y - lastMid.y; }
            tx = mid.x - (mid.x - tx) * (newScale / scale);
            ty = mid.y - (mid.y - ty) * (newScale / scale);
            scale = newScale;
            lastDist = d; lastMid = mid;
            fitMode = 'custom';
            applyTransform(); updateMinimap();
        } else if (e.touches.length === 1 && isPanning) {
            e.preventDefault();
            const dx = e.touches[0].clientX - panStartX;
            const dy = e.touches[0].clientY - panStartY;
            if (fitMode === 'vertical') {
                ty = panTyStart + dy;
            } else {
                tx = panTxStart + dx;
                ty = panTyStart + dy;
            }
            applyTransform(); updateMinimap();
        }
    }, { passive: false });

    streamContainer.addEventListener('touchend', e => {
        if (e.touches.length < 2) { lastDist = 0; lastMid = null; }
        if (e.touches.length === 0) {
            isPanning = false;

            if (e.changedTouches.length === 0) return;
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            const dx = endX - swipeStartX;
            const dy = endY - swipeStartY;
            const dt = Date.now() - swipeStartTime;

            // Active mode: tap = click, long-press = right-click
            if (activeMode && !touchMoved && imgNatW) {
                const rect = streamContainer.getBoundingClientRect();
                const cx = endX - rect.left;
                const cy = endY - rect.top;
                const imgX = (cx - tx) / scale;
                const imgY = (cy - ty) / scale;
                const nx = Math.max(0, Math.min(1, imgX / imgNatW));
                const ny = Math.max(0, Math.min(1, imgY / imgNatH));
                showClickRipple(cx, cy);
                if (dt > 500) {
                    sendInput({ type: 'right_click', nx, ny });
                } else {
                    sendInput({ type: 'click', nx, ny });
                }
                return;
            }

            // Viewer mode: swipe to switch windows (auto-fit only)
            if (!activeMode && fitMode === 'auto') {
                if (dt < 400 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
                    if (dx < 0) navNextWindow(); else navPrevWindow();
                }
            }
        }
    });

    function dist(a, b) { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }
    function midpoint(a, b) { return { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 }; }

    // ===== KEYBOARD =====
    // ===== ACTIVE MODE =====
    function toggleActiveMode() {
        activeMode = !activeMode;
        viewer.classList.toggle('active-mode', activeMode);
        modeBtn.classList.toggle('active', activeMode);
        modeBtn.innerHTML = activeMode
            ? '<i class="ph-fill ph-cursor-click"></i>'
            : '<i class="ph ph-eye"></i>';
    }

    const remoteCursor = $('remote-cursor');
    const clickRipple = $('click-ripple');

    function imgCoordsFromEvent(e) {
        // Convert a mouse/touch event to normalized image coordinates (0-1)
        const rect = streamContainer.getBoundingClientRect();
        const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
        const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
        const cx = clientX - rect.left;
        const cy = clientY - rect.top;
        const imgX = (cx - tx) / scale;
        const imgY = (cy - ty) / scale;
        return {
            nx: Math.max(0, Math.min(1, imgX / imgNatW)),
            ny: Math.max(0, Math.min(1, imgY / imgNatH)),
            screenX: cx, screenY: cy
        };
    }

    function moveCursorTo(cx, cy) {
        remoteCursor.style.left = cx + 'px';
        remoteCursor.style.top = cy + 'px';
    }

    function showClickRipple(cx, cy) {
        const el = clickRipple;
        el.style.display = 'block';
        el.style.left = cx + 'px';
        el.style.top = cy + 'px';
        // Restart animation
        el.style.animation = 'none';
        el.offsetHeight; // force reflow
        el.style.animation = '';
        setTimeout(() => { el.style.display = 'none'; }, 400);
    }

    function sendInput(data) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
    }

    // Active mode: track mouse position for cursor
    streamContainer.addEventListener('mousemove', e => {
        if (!activeMode) return;
        const rect = streamContainer.getBoundingClientRect();
        moveCursorTo(e.clientX - rect.left, e.clientY - rect.top);
    });

    // Active mode: mouse clicks
    streamContainer.addEventListener('click', e => {
        if (!activeMode || !imgNatW) return;
        const { nx, ny, screenX, screenY } = imgCoordsFromEvent(e);
        showClickRipple(screenX, screenY);
        sendInput({ type: 'click', nx, ny });
    });
    streamContainer.addEventListener('contextmenu', e => {
        if (!activeMode || !imgNatW) return;
        e.preventDefault();
        const { nx, ny, screenX, screenY } = imgCoordsFromEvent(e);
        showClickRipple(screenX, screenY);
        sendInput({ type: 'right_click', nx, ny });
    });

    // Wheel: active mode = remote scroll, viewer mode = zoom
    streamContainer.addEventListener('wheel', e => {
        e.preventDefault();
        if (activeMode && imgNatW) {
            const { nx, ny } = imgCoordsFromEvent(e);
            sendInput({ type: 'scroll', nx, ny, dx: Math.round(e.deltaX / 30), dy: Math.round(e.deltaY / 30) });
            return;
        }
        const factor = e.deltaY < 0 ? 1.1 : 0.9;
        const newScale = Math.max(0.1, Math.min(20, scale * factor));
        const mx = e.clientX, my = e.clientY;
        tx = mx - (mx - tx) * (newScale / scale);
        ty = my - (my - ty) * (newScale / scale);
        scale = newScale;
        fitMode = 'custom';
        applyTransform();
        updateMinimap();
    }, { passive: false });

    // Unified keyboard handler
    document.addEventListener('keydown', e => {
        if (groupModal.classList.contains('open')) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (viewer.style.display !== 'block') return;

        // Toggle active mode with 'i'
        if (e.key === 'i' && !activeMode) { toggleActiveMode(); e.preventDefault(); return; }

        // Active mode: forward keys to remote
        if (activeMode) {
            if (e.key === 'Escape') { toggleActiveMode(); e.preventDefault(); return; }
            const modifiers = [];
            if (e.shiftKey) modifiers.push('shift');
            if (e.ctrlKey) modifiers.push('ctrl');
            if (e.altKey) modifiers.push('alt');
            if (e.metaKey) modifiers.push('cmd');
            sendInput({ type: 'key', key: e.key, modifiers });
            e.preventDefault();
            return;
        }

        // Viewer mode shortcuts
        if (overviewEl.classList.contains('open')) {
            if (e.key === 'Escape' || e.key === 'g') closeOverview();
            return;
        }
        switch (e.key) {
            case 'ArrowLeft': case 'a': navPrevWindow(); e.preventDefault(); break;
            case 'ArrowRight': case 'd': navNextWindow(); e.preventDefault(); break;
            case 'Escape': stopStream(); e.preventDefault(); break;
            case 'f': applyAutoFit(); e.preventDefault(); break;
            case 'v': applyFitVertical(); e.preventDefault(); break;
            case 'g': showOverview(); e.preventDefault(); break;
            case '1': jumpTo('left'); e.preventDefault(); break;
            case '2': jumpTo('center'); e.preventDefault(); break;
            case '3': jumpTo('right'); e.preventDefault(); break;
        }
    });

    // ===== EVENTS =====
    backBtn.addEventListener('click', stopStream);
    navPrev.addEventListener('click', navPrevWindow);
    navNext.addEventListener('click', navNextWindow);
    fitBtn.addEventListener('click', applyAutoFit);
    fitvBtn.addEventListener('click', applyFitVertical);
    modeBtn.addEventListener('click', toggleActiveMode);
    overviewBtn.addEventListener('click', showOverview);
    appFilter.addEventListener('change', () => { navMode = 'all'; refreshWindowList(); });

    navModeSelect.addEventListener('change', () => {
        navMode = navModeSelect.value;
        const cur = currentWindow();
        computeNavWindows();
        // Try to stay on the same window
        if (cur) {
            const idx = navWindows.findIndex(w => w.window_id === cur.window_id);
            if (idx >= 0) navIndex = idx;
            else navIndex = 0;
        }
        navCounter.textContent = `${navIndex + 1}/${navWindows.length}`;
        renderThumbStrip();
        updateNavModeSelect();
    });

    gearBtn.addEventListener('click', e => { e.stopPropagation(); settingsPanel.classList.toggle('open'); gearBtn.classList.toggle('active'); });
    document.addEventListener('click', e => {
        if (!settingsPanel.contains(e.target) && e.target !== gearBtn && !gearBtn.contains(e.target)) {
            settingsPanel.classList.remove('open'); gearBtn.classList.remove('active');
        }
    });

    qualitySlider.addEventListener('input', () => { qualityVal.textContent = qualitySlider.value; });
    qualitySlider.addEventListener('change', () => { if (currentConfig) { currentConfig.quality = parseInt(qualitySlider.value, 10); sendConfigUpdate(); } });
    fpsSlider.addEventListener('input', () => { fpsVal.textContent = fpsSlider.value; });
    fpsSlider.addEventListener('change', () => { if (currentConfig) { currentConfig.fps = parseInt(fpsSlider.value, 10); sendConfigUpdate(); } });
    resolutionSelect.addEventListener('change', () => { if (currentConfig) { currentConfig.max_width = parseInt(resolutionSelect.value, 10); sendConfigUpdate(); } });

    $('fullscreen-btn').addEventListener('click', () => {
        if (document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
        } else {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    });

    // ===== UTILS =====
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ===== INIT =====
    function startRefreshTimer() { refreshWindowList(); refreshTimer = setInterval(refreshWindowList, 3000); }

    // Restore last viewed window on page load (fail safely if window closed)
    async function tryRestoreWindow() {
        try {
            const saved = localStorage.getItem('llming-current-window');
            if (!saved) return;
            const { window_id } = JSON.parse(saved);
            // Wait for first window list to load
            await refreshWindowList();
            computeNavWindows();
            const idx = navWindows.findIndex(w => w.window_id === window_id);
            if (idx >= 0) {
                switchToWindow(idx);
                return;
            }
            // Window was closed — clear stale reference
            localStorage.removeItem('llming-current-window');
        } catch {
            localStorage.removeItem('llming-current-window');
        }
    }

    tryRestoreWindow().then(() => {
        // Only start auto-refresh if we're not already streaming
        if (!currentConfig) startRefreshTimer();
    });

    // Register service worker for PWA installability
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
})();
</script>
</body>
