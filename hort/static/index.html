        state.groupModalName = name;
        state.groupModalCallback = null;
        state.groupModalOpen = true;
      }

      function openNewGroup() {
        state.groupModalEditing = null;
        state.groupModalTitle = 'New Group';
        state.groupModalName = '';
        state.groupModalCallback = null;
        state.groupModalOpen = true;
      }

      function toggleGroupMembership(win) {
        const groups = loadGroups();
        const names = Object.keys(groups);
        if (names.length === 0) {
          state.groupModalEditing = null;
          state.groupModalTitle = 'New Group';
          state.groupModalName = '';
          state.groupModalCallback = (newName) => {
            const g = loadGroups();
            g[newName] = [win.window_id];
            saveGroups(g);
            computeNavWindows();
          };
          state.groupModalOpen = true;
          return;
        }
        const target = (state.navMode !== 'all' && state.navMode !== 'app') ? state.navMode : names[0];
        const g = loadGroups();
        if (!g[target]) g[target] = [];
        const idx = g[target].indexOf(win.window_id);
        if (idx >= 0) g[target].splice(idx, 1);
        else g[target].push(win.window_id);
        saveGroups(g);
        if (state.navMode !== 'all' && state.navMode !== 'app') computeNavWindows();
      }

      function doSwitchSpace(index) {
        switchSpace(index);
      }

      function onSetTarget(targetId) {
        setTarget(targetId);
      }

      // Cloud connector save handler (panel is rendered by extension)
      async function generateP2pLink() {
        try {
          const resp = await fetch(apiUrl('/api/p2p/connect'), { method: 'POST' });
          const data = await resp.json();
          state._p2pLink = data.url || '';
          if (state._p2pLink) {
            // Auto-copy to clipboard
            copyToClipboard(state._p2pLink);
            // Generate QR
            const qrResp = await fetch(apiUrl('/api/qr?url=' + encodeURIComponent(state._p2pLink)));
            const qrData = await qrResp.json();
            state._p2pQr = qrData.qr || '';
          }
        } catch (e) {
          console.error('P2P link generation failed:', e);
        }
      }

      function openHostedApp(url) {
        window.open(url, '_blank');
      }

      async function generatePairingLink() {
        try {
          const resp = await fetch(apiUrl('/api/p2p/pair'), { method: 'POST' });
          const data = await resp.json();
          state._p2pPairLink = data.deep_link || '';
          if (state._p2pPairLink) {
            copyToClipboard(state._p2pPairLink);
          }
        } catch (e) {
          console.error('Pairing link generation failed:', e);
        }
      }

      async function loadDevices() {
        try {
          const resp = await fetch(apiUrl('/api/p2p/devices'));
          const data = await resp.json();
          state._p2pDevices = data.devices || [];
        } catch (e) {
          console.error('Failed to load devices:', e);
        }
      }

      async function revokeDevice(tokenHash) {
        try {
          await fetch(apiUrl('/api/p2p/devices'), {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token_hash: tokenHash }),
          });
          await loadDevices();
        } catch (e) {
          console.error('Failed to revoke device:', e);
        }
      }

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          Quasar.Notify.create({ message: 'Copied to clipboard', position: 'bottom', timeout: 1500 });
        }).catch(() => {
          // Fallback: select the text
          const el = document.querySelector('input[readonly]');
          if (el) { el.select(); document.execCommand('copy'); }
        });
      }

      function onCloudSave(enabled) {
        if (enabled) {
          state.connectors.cloud.active = true;
          _cloudOptimisticUntil = Date.now() + 3000;
        } else {
          state.connectors.cloud.active = false;
          state.connectors.cloud.server_url = '';
          _cloudOptimisticUntil = 0;
        }
        state.connectorPanelOpen = null;
        setTimeout(fetchConnectors, 1000);
      }

      // Group windows by target for the flat "All" view
      const targetGroups = computed(() => {
        const groups = {};
        for (const win of state.navWindows) {
          const tid = win.target_id || 'unknown';
          const tname = win.target_name || tid;
          if (!groups[tid]) {
            const provType = (state.targets.find(t => t.id === tid) || {}).provider_type || '';
            groups[tid] = {
              targetId: tid,
              targetName: tname,
              icon: provType === 'macos' ? 'ph ph-desktop' : provType === 'linux-docker' ? 'ph ph-linux-logo' : 'ph ph-monitor',
              windows: [],
            };
          }
          groups[tid].windows.push(win);
        }
        return Object.values(groups);
      });

      const currentTargetName = computed(() => {
        const t = state.targets.find(t => t.id === state.activeTarget);
        return t ? t.name : state.activeTarget;
      });

      function navWindowIndex(win) {
        return state.navWindows.findIndex(w => w.window_id === win.window_id && w.target_id === win.target_id);
      }

      // View tabs + config sub-screens
      // viewTab lives on state for unified toolbar access
      const configScreen = ref(null); // null | 'general' | 'extensions'
      const generalConfig = reactive({ caffeinate: false, display_sleep_disabled: false });

      // Load general config from server
      async function loadGeneralConfig() {
        try {
          const msg = await sendControlRequest({ type: 'config.get', section: 'general' });
          if (msg && msg.data) Object.assign(generalConfig, msg.data);
        } catch {}
      }
      async function toggleGeneral(key, value) {
        generalConfig[key] = value;
        await sendControlRequest({ type: 'config.set', section: 'general', data: {...generalConfig} });
        // Apply caffeinate immediately
        if (key === 'caffeinate' || key === 'display_sleep_disabled') {
          sendControlRequest({ type: 'settings.apply' });
        }
      }
      loadGeneralConfig();
      // targetDropdownOpen lives on state for unified toolbar access
      const activeTargetLabel = computed(() => {
        const t = state.targets.find(t => t.id === state.activeTarget);
        return t ? t.name : state.targets[0]?.name || 'System';
      });
      const activeTargetIcon = computed(() => {
        const t = state.targets.find(t => t.id === state.activeTarget);
        const pt = t?.provider_type || state.targets[0]?.provider_type || '';
        if (pt === 'macos') return 'ph ph-desktop';
        if (pt === 'linux-docker') return 'ph ph-linux-logo';
        return 'ph ph-monitor';
      });
      // Auto-select first target — never show "all"
      watch(() => state.targets.length, () => {
        if ((state.activeTarget === 'all' || !state.targets.find(t => t.id === state.activeTarget)) && state.targets.length > 0) {
          state.activeTarget = state.targets[0].id;
        }
      }, { immediate: true });
      const spiritsList = ref([]);
      const spiritCount = computed(() => spiritsList.value.filter(s => s.running_jobs && s.running_jobs.length > 0).length);
      const allPlugins = ref([]);
      const selectedSpirit = ref(null);
      const selectedPlugin = ref(null);

      async function refreshSpirits() {
        try {
          const msg = await sendControlRequest({ type: 'llmings.list' });
          const all = msg ? msg.data : [];
          if (all.length || !allPlugins.value.length) {
            allPlugins.value = all;
            spiritsList.value = all.filter(p => p.loaded && p.ui_script);
          }
        } catch {}
      }
      // Track store key counts per spirit (mini stats)
      const spiritStoreKeys = reactive({});
      async function refreshSpiritStores() {
        for (const sp of spiritsList.value) {
          try {
            const msg = await sendControlRequest({ type: 'llmings.store', name: sp.name });
            if (msg && msg.data) spiritStoreKeys[sp.name] = Object.keys(msg.data).length;
          } catch {}
        }
      }

      // Spirits whose UI panels are visible in Llmings view
      // "Show in Llmings" — stored server-side so it syncs across browsers
      const spiritUIVisible = ref([]);
      async function loadSpiritUIVisible() {
        try {
          const msg = await sendControlRequest({ type: 'config.get', section: 'ui.spirits' });
          if (msg && msg.data) {
            spiritUIVisible.value = msg.data.visible || [];
          }
        } catch {}
      }
      function toggleSpiritUI(name, show) {
        const list = spiritUIVisible.value;
        const idx = list.indexOf(name);
        if (show && idx < 0) list.push(name);
        else if (!show && idx >= 0) list.splice(idx, 1);
        // Save to server (fire-and-forget)
        sendControlRequest({ type: 'config.set', section: 'ui.spirits', data: {visible: [...list]} });
      }
      loadSpiritUIVisible().then(() => {
        // Migrate from localStorage if server has no data
        if (!spiritUIVisible.value.length) {
          const local = JSON.parse(localStorage.getItem('hort-spirit-ui') || '[]');
          if (local.length) {
            spiritUIVisible.value = local;
            sendControlRequest({ type: 'config.set', section: 'ui.spirits', data: {visible: local} });
          }
        }
      });

      // Map plugin name → widget component name (if registered).
      // Both lookups read LlmingClient.registryVersion.value so Vue tracks
      // the registry as a reactive dependency — when card scripts register
      // (or activateAll runs), templates that depend on these helpers
      // re-render automatically. No manual epoch bumps required.
      function _trackRegistry() {
        if (typeof LlmingClient !== 'undefined' && LlmingClient.registryVersion) {
          void LlmingClient.registryVersion.value;
        }
      }
      function spiritWidgetName(pluginName) {
        _trackRegistry();
        if (typeof LlmingClient === 'undefined') return '';
        for (const [id, ExtClass] of LlmingClient.getRegistry()) {
          if (id === pluginName && ExtClass.llmingWidgets && ExtClass.llmingWidgets.length) {
            return ExtClass.llmingWidgets[0];
          }
        }
        return '';
      }
      function spiritCardComponent(pluginName) {
        _trackRegistry();
        // Isolated cards are not registered in the host registry. Shared
        // host cards still expose the same ui_widgets name after their
        // script loads, so the manifest remains the authoritative lookup.
        const manifest = (window.HortPlugins && window.HortPlugins.getPlugins() || []).find(p => p.name === pluginName);
        if (manifest && manifest.ui_widgets && manifest.ui_widgets.length) return manifest.ui_widgets[0];
        // Fall back to the in-page registry for chrome-level extensions
        // (connectors etc.) that legitimately load inline.
        if (typeof LlmingClient === 'undefined') return '';
        for (const [id, ExtClass] of LlmingClient.getRegistry()) {
          if (id === pluginName && ExtClass.cardComponent) return ExtClass.cardComponent;
        }
        return '';
      }
      function spiritIsSandboxed(pluginName) {
        _trackRegistry();
        const manifest = (window.HortPlugins && window.HortPlugins.getPlugins() || []).find(p => p.name === pluginName);
        if (!manifest) return true;
        return manifest.browser_isolated !== false;
      }

      async function toggleSpiritFeature(pluginId, feature, enabled) {
        await sendControlRequest({ type: 'llmings.feature', name: pluginId, feature, enabled });
        await refreshSpirits();
      }
      const showTokenInput = ref(null);
      const tokenInputValue = ref('');

      async function revokeAuth(pluginId) {
        Quasar.Dialog.create({
          title: 'Logout',
          message: `Disconnect account for ${pluginId}?`,
          dark: true,
          ok: { label: 'Disconnect', color: 'negative' },
          cancel: { label: 'Cancel', flat: true },
        }).onOk(async () => {
          await sendControlRequest({ type: 'credentials.revoke', name: pluginId });
          await refreshSpirits();
        });
      }
      async function submitToken(pluginId, token) {
        if (!token) return;
        await sendControlRequest({ type: 'credentials.store', name: pluginId, token: {token: token} });
        await refreshSpirits();
      }
      async function startOAuth(pluginId) {
        const r = await fetch(apiUrl(`/api/llmings/${pluginId}/auth/oauth-start`));
        if (!r.ok) return;
        const data = await r.json();
        if (data.auth_url) window.open(data.auth_url, '_blank');
      }
      async function startDeviceCode(pluginId) {
        const r = await fetch(apiUrl(`/api/llmings/${pluginId}/auth/device-start`), { method: 'POST' });
        if (!r.ok) return;
        const data = await r.json();
        Quasar.Dialog.create({
          title: 'Device Code',
          message: `Go to: ${data.verification_uri}\n\nEnter code: ${data.user_code}`,
          dark: true,
          ok: { label: 'Done' },
          cancel: { label: 'Cancel', flat: true },
        }).onOk(async () => {
          // Poll for completion
          for (let i = 0; i < 30; i++) {
            await new Promise(r => setTimeout(r, (data.interval || 5) * 1000));
            const pr = await fetch(apiUrl(`/api/llmings/${pluginId}/auth/device-poll`), { method: 'POST' });
            if (!pr.ok) break;
            const poll = await pr.json();
            if (poll.complete) { await refreshSpirits(); return; }
          }
        });
      }
      setInterval(refreshSpirits, 10000);
      setInterval(refreshSpiritStores, 15000);
      // Load spirits when WS connects
      (window._hortOnConnect = window._hortOnConnect || []).push(() => {
        refreshSpirits().then(refreshSpiritStores);
      });

      function terminalsForTarget(targetId) {
        if (targetId === 'all') return state.terminals;
        return state.terminals.filter(t => t.target_id === targetId);
      }

      // Card thumbnail rendering — refresh vault + render
      const pluginThumbs = reactive({});
      async function renderPluginThumbs() {
        if (typeof LlmingClient === 'undefined' || typeof HortPlugins === 'undefined') return;
        // Refresh card data from vault
        for (const [id] of LlmingClient.getRegistry()) {
          const inst = LlmingClient.get(id);
          if (!inst) continue;
          try {
            const data = await inst.vault.get('state');
            if (data && Object.keys(data).length) {
              if (inst._feedStore) inst._feedStore(data);
              if (inst._statusData !== undefined) inst._statusData = data;
            }
          } catch {}
        }
        HortPlugins.renderAllThumbnails();
        for (const [id] of LlmingClient.getRegistry()) {
          const url = HortPlugins.getThumbnailUrl(id);
          if (url) pluginThumbs[id] = url;
        }
      }
      setInterval(renderPluginThumbs, 5000);
      setTimeout(renderPluginThumbs, 3000);

      // Interaction tracking + favorites — stored on server, synced to all clients
      const lastInteraction = reactive({});
      const favorites = reactive({});
      let _uiStateDirty = false;

      // Load from server
      async function loadUIState() {
        try {
          const msg = await sendControlRequest({ type: 'config.get', section: 'ui.state' });
          if (msg && msg.data) {
            Object.assign(lastInteraction, msg.data.interactions || {});
            Object.assign(favorites, msg.data.favorites || {});
          }
        } catch {}
      }
      // Save to server (debounced — max once per 2s)
      let _saveTimer = null;
      function saveUIState() {
        if (_saveTimer) return;
        _saveTimer = setTimeout(() => {
          _saveTimer = null;
          sendControlRequest({ type: 'config.set', section: 'ui.state', data: {interactions: {...lastInteraction}, favorites: {...favorites}} });
        }, 2000);
      }

      function touch(itemKey) {
        lastInteraction[itemKey] = Date.now();
        saveUIState();
      }
      function toggleFavorite(itemKey) {
        favorites[itemKey] = !favorites[itemKey];
        if (!favorites[itemKey]) delete favorites[itemKey];
        saveUIState();
      }
      loadUIState();
      setInterval(loadUIState, 30000); // sync from host every 30s
      function isFavorite(itemKey) { return !!favorites[itemKey]; }

      // Unified sorted grid: spirits + terminals + windows
      // Sort: favorites first (by interaction), then rest by interaction
      const unifiedGridItems = computed(() => {
        void pluginsLoaded.value; // reactive dependency — re-evaluate when plugins load
        const items = [];
        const target = state.activeTarget;

        // Spirits: pinned (spiritUIVisible) + autoShow
        const shownSpirits = new Set(spiritUIVisible.value);
        if (typeof LlmingClient !== 'undefined') {
          for (const [id, ExtClass] of LlmingClient.getRegistry()) {
            if (ExtClass.autoShow && spiritWidgetName(id)) shownSpirits.add(id);
          }
        }
        for (const sn of shownSpirits) {
          if (!spiritWidgetName(sn)) continue;
          const sp = spiritsList.value.find(s => s.name === sn);
          items.push({
            type: 'spirit', key: 'spirit:' + sn, id: sn,
            icon: sp?.icon || 'ph ph-ghost', app: sn, name: 'Spirit',
          });
        }

        // Hosted apps — each running instance gets a card
        if (state._hostedApps) {
          for (const inst of state._hostedApps) {
            if (inst.status === 'running') {
              items.push({
                type: 'hosted-app', key: 'app:' + inst.name, id: inst.name,
                icon: inst.icon || 'ph ph-package',
                app: inst.label || inst.name, name: inst.type || 'App',
                url: _basePath + '/app/' + inst.name + '/~/',
              });
            }
          }
        }

        // Terminals (PTY + tmux unified)
        for (const t of terminalsForTarget(target)) {
          const isTmux = !!(t.tmux);
          // Hide termd bridge terminals (back a tmux session) and _web grouped sessions
          if (!isTmux && t.target_id === 'tmux') continue;
          if (isTmux && t.title && t.title.endsWith('_web')) continue;
          const cstate = t.claude_state || (t.busy ? 'busy' : 'idle');
          const borderColor = t.border_color || '';
          items.push({
            type: 'terminal', key: 'term:' + t.terminal_id, id: t.terminal_id,
            icon: isTmux ? 'ph ph-terminal-window' : 'ph ph-terminal-window',
            app: isTmux ? t.title : 'Terminal', name: isTmux ? (t.command || 'shell') : t.title,
            tmux: isTmux, short_name: isTmux ? t.title : '',
            busy: t.busy, mode: cstate, perm_mode: t.mode || '', border_color: borderColor,
            idle_seconds: t.idle_seconds || 0,
            needs_input: t.needs_input || false,
            is_claude: isTmux && t.title && (t.title.includes('claude') || t.title.includes('claud')),
            last_output: t.last_output || '',
          });
        }

        // Windows — removed from main grid, now inside LlmingLens extension

        // Sort: favorites first, then spirits (default priority), then by last interaction
        items.sort((a, b) => {
          const aFav = favorites[a.key] ? 1 : 0;
          const bFav = favorites[b.key] ? 1 : 0;
          if (aFav !== bFav) return bFav - aFav;
          const aTs = lastInteraction[a.key] || 0;
          const bTs = lastInteraction[b.key] || 0;
          if (aTs !== bTs) return bTs - aTs;
          // No interaction data: spirits before windows/terminals
          if (a.type !== b.type) {
            if (a.type === 'spirit') return -1;
            if (b.type === 'spirit') return 1;

          if (term) { openTerminal(term.terminal_id); return; }
          // No live backend (demo mode etc.) — open the widget's content
          // in a hovering window via the built-in viewer.
          openBuiltinFloat('__builtin:terminal', {
            title: (w.c && w.c.title) || w.subId || 'Terminal',
            output: (w.c && w.c.output) || '',
            state: (w.c && w.c.state) || '',
            idle: (w.c && w.c.idle) || 0,
          });
        } else if (w.type === 'extension' && w.extId) {
          const sp = (spiritsList.value || []).find(s => s.name === w.extId);
          if (sp) openSpiritFullscreen(w.extId);
        } else if (w.type === 'quick-chat') {
          openBuiltinFloat('__builtin:chat', { title: 'Quick Chat' });
        }
      }

      // Open a host-rendered (non-iframe) float window for built-in widget
      // types like terminal and quick-chat that have no backing llming UI.
      // The float template handles `__builtin:*` widget names inline.
      // These are ephemeral (live data, not deep-linkable) so we don't
      // touch the URL — the float opens directly and closes via the same
      // X / Esc / backdrop path as any other window.
      function openBuiltinFloat(name, props) {
        const id = name + ':' + Date.now();
        if (typeof LlmingClient !== 'undefined' && LlmingClient.openFloat) {
          const win = LlmingClient.openFloat(id, name, { title: props.title || id });
          win.props = props;
        }
      }

      // ── Widget CRUD ──
      function addW(type, extId, subId, size, c) {
        const d = activeDesktop.value;
        const sz = size.replace(/\u00d7/g, 'x');
        const [ww, wh] = sz.split('x').map(Number);
        // Find first free position — only check THIS desktop's widgets
        const cols = whGridCols.value;
        const off = Math.floor(cols / 2);
        const occupied = {};
        for (const ow of d.widgets) {
          if (!ow.pos) continue;
          const ogc = Math.max(0, Math.min(cols - 1, ow.pos.c + off));
          const [oww, owh] = ow.size.split('x').map(Number);
          for (let dr = 0; dr < owh; dr++) for (let dc = 0; dc < Math.min(oww, cols); dc++) occupied[(ow.pos.r + dr) + ',' + (ogc + dc)] = true;
        }
        let pos = { c: -off, r: 0 };
        const cw = Math.min(ww, cols);
        for (let tr = 0; tr < 50; tr++) {
          let placed = false;
          for (let tc = 0; tc <= cols - cw; tc++) {
            let fits = true;
            for (let dr = 0; dr < wh && fits; dr++) for (let dc = 0; dc < cw && fits; dc++) {
              if (occupied[(tr+dr)+','+(tc+dc)]) fits = false;
            }
            if (fits) { pos = { c: tc - off, r: tr }; placed = true; break; }
          }
          if (placed) break;
        }
        const newId = nextWidgetId();
        d.widgets.push({ id: newId, type, extId, subId, size: sz, pos, c: c || {}, _new: true });
        whScheduleSave();
        // Scroll only if the new widget is off-screen
        Vue.nextTick(() => {
          setTimeout(() => {
            const page = document.querySelector('.wh-page');
            const widgets = page?.querySelectorAll('.widget');
            const widgetEl = widgets ? [...widgets].find(el => el.textContent.includes(extId || subId || '')) : null;
            if (widgetEl && page) {
              const wr = widgetEl.getBoundingClientRect();
              const pr = page.getBoundingClientRect();
              if (wr.bottom > pr.bottom) widgetEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
              else if (wr.top < pr.top) widgetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          }, 150);
        });
      }

      function addFromCat(cat) {

      const criticalNotifs = computed(() => state.notifications.filter(n => n.visible && n.severity === 'critical'));
      const importantNotifs = computed(() => state.notifications.filter(n => (n.severity === 'critical' || n.severity === 'high') && !n.read));
      const importantNotifCount = computed(() => importantNotifs.value.length);

      function dismissCenterNotif() {

      function notifTimeAgo(ts) {
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 5) return 'now';

      function pushNotification(opts) {
        const dupe = state.notifications.find(n => n.visible && n.source === opts.source && n.title === opts.title);
        if (dupe) { dupe.timestamp = Date.now(); dupe.message = opts.message || dupe.message; dupe.read = false; return; }
        const n = Vue.reactive({ id: ++_notifId, ...opts, timestamp: Date.now(), read: false, visible: true });
        state.notifications.unshift(n);
        if (opts.severity === 'critical') {
          n.visible = true;
        } else {
          n.visible = false;
          state.centerNotif = n;
          clearTimeout(_centerTimer);
          const delay = opts.severity === 'high' ? 5000 : opts.severity === 'medium' ? 3000 : 2000;
          _centerTimer = setTimeout(() => { dismissCenterNotif(); }, delay);
        }
        if (opts.widgetExtId) {
          const existing = state.widgetBadges[opts.widgetExtId];
          if (existing) {
            existing.count++;
            const order = { critical: 3, high: 2, medium: 1, low: 0 };
            if ((order[opts.severity] || 0) > (order[existing.severity] || 0)) existing.severity = opts.severity;
          } else {
            state.widgetBadges[opts.widgetExtId] = { severity: opts.severity, count: 1 };
          }
          if (opts.severity === 'critical') { switchToWidget(opts.widgetExtId, false); state.criticalFlash++; }
          else if (opts.severity === 'high') { switchToWidget(opts.widgetExtId, false); }

      // ── Mode switcher ──

      function switchMode(mode) {
        const isDemo = typeof HortDemo !== 'undefined' && HortDemo.active;
        if (mode === 'demo' && !isDemo) {

          if (typeof HortDemo !== 'undefined') HortDemo.toggle();

      function resetLayout() {
        indexedDB.deleteDatabase('hort-widget-layout');

      // ── Keyboard handler ──
      function _onKey(e) {
        if (e.key === 'Escape') {
          // Close topmost float window first — route through __hortCloseApp
          // so URL stays in sync AND the app can intercept (unsaved-changes
          // dialog, text editor, etc.).
          if (typeof LlmingClient !== 'undefined') {
            const floats = LlmingClient.getFloatWindows ? LlmingClient.getFloatWindows() : [];
            if (floats && floats.length > 0) {
              const topId = floats[floats.length - 1].id;
              if (window.__hortCloseApp) window.__hortCloseApp(topId);
              else LlmingClient.closeFloat(topId);
              return;
            }
          }
          // Then close fullscreen spirit (also URL-aware via the close path).
          if (state.view === 'spirit-fullscreen') {
            if (window.__hortCloseApp && fullscreenSpirit.value) {
              window.__hortCloseApp(fullscreenSpirit.value);
            } else if (typeof closeSpiritFullscreen === 'function') {
              closeSpiritFullscreen();
            } else { state.view = 'picker'; }
            return;
          }
          if (state.deviceView) { state.deviceView = false; return; }
          if (state.desktopOverview) { state.desktopOverview = false; return; }
          state.notifMenuOpen = false; state.editMode = false; state.widgetPicker = false;
          state.whDrawer = false; state.whNameEditor = null; state.wctx.open = false;
          state.gridCtx.open = false; state.selectedWidget = null;
        }
        if (e.key === 'ArrowLeft' && state.activeDesktopIdx > 0 && !state.widgetPicker && !state.whDrawer) state.activeDesktopIdx--;
        if (e.key === 'ArrowRight' && state.activeDesktopIdx < state.desktops.length - 1 && !state.widgetPicker && !state.whDrawer) state.activeDesktopIdx++;
      }

      // ── Lifecycle ──
      Vue.onMounted(() => {
        // Expose desktop state so deep-link URL params can drive it.
        // Run the URL parser once now that state.desktops is populated —
        // the earlier call from _hortOnConnect may have raced this mount
        // and skipped the desktop= clause when state wasn't yet exposed.
        if (window.__hort) window.__hort.state = state;
        if (window._applyHortUrlParams) window._applyHortUrlParams();
        setTimeout(() => snapTrack(), 50);
        document.addEventListener('keydown', _onKey);
        document.addEventListener('click', _closeBellMenu);

        // Attach swipe gestures to viewport
        const el = vpEl.value;
        if (el) {
          el.addEventListener('touchstart', e => {
            if (state.editMode || e.target.closest('.widget')) return;
            _sx = e.touches[0].clientX; _sy = e.touches[0].clientY; _sw = false; _swLocked = false; _swOffset = 0;
          }, { passive: true });

          el.addEventListener('touchmove', e => {
            if (state.editMode || _swLocked || _lpEditJustEntered) return;
            const dx = e.touches[0].clientX - _sx, dy = e.touches[0].clientY - _sy;
            if (!_sw && Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) { _swLocked = true; return; }
            if (!_sw && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 12) {
              _sw = true; swipeDrag.value = true;
              clearTimeout(_lp); clearTimeout(_dotLp); lpCircle.value = null;
            }
            if (_sw) { e.preventDefault(); _swOffset = dx; applySwipeOffset(dx); }
          }, { passive: false });

          el.addEventListener('touchend', e => {
            if (!_sw) { swipeDrag.value = false; return; }
            const dx = e.changedTouches[0].clientX - _sx;
            const threshold = window.innerWidth * .2;
            if (dx < -threshold && state.activeDesktopIdx < state.desktops.length - 1) state.activeDesktopIdx++;
            else if (dx > threshold && state.activeDesktopIdx > 0) state.activeDesktopIdx--;
            snapTrack(); _sw = false; setTimeout(() => { swipeDrag.value = false; }, 50);
          }, { passive: true });

          // Mouse drag for desktop browsers — disabled in edit mode and on widgets
          el.addEventListener('mousedown', e => {
            if (e.button !== 0) return;
            // Don't swipe if in edit mode or if mousedown is on a widget
            if (state.editMode) return;
            if (e.target.closest('.widget')) return; // widget handles its own drag
            const sx = e.clientX; let dragging = false;
            function onMove(ev) {
              // Abort if edit mode entered during drag (long-press triggered)
              if (state.editMode || _lpEditJustEntered) {
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
                return;
              }
              const dx = ev.clientX - sx;
              if (!dragging && Math.abs(dx) > 8) {
                dragging = true; swipeDrag.value = true;
                clearTimeout(_lp); clearTimeout(_dotLp); lpCircle.value = null;
              }
              if (dragging) { ev.preventDefault(); applySwipeOffset(dx); }
            }
            function onUp(ev) {
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
              if (!dragging) return;
              const dx = ev.clientX - sx;
              const threshold = window.innerWidth * .2;
              if (dx < -threshold && state.activeDesktopIdx < state.desktops.length - 1) state.activeDesktopIdx++;
              else if (dx > threshold && state.activeDesktopIdx > 0) state.activeDesktopIdx--;
              snapTrack(); setTimeout(() => { swipeDrag.value = false; }, 50);
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          });
        }
      });

      Vue.onUnmounted(() => {
        document.removeEventListener('keydown', _onKey);
        document.removeEventListener('click', _closeBellMenu);
      });

      // Re-apply URL deep-link params whenever desktops finish loading,

      watch(() => state.desktops.length, (n) => {
        if (n > 0 && window._applyHortUrlParams) window._applyHortUrlParams();
      });

      // Save layout on widget/desktop changes
      watch(() => JSON.stringify(state.desktops.map(d => ({ id: d.id, name: d.name, tint: d.tint, wc: d.widgets.length }))),
        () => { whScheduleSave(); }, { deep: false });

      return {
        state, demoEpoch, groupsList, targetGroups, currentTargetName,
        isInAnyGroup, onAppFilterChange, setNavMode,
        toggleGroup, editGroup, openNewGroup,
        toggleGroupMembership, doSwitchSpace, getThumbnailSrc, onThumbError,

        goToDesktop, addDesk, editDesktopName, openPicker,
        // Notifications
        criticalNotifs, importantNotifs, importantNotifCount, unreadNotifCount,
        dismissCenterNotif, notifTimeAgo, pushNotification, getWidgetBadge,
        switchToWidget, buzzWidget, openNotifSource, clearAllNotifs,
        simNotifIntruder, simNotifDoorbell, simNotifClaudeDone, simNotifTempAlert,

  // =============================================

  // Terminal plugin patterns — auto-detect prompts and show clickable buttons
  const TERMINAL_PLUGINS = [
    {
      name: 'claude-accept',
      pattern: /\b(allow|permit|proceed|accept)\b.*\?\s*$/im,
      buttons: [

  const HortTerminal = {
    template: `
      <div v-if="state.view === 'terminal' && activeTerminal" class="llming-view terminal-llming" style="display:flex">
        <!-- Toolbar is rendered by the unified toolbar in HortApp -->
        <div class="llming-content" ref="termContainer"></div>
        <div v-if="detectedActions.length" class="term-actions">
          <button v-for="btn in detectedActions" :key="btn.label"
                  :class="btn.cls" @click="sendAction(btn.input)">{{ btn.label }}</button>
        </div>
        <div class="llming-bottom-bar">
          <button @click="softKeysVisible = !softKeysVisible">
            <i class="ph ph-keyboard"></i> {{ softKeysVisible ? 'Hide' : 'Keys' }}
          </button>
        </div>
        <div class="llming-floating-keys" :class="{ hidden: !softKeysVisible }" ref="floatingKeysEl">
          <div class="drag-handle">&#8943; drag &#8943;</div>
          <button @click="sendKey(KEYS.ESC)">Esc</button>
          <button @click="sendKey(KEYS.TAB)">Tab</button>
          <button @click="sendKey(KEYS.CTRL_C)">^C</button>
          <button @click="sendKey(KEYS.CTRL_D)">^D</button>
          <button @click="sendKey(KEYS.CTRL_Z)">^Z</button>
          <button @click="sendKey(KEYS.UP)">&uarr;</button>
          <button @click="sendKey(KEYS.DOWN)">&darr;</button>
          <button @click="sendKey(KEYS.LEFT)">&larr;</button>
          <button @click="sendKey(KEYS.RIGHT)">&rarr;</button>
          <button @click="sendKey(KEYS.BACKSPACE)">&lArr;</button>
          <button @click="sendKey(KEYS.ENTER)">&crarr;</button>
        </div>
      </div>
    `,
    setup() {
      const termContainer = ref(null);
      const floatingKeysEl = ref(null);
      let xterm = null;
      let fitAddon = null;
      let termWs = null;
      let currentTermId = null;

      const KEYS = {
        ESC: '\x1b', TAB: '\t', CTRL_C: '\x03', CTRL_D: '\x04', CTRL_Z: '\x1a',
        UP: '\x1b[A', DOWN: '\x1b[B', LEFT: '\x1b[D', RIGHT: '\x1b[C',
        BACKSPACE: '\x7f', ENTER: '\r',
      };

      const softKeysVisible = ref(false);
      const detectedActions = ref([]);

      const activeTerminal = computed(() => {
        return state.terminals.find(t => t.terminal_id === state.activeTerminalId) || null;
      });
      const terminalDisplayTitle = computed(() => {
        const t = activeTerminal.value;
        if (!t) return '';
        if (t.target_id === 'tmux') {
          // Extract clean session name from title or command
          const match = (t.title || '').match(/hort_(\w+?)(_web)?$/);
          if (match) return 'hort_' + match[1] + ' (tmux)';
          return t.title + ' (tmux)';
        }
        return t.title;
      });

      // Scan last N chars of terminal buffer for plugin patterns
      function detectActions() {
        if (!xterm) { detectedActions.value = []; return; }
        // Get last 2000 chars from the terminal buffer
        const buf = xterm.buffer.active;
        const lines = [];
        const start = Math.max(0, buf.cursorY - 5);
        for (let i = start; i <= buf.cursorY; i++) {
          const line = buf.getLine(i + buf.baseY);
          if (line) lines.push(line.translateToString().trimEnd());
        }
        const text = lines.join('\n');
        for (const plugin of TERMINAL_PLUGINS) {
          if (plugin.pattern.test(text)) {
            detectedActions.value = plugin.buttons;
            return;
          }
        }
        detectedActions.value = [];
      }

      function connectTerminal(terminalId) {
        if (termWs) { termWs.close(); termWs = null; }
        currentTermId = terminalId;

        // Pass terminal dimensions so server resizes PTY before sending scrollback
        const cols = xterm ? xterm.cols : 120;
        const rows = xterm ? xterm.rows : 30;
        termWs = new WebSocket(wsUrl('/ws/terminal/' + terminalId + '?cols=' + cols + '&rows=' + rows));
        termWs.binaryType = 'arraybuffer';

        termWs.onmessage = (e) => {
          if (e.data instanceof ArrayBuffer) {
            const text = new TextDecoder().decode(e.data);
            xterm.write(text);
            // Debounce action detection
            clearTimeout(connectTerminal._detectTimer);
            connectTerminal._detectTimer = setTimeout(detectActions, 200);
          }
        };
        termWs.onclose = () => { termWs = null; };
        termWs.onerror = () => {};
      }
      connectTerminal._detectTimer = null;

      function disconnectTerminal() {
        if (termWs) { termWs.close(); termWs = null; }
        currentTermId = null;
      }
      if (window.__hort) {
        window.__hort.disconnectTerminal = disconnectTerminal;
        window.__hort.terminalConfirmClose = function () { confirmClose(); };
      }

      function sendKey(data) {
        if (termWs && termWs.readyState === WebSocket.OPEN) {
          termWs.send(new TextEncoder().encode(data));
        }
      }

      function sendAction(input) {
        sendKey(input);
        detectedActions.value = [];
      }

      function goBack() {
        // Terminal cleanup is handled by onNavigate when the route changes.
        HortRouter.back();
      }

      function confirmClose() {
        Quasar.Dialog.create({
          title: 'Close Terminal',
          message: 'Close this terminal session?',
          dark: true,
          ok: { label: 'Close', color: 'negative' },
          cancel: { label: 'Cancel', flat: true },
        }).onOk(() => {
          const tid = state.activeTerminalId;
          disconnectTerminal();
          if (tid) closeTerminal(tid);
          HortRouter.push('/');
        });
      }

      function setupXterm() {
        if (!termContainer.value) return;
        if (xterm) { xterm.dispose(); xterm = null; }

        xterm = new Terminal({
          cursorBlink: true,
          fontSize: 14,
          fontFamily: "'SFMono-Regular', 'Menlo', 'Monaco', ui-monospace, monospace",
          letterSpacing: 0,
          lineHeight: 1,
          drawBoldTextInBrightColors: false,
          theme: {
            background: '#0a0e1a',
            foreground: '#f0f4ff',
            cursor: '#3b82f6',
            selectionBackground: 'rgba(59,130,246,0.3)',
          },
          scrollback: 10000,
          convertEol: true,
        });

        fitAddon = new FitAddon.FitAddon();
        xterm.loadAddon(fitAddon);
        xterm.loadAddon(new WebLinksAddon.WebLinksAddon());
        if (typeof WebglAddon !== 'undefined') {
          try {
            const webgl = new WebglAddon.WebglAddon();
            webgl.onContextLoss(() => { webgl.dispose(); });
            xterm.loadAddon(webgl);
            xterm.options.rescaleOverlappingGlyphs = true;
          } catch (e) { /* canvas fallback */ }
        }

        xterm.open(termContainer.value);
        fitAddon.fit();
        xterm.focus();

        // Forward keyboard input to the PTY
        xterm.onData((data) => {
          if (termWs && termWs.readyState === WebSocket.OPEN) {
            termWs.send(new TextEncoder().encode(data));
          }
        });

        // Send resize when terminal size changes
        xterm.onResize(({ cols, rows }) => {
          if (termWs && termWs.readyState === WebSocket.OPEN) {
            termWs.send(JSON.stringify({ type: 'resize', cols, rows }));
          }
          sendControl({ type: 'terminal_resize', terminal_id: currentTermId, cols, rows });
        });

        // Debounced resize — fits terminal to container, max once per second
        let resizeTimer = null;
        const debouncedFit = () => {
          if (resizeTimer) return;
          resizeTimer = setTimeout(() => {
            resizeTimer = null;
            if (fitAddon && xterm && state.view === 'terminal') {
              fitAddon.fit();
            }
          }, 1000);
        };
        window.addEventListener('resize', debouncedFit);
        window.addEventListener('orientationchange', debouncedFit);
        // Also observe the container itself (catches CSS layout changes)
        let resizeObserver = null;
        if (typeof ResizeObserver !== 'undefined' && termContainer.value) {
          resizeObserver = new ResizeObserver(debouncedFit);
          resizeObserver.observe(termContainer.value);
        }
        xterm._hortCleanup = () => {
          window.removeEventListener('resize', debouncedFit);
          window.removeEventListener('orientationchange', debouncedFit);
          if (resizeObserver) resizeObserver.disconnect();
          clearTimeout(resizeTimer);
        };
      }

      // Watch for terminal activation
      watch(() => state.activeTerminalId, (newId) => {
        if (newId && state.view === 'terminal') {
          nextTick(() => {
            setupXterm();
            connectTerminal(newId);
            // Send initial resize
            if (xterm && fitAddon) {
              fitAddon.fit();
              sendControl({
                type: 'terminal_resize',
                terminal_id: newId,
                cols: xterm.cols,
                rows: xterm.rows,
              });
            }
            // Setup drag for floating keys
            if (floatingKeysEl.value) {
              setupDrag(floatingKeysEl.value);
            }
          });
        }
      });

      onUnmounted(() => {
        disconnectTerminal();
        if (xterm) {
          if (xterm._hortCleanup) xterm._hortCleanup();
          xterm.dispose();
        }
      });

      return {
        state, termContainer, floatingKeysEl, activeTerminal, terminalDisplayTitle, detectedActions, KEYS,
        softKeysVisible, goBack, confirmClose, sendKey, sendAction,
      };
    },
  };

            const codec = p.get('codec');
            const fps = p.has('fps') ? parseInt(p.get('fps'), 10) : null;

            const vx = p.has('vx') ? parseFloat(p.get('vx')) : null;
            const vy = p.has('vy') ? parseFloat(p.get('vy')) : null;
            if (codec && ['webp', 'vp8', 'vp9'].includes(codec)) state.codec = codec;
            if (fps && fps >= 1 && fps <= 60) state.fps = fps;
            if (quality && quality >= 1 && quality <= 100) state.quality = quality;

            if (zoom && zoom > 1) {

              _vp.h = 1 / _vp.zoom;

  // ===== CREATE VUE APP =====
  const app = createApp({});

  app.component('hort-picker', HortPicker);

  // listener.
  app.component('hort-card-frame', {

          window.HortCardBridge.registerPending(iframe, p.llmingId, p.widgetName, plain(p.props));
        }

          if (window.HortCardBridge && window.HortCardBridge.unregisterPending) {
            window.HortCardBridge.unregisterPending(iframe);
          }

  //
  // App iframes load Vue + Quasar (~700 KB to parse) on first use, which
  // makes the FIRST app open feel laggy. We keep one warm iframe ready
  // off-screen at all times — its Vue/Quasar context is fully parsed and
  // it's just waiting for an `init` message. When the user opens an app,
  // we hand the warm iframe over (instant mount), then create a new warm
  // one in the background for the next open.
  //
  // The iframe is NEVER re-parented (Chrome reloads iframes on parent
  // change). Instead it lives at body level with `position: fixed`. The
  // hort-app-frame component renders a slot div; on mount the iframe is
  // moved into the slot's bounding rect via CSS coords, kept in sync via
  // requestAnimationFrame while the float is open.
  window._HortAppPool = (function () {
    const APP_HOST_URL = '/static/app-host.html?v=3';
    let _warm = null;
    let _creating = false;

    function _create() {
      if (_creating || _warm) return;
      _creating = true;
      const f = document.createElement('iframe');
      f.sandbox = 'allow-scripts';
      f.style.cssText = 'position:fixed;left:-9999px;top:0;width:600px;height:400px;border:0;background:transparent;visibility:hidden;z-index:1';
      // No llming param → handshake is sent with empty id and the bridge
      // ignores it (no pending entry). Iframe sits idle waiting for init.
      f.src = APP_HOST_URL;
      document.body.appendChild(f);
      f.addEventListener('load', () => { _warm = f; _creating = false; }, { once: true });
    }

    function acquire() {
      if (_warm) {
        const f = _warm;
        _warm = null;
        // Refill the pool in the background so the next open is also fast.
        setTimeout(_create, 50);
        return { iframe: f, warm: true };
      }
      // No warm iframe yet (page just loaded) — create on the fly.
      const f = document.createElement('iframe');
      f.sandbox = 'allow-scripts';
      f.style.cssText = 'position:fixed;left:-9999px;top:0;width:600px;height:400px;border:0;background:transparent;visibility:hidden;z-index:1';
      f.src = APP_HOST_URL;
      document.body.appendChild(f);
      return { iframe: f, warm: false };
    }

      // Wait until the browser is genuinely idle so we don't compete with
      // widget-grid cold load (19 card iframes parsing Vue × 19 contexts).
      // No timeout — if the user clicks an app before warm exists, acquire()
      // falls back to a cold-create on demand. The pool is an optimisation,
      // not a requirement.
      if ('requestIdleCallback' in window) requestIdleCallback(_create);
      else setTimeout(_create, 3000);
    }

    return { acquire, scheduleWarm };

  window.addEventListener('load', () => setTimeout(() => window._HortAppPool.scheduleWarm(), 2500), { once: true });

  // Vue/Quasar context is preserved across float open/close cycles in
  // the pool.
  app.component('hort-app-frame', {
    props: {
      llmingId: { type: String, required: true },
      widgetName: { type: String, default: '' },
      props: { type: Object, default: () => ({}) },
    },
    setup(p) {

      let _rafId = 0;

        } else {

        }

      }

      Vue.onMounted(() => {
        const plain = (v) => { try { return JSON.parse(JSON.stringify(v ?? {})); } catch { return {}; } };
        const acq = window._HortAppPool.acquire();
        _iframe = acq.iframe;
        const arm = () => {
          if (window.HortCardBridge && window.HortCardBridge.acquireWarm) {
            window.HortCardBridge.acquireWarm(_iframe, p.llmingId, p.widgetName, plain(p.props));
          }
          _sync();
        };

        // a cold one needs us to wait for load before posting init.
        if (acq.warm) arm();
        else _iframe.addEventListener('load', arm, { once: true });
      });

      Vue.onUnmounted(() => {
        if (_rafId) cancelAnimationFrame(_rafId);
        if (_iframe && window.HortCardBridge && window.HortCardBridge.destroyAcquired) {
          window.HortCardBridge.destroyAcquired(_iframe, p.llmingId);
        }
        _iframe = null;
        // Refill the pool so the NEXT open is instant.
        window._HortAppPool.scheduleWarm();
      });

      return { slotRef };
    },
    template: `<div ref="slotRef" style="width:100%;height:100%"></div>`,
  });

  app.use(Quasar, {
    config: {
      dark: true,
      brand: {
        primary: '#3b82f6',
        secondary: '#1e3a5f',
        accent: '#60a5fa',
        dark: '#0a0e1a',
        'dark-page': '#0a0e1a',
      },
    },
  });

  // Make globals available in Vue templates
  app.config.globalProperties.HortRouter = window.HortRouter;
  app.config.globalProperties.LlmingClient = window.LlmingClient;
  app.config.globalProperties.__hort = window.__hort;
  app.config.globalProperties.HortDemo = window.HortDemo;

  // ── Deep-link URL params ────────────────────────────────────
  //
  // Supported query params (see docs/manual/internals/url-params.md):
  //   ?desktop=N           — switch to desktop index N (0-based)
  //   ?app=NAME            — open the named llming as a hovering window
  //   ?app=NAME&mode=fullscreen  — open the llming in fullscreen view
  //   ?app=NAME&mode=window      — open as float (default for ?app)
  //   ?app=NAME&mode=widget      — no-op (just stay on the grid)
  //
  // applyHortUrlParams runs once after plugins discover (so manifests are
  // available) and again on every back/forward navigation. Keep it
  // idempotent — opening the same app twice is a no-op.
  let _appliedAppKey = '';
  window._applyHortUrlParams = function () {
    try {
      const p = new URL(location.href).searchParams;
      // Desktop index — applied as soon as state.desktops is populated.
      const dRaw = p.get('desktop');
      if (dRaw != null && window.__hort && window.__hort.state && window.__hort.state.desktops && window.__hort.state.desktops.length) {
        const di = parseInt(dRaw, 10);
        if (!isNaN(di)) {
          const max = window.__hort.state.desktops.length - 1;
          window.__hort.state.activeDesktopIdx = Math.max(0, Math.min(di, max));
        }
      }
      // App + mode — only act once manifests are loaded; otherwise wait
      // for the next call (from HortPicker.onMounted or popstate).
      const appName = p.get('app');
      const mode = p.get('mode') || '';
      const key = appName ? (appName + '|' + mode) : '';
      const manifestsReady = !!(window.HortPlugins && window.HortPlugins.getPlugins
        && window.HortPlugins.getPlugins().length > 0);
      if (key === _appliedAppKey) return;
      // URL transitioned away from the app we last opened — close the float.
      if (_appliedAppKey && typeof LlmingClient !== 'undefined') {
        const prevApp = _appliedAppKey.split('|')[0];
        if (prevApp && LlmingClient.isFloatOpen && LlmingClient.isFloatOpen(prevApp)) {
          LlmingClient.closeFloat(prevApp);
        }
      }
      if (appName && manifestsReady) {
        _appliedAppKey = key;
        if (typeof LlmingClient !== 'undefined' && LlmingClient.openLlming) {
          LlmingClient.openLlming(appName, null, { mode: mode });
        }
      } else if (!appName) {
        _appliedAppKey = '';
      }
    } catch (e) { console.warn('[url-params] apply failed', e); }
  };
  window.addEventListener('popstate', () => window._applyHortUrlParams && window._applyHortUrlParams());

  // Activate any registered LlmingClients
  if (typeof LlmingClient !== 'undefined') {
    LlmingClient.activateAll(app, Quasar, {});
  }
  if (typeof HortPlugins !== 'undefined') {
    HortPlugins.registerPluginManager(app);
  }

  app.mount('#q-app');

  // Load plugin UI scripts when WS connects
  if (typeof HortPlugins !== 'undefined') {
    (window._hortOnConnect = window._hortOnConnect || []).push(async () => {
      await HortPlugins.discoverAndLoadPlugins();
      if (typeof LlmingClient !== 'undefined') LlmingClient.activateAll(app, Quasar, {});
      pluginsLoaded.value++;
      setTimeout(() => { pluginsLoaded.value++; }, 2000);

      // Apply deep-link URL params now that manifests are known. See
      // docs/manual/internals/url-params.md for the contract.
      _applyHortUrlParams();

      // Restore demo mode preference (after plugins are available so demo.js files load)
      if (typeof HortDemo !== 'undefined' && window.__hortPrefs) {
        try {
          const saved = await window.__hortPrefs.get('demoMode');
          if (saved && !HortDemo.active) await HortDemo.toggle();
        } catch (e) { /* noop */ }
      }
    });
  }

  // Reconnect on tab visibility change (macOS Space switching suspends tabs)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.sessionId) {
      // Check if WS is dead
      if (!state.controlWs || state.controlWs.readyState !== WebSocket.OPEN) {
        connectControlWs();
      }
    }
  });

  // PWA: manifest + service worker (skip when proxied)
  if (!_basePath) {
    const ml = document.createElement('link');
    ml.rel = 'manifest'; ml.href = 'manifest.json';
    document.head.appendChild(ml);
    if ('serviceWorker' in navigator && location.hostname !== 'localhost' && !location.hostname.match(/^(\d+\.){3}\d+$/)) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  }
})();
</script>
</body>
</html>
