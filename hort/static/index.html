<style>
/* ── Shared floating window ──────────────────────────────── */
.hort-float-window {
  background: #0e1621;
  border: 1px solid #1e2d3d;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.hort-float-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: #17212b;
  border-bottom: 1px solid #1e2d3d;
  cursor: grab;
  user-select: none;
  flex-shrink: 0;
}
.hort-float-header:active { cursor: grabbing; }
.hort-float-title {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: #dce5ed;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hort-float-actions { display: flex; gap: 4px; }
.hort-float-btn {
  background: none;
  border: none;
  color: #5b6b7d;
  font-size: 14px;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.hort-float-btn:hover { color: #dce5ed; background: rgba(255,255,255,0.08); }
.hort-float-body {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
/* Phone: slide up from bottom */
@media (max-width: 639px) {
  .hort-float-window {
    border-radius: 16px 16px 0 0;
    border-bottom: none;
  }
  .hort-float-header { cursor: default; }
}
</style>
</head>

<script>
(function () {
  'use strict';

  const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted, nextTick, toRaw } = Vue;

  // Detect proxy base path from <base> tag (injected by access server)
  const _baseEl = document.querySelector('base');
  const _basePath = _baseEl ? new URL(_baseEl.href).pathname.replace(/\/$/, '') : '';

  function wsUrl(path) {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}${_basePath}${path}`;
  }

  // Prefix API paths with base path (for cloud proxy support)
  function apiUrl(path) { return _basePath + path; }
  window.__hortBasePath = _basePath;
  window.__hortState = null; // set after state is created

  // ===== STREAM SETTINGS PERSISTENCE (IndexedDB) =====
  const _STREAM_DB = 'hort-stream-settings';
  const _STREAM_STORE = 'config';
  const _STREAM_KEY = 'streaming';
  const _STREAM_FIELDS = ['quality', 'fps', 'maxWidth', 'codec'];

  function _openStreamDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(_STREAM_DB, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(_STREAM_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function _saveStreamSettings(st) {
    try {
      const db = await _openStreamDB();
      const tx = db.transaction(_STREAM_STORE, 'readwrite');
      const obj = {};
      for (const k of _STREAM_FIELDS) obj[k] = st[k];
      tx.objectStore(_STREAM_STORE).put(obj, _STREAM_KEY);
      db.close();
    } catch (e) { /* IndexedDB not available */ }
  }

  async function _loadStreamSettings() {
    try {
      const db = await _openStreamDB();
      return new Promise((resolve) => {
        const tx = db.transaction(_STREAM_STORE, 'readonly');
        const req = tx.objectStore(_STREAM_STORE).get(_STREAM_KEY);
        req.onsuccess = () => { db.close(); resolve(req.result || null); };
        req.onerror = () => { db.close(); resolve(null); };
      });
    } catch (e) { return null; }
  }

  // ===== WIDGET LAYOUT PERSISTENCE (IndexedDB) =====
  const _WIDGET_DB = 'hort-widget-layout';
  const _WIDGET_STORE = 'layouts';

  function _openWidgetDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(_WIDGET_DB, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(_WIDGET_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function _saveWidgetLayout(desktops) {
    try {
      const deviceClass = (window.LlmingClient && LlmingClient.getDeviceType) ? LlmingClient.getDeviceType() : 'desktop';
      const data = desktops.map(d => ({
        id: d.id, name: d.name, isHome: d.isHome, tint: d.tint, hpiort: d.hpiort || null,
        widgets: d.widgets.map(w => ({
          id: w.id, type: w.type, extId: w.extId || null, subId: w.subId || null,
          size: w.size, order: w.order, hpiort: w.hpiort || null,
          hortConnections: w.hortConnections || null,
          pos: w.pos || null,
          c: { title: w.c?.title || '', iconClass: w.c?.iconClass || '' }
        }))
      }));
      const db = await _openWidgetDB();
      const tx = db.transaction(_WIDGET_STORE, 'readwrite');
      tx.objectStore(_WIDGET_STORE).put(data, deviceClass);
      db.close();
    } catch (e) { /* IndexedDB not available */ }
  }

  async function _loadWidgetLayout() {
    try {
      const deviceClass = (window.LlmingClient && LlmingClient.getDeviceType) ? LlmingClient.getDeviceType() : 'desktop';
      const db = await _openWidgetDB();
      return new Promise((resolve) => {
        const tx = db.transaction(_WIDGET_STORE, 'readonly');
        const req = tx.objectStore(_WIDGET_STORE).get(deviceClass);
        req.onsuccess = () => { db.close(); resolve(req.result || null); };
        req.onerror = () => { db.close(); resolve(null); };
      });
    } catch (e) { return null; }
  }

  // ===== APP PREFERENCES (IndexedDB) =====
  // Persisted across reloads: demo mode toggle, future UI prefs.
  const _PREFS_DB = 'hort-prefs';
  const _PREFS_STORE = 'prefs';

  function _openPrefsDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(_PREFS_DB, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(_PREFS_STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function _getPref(key) {
    try {
      const db = await _openPrefsDB();
      return new Promise(resolve => {
        const tx = db.transaction(_PREFS_STORE, 'readonly');
        const req = tx.objectStore(_PREFS_STORE).get(key);
        req.onsuccess = () => { db.close(); resolve(req.result); };
        req.onerror = () => { db.close(); resolve(undefined); };
      });
    } catch (e) { return undefined; }
  }

  async function _setPref(key, value) {
    try {
      const db = await _openPrefsDB();
      const tx = db.transaction(_PREFS_STORE, 'readwrite');
      tx.objectStore(_PREFS_STORE).put(value, key);
      db.close();
    } catch (e) { /* unavailable */ }
  }
  window.__hortPrefs = { get: _getPref, set: _setPref };

  // ===== SHARED STATE =====
  const state = reactive({
    // Connection
    sessionId: null,
    _pendingStreamWindow: null,
    controlWs: null,
    streamWs: null,
    connected: false,
    wsReady: 0,
    serverVersion: '',

    // P2P connection health (updated by viewer.html ping/pong)
    p2pConnected: false,
    p2pRttMs: 0,
    p2pRemoteIp: '',
    p2pSessionNum: 0,
    p2pTotalSessions: 0,
    p2pHealthy: true,  // false when RTT > 2000ms
    mseActive: false,  // true when VP8/VP9 MSE is rendering

    // View: 'picker' | 'viewer' | 'terminal' | 'spirit-fullscreen' (set by router onNavigate)
    view: 'picker',

    // Targets
    targets: [],          // [{id, name, provider_type, status}]
    activeTarget: 'all',  // 'all' or a target id

    // Terminals
    terminals: [],        // [{terminal_id, target_id, title, alive}]
    activeTerminalId: null,

    // Session
    isLocal: true,  // true = direct access, false = through proxy

    // Connectors (only shown when local)
    connectors: {
      lan: { active: false, ip: '', http_url: '', https_url: '', qr: '' },
      cloud: { active: false, server_url: '' },
      messaging: {},  // {telegram: {active, token_set, allowed_users, polling, plugin_id}, ...}
    },
    connectorPanelOpen: null,  // null | 'lan' | 'cloud' | 'telegram' | 'p2p'
    _p2pLink: '',
    _p2pQr: '',
    _p2pTab: 'once',
    _hostedApps: [],
    _p2pPairLink: '',
    _p2pDevices: [],
    sidebarOpen: false,
    nativeApp: false,  // true when running inside Android/iOS native shell

    // Windows
    allWindows: [],
    navWindows: [],
    navIndex: 0,
    appNames: [],
    appFilter: '',

    // Groups
    navMode: 'all', // 'all' | 'app' | group name
    activeGroupName: null,

    // Spaces
    spacesData: { spaces: [], current: 1, count: 0 },

    // Viewer
    activeMode: false,
    fitMode: 'auto', // 'auto' | 'vertical' | 'custom'
    scale: 1,
    tx: 0,
    ty: 0,
    imgNatW: 0, srcNatW: 0, srcNatH: 0,
    imgNatH: 0,

    // Stream
    streamBlobUrl: null,
    prevBlobUrl: null,
    frameCount: 0,
    fpsText: '',
    observerCount: 0,
    vpZoomed: false,  // reactive proxy for _vp.zoom > 1
    vpX: 0, vpY: 0, vpW: 1, vpH: 1,  // reactive copies for minimap
    navThumb: null,  // navigator thumbnail (data URL)

    // Settings
    quality: 70,
    fps: 15,
    maxWidth: 100,  // resolution % (25-100)
    codec: 'webp',  // 'webp', 'vp8', 'vp9'
    settingsOpen: false,

    // Overview
    overviewOpen: false,

    // Group modal
    groupModalOpen: false,
    groupModalTitle: 'New Group',
    groupModalName: '',
    groupModalEditing: null,
    groupModalCallback: null,

    // Thumbnails (for cache busting)
    thumbCounter: 0,

    // Extension panels
    extensionPanels: [],

    // Unified toolbar state (shared between picker and HortApp)
    viewTab: 'screens',  // 'screens' | 'spirits' | 'config'
    targetDropdownOpen: false,

    // ── Widget Home Screen ──
    widgetMode: true,
    desktops: [],
    activeDesktopIdx: 0,
    editMode: false,
    whDrawer: false,
    widgetPicker: false,
    widgetPickerSearch: '',
    pickerCat: null,
    desktopOverview: false,
    deviceView: false,
    activeDevice: 0,
    detailWidget: null,
    whToast: '',
    whNameEditor: null,
    // Drag state
    dragW: null,
    dragDesk: null,
    dragGhost: null,
    selectedWidget: null,
    // Context menu
    wctx: { open: false, x: 0, y: 0, w: null, desk: null },
    gridCtx: { open: false, x: 0, y: 0 },
    // Notifications
    notifications: [],
    notifMenuOpen: false,
    criticalFlash: 0,
    marqueeText: '',
    marqueeNotif: null,
    marqueeKey: 0,
    centerNotif: null,
    widgetBadges: {},
    // Debug
    debugMenuOpen: false,
    // Simulation
    simCollapsed: true,
    simMotionActive: false,
    simWashingMachine: false,
    simIsDaytime: true,
    simN8nFail: false,
    // Viewport simulation
    vpSimMode: null, // null | 'phone' | 'tablet'
  });
  window.__hortState = state;

  // ── Desktop tint colors (16 dark hues) ──
  const desktopTints = [
    {id:'blue',    rgb:[20,40,70],  bg:'#0a0e1a', plasma1:'rgba(50,110,180,.3)',  plasma2:'rgba(40,90,150,.25)', plasma3:'rgba(60,100,160,.2)'},
    {id:'crimson', rgb:[50,16,20],  bg:'#120a0b', plasma1:'rgba(140,40,50,.3)',   plasma2:'rgba(120,30,40,.25)',plasma3:'rgba(100,35,45,.2)'},
    {id:'green',   rgb:[16,42,24],  bg:'#0a120d', plasma1:'rgba(40,140,60,.3)',   plasma2:'rgba(35,120,50,.25)',plasma3:'rgba(50,130,55,.2)'},
    {id:'purple',  rgb:[35,18,50],  bg:'#0d0a12', plasma1:'rgba(100,50,160,.3)',  plasma2:'rgba(85,40,140,.25)',plasma3:'rgba(90,45,150,.2)'},
    {id:'amber',   rgb:[45,35,16],  bg:'#100e0a', plasma1:'rgba(160,120,40,.3)',  plasma2:'rgba(140,100,35,.25)',plasma3:'rgba(150,110,40,.2)'},
    {id:'teal',    rgb:[16,42,42],  bg:'#0a1212', plasma1:'rgba(40,140,140,.3)',  plasma2:'rgba(35,120,120,.25)',plasma3:'rgba(45,130,130,.2)'},
    {id:'pink',    rgb:[45,18,32],  bg:'#100a0e', plasma1:'rgba(160,50,100,.3)',  plasma2:'rgba(140,40,85,.25)',plasma3:'rgba(150,45,90,.2)'},
    {id:'orange',  rgb:[45,28,16],  bg:'#100c0a', plasma1:'rgba(160,90,40,.3)',   plasma2:'rgba(140,75,35,.25)',plasma3:'rgba(150,80,40,.2)'},
    {id:'indigo',  rgb:[22,18,50],  bg:'#0b0a12', plasma1:'rgba(70,50,160,.3)',   plasma2:'rgba(60,40,140,.25)',plasma3:'rgba(65,45,150,.2)'},
    {id:'cyan',    rgb:[16,36,45],  bg:'#0a0e10', plasma1:'rgba(40,110,160,.3)',  plasma2:'rgba(35,95,140,.25)',plasma3:'rgba(45,100,150,.2)'},
    {id:'emerald', rgb:[16,42,32],  bg:'#0a120e', plasma1:'rgba(40,140,100,.3)',  plasma2:'rgba(35,120,85,.25)',plasma3:'rgba(45,130,90,.2)'},
    {id:'rose',    rgb:[45,18,28],  bg:'#100a0d', plasma1:'rgba(160,50,85,.3)',   plasma2:'rgba(140,40,70,.25)',plasma3:'rgba(150,45,75,.2)'},
    {id:'violet',  rgb:[30,18,50],  bg:'#0c0a12', plasma1:'rgba(90,50,160,.3)',   plasma2:'rgba(75,40,140,.25)',plasma3:'rgba(80,45,150,.2)'},
    {id:'slate',   rgb:[24,28,38],  bg:'#0b0c10', plasma1:'rgba(70,85,120,.3)',   plasma2:'rgba(60,75,105,.25)',plasma3:'rgba(65,80,110,.2)'},
    {id:'lime',    rgb:[28,42,16],  bg:'#0c120a', plasma1:'rgba(85,140,40,.3)',   plasma2:'rgba(75,120,35,.25)',plasma3:'rgba(80,130,40,.2)'},
    {id:'sky',     rgb:[16,32,45],  bg:'#0a0e10', plasma1:'rgba(40,95,160,.3)',   plasma2:'rgba(35,80,140,.25)',plasma3:'rgba(45,85,150,.2)'},
  ];

  // ── Hort groups (security boundaries) ──
  const hortGroups = [
    {id:'default',   name:'Local',       color:'#3b82f6', tint:0, icon:'ph ph-house',          desc:'Local machine, no restrictions'},
    {id:'sandboxed', name:'Sandboxed',   color:'#f59e0b', tint:4, icon:'ph ph-shield-warning', desc:'Container-isolated, limited network'},
    {id:'sap',       name:'SAP Finance', color:'#ef4444', tint:1, icon:'ph ph-lock',           desc:'Confidential — no network out, no email'},
    {id:'public',    name:'Public',      color:'#22c55e', tint:2, icon:'ph ph-globe',          desc:'Public data only, unrestricted output'},
    {id:'hr',        name:'HR Systems',  color:'#a855f7', tint:3, icon:'ph ph-users',          desc:'PII — no logging, no external sharing'},
  ];
  function getHortGroup(id) { return hortGroups.find(h => h.id === id) || hortGroups[0]; }

  // ── Widget accent colors ──
  const _widgetAccents = {
    'system-monitor':'#06b6d4', 'network-monitor':'#22c55e', 'clipboard-history':'#3b82f6',
    'llming-lens':'#60a5fa', 'now-playing':'#a855f7', 'calendar':'#3b82f6', 'email':'#06b6d4',
    'n8n-workflows':'#ff6d00', 'cameras':'#ef4444', 'energy':'#22c55e', 'weather':'#f59e0b',
    'code-watch':'#a855f7', 'openclaw':'#f59e0b', 'process-manager':'#94a3b8'
  };

  // ── Widget default sizes ──
  const _defaultSizes = {
    'system-monitor':'1x1', 'network-monitor':'1x1', 'clipboard-history':'1x1',
    'llming-lens':'2x1', 'now-playing':'2x1', 'calendar':'1x1', 'email':'1x1',
    'n8n-workflows':'1x1', 'cameras':'2x1', 'energy':'2x1', 'weather':'1x1',
    'code-watch':'1x2', 'openclaw':'2x1', 'process-manager':'1x1',
    'llming-wire':'2x1', 'disk-usage':'1x1',
  };

  // ── Widget grid helpers ──
  function nextWidgetId() { return 'w_' + crypto.randomUUID(); }

  const WH_CELL_W = 280, WH_GAP = 14, WH_PAD = 20;
  function whCalcCols() { return Math.max(2, Math.floor((window.innerWidth - 2 * WH_PAD + WH_GAP) / (WH_CELL_W + WH_GAP))); }
  const whGridCols = ref(whCalcCols());
  window.addEventListener('resize', () => { whGridCols.value = whCalcCols(); });
  watch(whGridCols, v => { document.documentElement.style.setProperty('--cols', v); }, { immediate: true });

  function whGetWidgets(desk) { return [...desk.widgets].sort((a, b) => (a.pos?.r ?? 999) - (b.pos?.r ?? 999) || (a.pos?.c ?? 0) - (b.pos?.c ?? 0)); }

  // Center-relative positioning with temporary reflow.
  // Each widget has pos: {c, r} where c is center-relative (0 = screen center).
  // Returns: { widgetId: { c: cssGridCol, r, w, h } }
  let _whTempPositions = false; // true when current layout is a temporary reflow
  function whComputePositions(desktops, cols) {
    const off = Math.floor(cols / 2); // center offset
    const result = {};
    for (const desk of desktops) {
      const widgets = whGetWidgets(desk);
      const occupied = {};
      function isOcc(r, c, w, h) {
        for (let dr = 0; dr < h; dr++) for (let dc = 0; dc < w; dc++) if (occupied[(r+dr)+','+(c+dc)]) return true;
        return false;
      }
      function markOcc(r, c, w, h) {
        for (let dr = 0; dr < h; dr++) for (let dc = 0; dc < w; dc++) occupied[(r+dr)+','+(c+dc)] = true;
      }

      // Phase 1: Try placing widgets at their stored center-relative positions
      const placed = new Set();
      const sorted = [...widgets].filter(w => w.pos && w.pos.c !== undefined);
      const noPos = widgets.filter(w => !w.pos || w.pos.c === undefined);

      for (const w of sorted) {
        const [ww, wh] = w.size.split('x').map(Number);
        const cw = Math.min(ww, cols);
        // Map center-relative → 0-based grid column, clamp to bounds
        let gc = Math.max(0, Math.min(cols - cw, w.pos.c + off));
        let gr = Math.max(0, w.pos.r);
        if (!isOcc(gr, gc, cw, wh)) {
          markOcc(gr, gc, cw, wh);
          result[w.id] = { c: gc, r: gr, w: cw, h: wh };
          placed.add(w.id);
        }
      }

      // Phase 2: Auto-reflow any widgets that didn't fit (+ those without pos)
      const remaining = [...sorted.filter(w => !placed.has(w.id)), ...noPos];
      for (const w of remaining) {
        _whTempPositions = true; // at least one widget was reflowed
        const [ww, wh] = w.size.split('x').map(Number);
        const cw = Math.min(ww, cols);
        for (let tr = 0; tr < 50; tr++) {
          let done = false;
          for (let tc = 0; tc <= cols - cw; tc++) {
            if (!isOcc(tr, tc, cw, wh)) { markOcc(tr, tc, cw, wh); result[w.id] = { c: tc, r: tr, w: cw, h: wh }; done = true; break; }
          }
          if (done) break;
        }
      }
    }
    return result;
  }

  function whWidgetStyle(w, desk) {
    const s = {};
    // Icon always shows the widget's own identity color
    s['--widget-icon-color'] = _widgetAccents[w.extId] || '#3b82f6';
    const wHort = w.hpiort || null;
    const deskHort = desk.hpiort || null;
    if (wHort && wHort !== deskHort) {
      // Widget has explicit hort different from desktop — colored border + glow
      const hg = getHortGroup(wHort);
      const tint = desktopTints[hg.tint || 0] || desktopTints[0];
      s.borderColor = hg.color;
      s.borderWidth = '2px';
      s['--rest-glow'] = `0 0 30px rgba(${(tint.rgb[0]*4)},${(tint.rgb[1]*4)},${(tint.rgb[2]*4)},.45)`;
      s['--hover-glow'] = hg.color;
      s['--widget-accent'] = hg.color;
    } else if (deskHort) {
      // Desktop has hort — all widgets get subtle tint
      const hg = getHortGroup(deskHort);
      s.borderColor = hg.color + '60';
      s['--rest-glow'] = '0 0 20px rgba(0,0,0,.2)';
      s['--hover-glow'] = hg.color;
      s['--widget-accent'] = hg.color;
    } else {
      // No hort — default tint border
      const tint = desktopTints[desk.tint || 0];

  // Initialize desktops: load from IndexedDB or use defaults
  async function whInitDesktops() {
    const saved = await _loadWidgetLayout();

    const valid = saved && saved.length > 0 && saved.every(d =>
      !d.widgets || d.widgets.length === 0 || d.widgets.every(w => w.pos && w.pos.c !== undefined && w.pos.r !== undefined)
    );
    if (valid) {
      state.desktops = saved;
    } else {
      state.desktops = whDefaultDesktops();
    }
  }

  // ===== CONTROL WS =====
  let pendingRequests = {};
  let requestId = 0;
  let heartbeatTimer = null;
  let reconnectTimer = null;

  function sendControl(msg) {
    if (state.controlWs && state.controlWs.readyState === WebSocket.OPEN) {
      state.controlWs.send(JSON.stringify(msg));
    }
  }

  function sendControlRequest(msg) {
    // Offline / demo bundle: there is no control WS. Route through the
    // mock that HortDemo installed on window.hortWS so closure-bound
    // callers (refreshSpirits, etc.) don't time out waiting for nothing.
    if (window.__LLMING_OFFLINE__ && window.hortWS && window.hortWS.request !== sendControlRequest) {
      return window.hortWS.request(msg);
    }
    return new Promise((resolve) => {
      const id = ++requestId;
      pendingRequests[id] = resolve;
      msg._req_id = id;
      sendControl(msg);
      // Timeout after 10s
      setTimeout(() => {
        if (pendingRequests[id]) {
          delete pendingRequests[id];
          resolve(null);
        }
      }, 10000);
    });
  }

  // Expose WS request function for vendor scripts (hort-llmings-ui.js, etc.)
  window.hortWS = { request: sendControlRequest };

  // ── Browser Camera API ──
  // Share browser webcam as a source. ACK-based: sends one frame, waits for ack.
  window.hortCamera = {
    // Per-device state: sourceId → { stream, ws, video, canvas, running, waitingAck, interval }
    _devices: {},

    async startDevice(sourceId, deviceId) {
      if (this._devices[sourceId]?.running) return sourceId;
      if (!deviceId) {
        const prefix = 'cam:browser_';
        if (sourceId.startsWith(prefix)) {
          const shortId = sourceId.slice(prefix.length);
          const devices = await navigator.mediaDevices.enumerateDevices();
          const match = devices.find(d => d.kind === 'videoinput' && d.deviceId.startsWith(shortId));
          if (match) deviceId = match.deviceId;
          else console.warn('[browser-cam] no device match for', shortId);
        }
      }
      const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: 'user', width: 1280, height: 720 } };
      let stream;
      try { stream = await navigator.mediaDevices.getUserMedia(constraints); }
      catch (e) { console.error('[browser-cam] getUserMedia failed:', e.message); return null; }
      const track = stream.getVideoTracks()[0];
      const settings = track.getSettings();
      const offer = await sendControlRequest({
        type: 'camera_offer', device_name: track.label || 'Browser Camera',
        device_id: deviceId || '', width: settings.width || 1280, height: settings.height || 720,
      });
      if (!offer || !offer.ok) { console.error('[browser-cam] offer failed:', offer); stream.getTracks().forEach(t => t.stop()); return null; }
      const actualSourceId = offer.source_id;
      const video = document.createElement('video');
      video.srcObject = stream; video.muted = true; video.autoplay = true; video.playsInline = true;
      video.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none';
      document.body.appendChild(video);
      await video.play();
      const canvas = document.createElement('canvas');
      canvas.width = settings.width || 1280; canvas.height = settings.height || 720;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(proto + '://' + location.host + '/ws/camera/' + state.sessionId + '/' + encodeURIComponent(actualSourceId));
      ws.binaryType = 'arraybuffer';
      const dev = { stream, ws, video, canvas, running: true, waitingAck: false, interval: null, sourceId: actualSourceId };
      this._devices[actualSourceId] = dev;
      const sendFrame = () => {
        if (!dev.running || !dev.video || !dev.ws || dev.ws.readyState !== WebSocket.OPEN || dev.waitingAck) return;
        dev.waitingAck = true;
        const ctx = dev.canvas.getContext('2d'); ctx.drawImage(dev.video, 0, 0);
        dev.canvas.toBlob(blob => {
          if (blob && dev.ws && dev.ws.readyState === WebSocket.OPEN) blob.arrayBuffer().then(buf => { dev.ws.send(buf); });
          else dev.waitingAck = false;
        }, 'image/webp', 0.8);
      };
      ws.onopen = () => sendFrame();
      ws.onmessage = () => { dev.waitingAck = false; if (dev.running) sendFrame(); };
      ws.onclose = () => { dev.running = false; };
      dev.interval = setInterval(() => { if (dev.running && !dev.waitingAck) sendFrame(); }, 200);
      return actualSourceId;
    },
    stopDevice(sourceId) {
      const dev = this._devices[sourceId]; if (!dev) return;
      dev.running = false;
      if (dev.interval) clearInterval(dev.interval);
      if (dev.ws) { try { dev.ws.close(); } catch(e) {} }
      if (dev.stream) dev.stream.getTracks().forEach(t => t.stop());
      if (dev.video) { dev.video.srcObject = null; if (dev.video.parentNode) dev.video.parentNode.removeChild(dev.video); }
      delete this._devices[sourceId];
      sendControl({ type: 'camera_stop', source_id: sourceId });
    },
    async start(deviceId) { return this.startDevice('cam:browser_' + (deviceId || 'default').slice(0, 12), deviceId); },
    stop() { for (const sid of Object.keys(this._devices)) this.stopDevice(sid); },
    async listDevices() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      return devices.filter(d => d.kind === 'videoinput').map(d => ({ deviceId: d.deviceId, label: d.label || 'Camera ' + d.deviceId.slice(0, 8) }));
    },
  };

  // ===== DEEP-LINK URL HANDLING =====
  // Stream settings from hash URL are applied in onNavigate() when the
  // router fires the initial route.  Legacy path-based deep-links
  // Legacy path-based deep-links (/view/{target}/{window}) and hash URLs are
  // migrated to clean paths by HortRouter.init().

  async function initSession() {
    // Offline / single-file demo bundle — no backend, no session, no WS.
    // HortDemo provides the entire data plane via the in-memory vault and
    // stream mocks that share the same client-side delivery code. We fire
    // the same _hortOnConnect callbacks the WS path would (plugin
    // discovery, activation, demo restore) so the rest of the app boots
    // without caring whether it's online.
    if (window.__LLMING_OFFLINE__) {
      state.sessionId = 'offline';
      state.isLocal = true;
      // Activate demo FIRST so the mock WS is installed and every llming's
      // initial vault is seeded — then fire the WS-connect callbacks that
      // load card scripts and read those vaults via the mock. Finally
      // bump the demo epoch so the widget grid re-evaluates dynamic
      // `<component :is>` lookups now that the registry is populated.
      if (typeof HortDemo !== 'undefined' && !HortDemo.active) {
        await HortDemo.toggle();
      }
      const cbs = window._hortOnConnect || [];
      for (const cb of cbs) { try { await cb(); } catch (e) { console.error('[offline]', e); } }
      // No manual re-render bumps — spiritCardComponent / spiritWidgetName
      // read LlmingClient.registryVersion as a reactive dependency, so the
      // widget grid re-resolves dynamic <component :is> automatically when
      // activateAll registers the cards above.
      return;
    }
    try {
      const resp = await fetch(apiUrl('/api/session'), { method: 'POST' });
      const data = await resp.json();
      state.sessionId = data.session_id;
      state.isLocal = data.is_local !== false;
      connectControlWs();
      // Fetch connectors if local
      if (state.isLocal) fetchConnectors();
    } catch (e) {
      console.error('Failed to create session:', e);
      setTimeout(initSession, 2000);
    }
  }

  let _cloudOptimisticUntil = 0;

  async function fetchConnectors() {
    try {
      // Fetch LAN/cloud/messaging status via REST (fast, no WS needed)
      const resp = await fetch(apiUrl('/api/connectors'));
      if (resp.ok) {
        const data = await resp.json();
        if (data.lan) state.connectors.lan = data.lan;
        if (data.cloud) state.connectors.cloud = data.cloud;
        if (data.messaging) state.connectors.messaging = data.messaging;
      }
    } catch {}
  }

  function connectControlWs() {
    if (state.controlWs) {
      state.controlWs.close();
      state.controlWs = null;
    }
    const ws = new WebSocket(wsUrl(`/ws/control/${state.sessionId}`));
    state.controlWs = ws;

    ws.onopen = () => {
      state.connected = true;
      startHeartbeat();
      // Fire registered on-connect callbacks (llming loading, etc.)
      for (const fn of (window._hortOnConnect || [])) {
        try { fn(); } catch (e) { console.error('[onConnect]', e); }
      }
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleControlMessage(msg);
      } catch {}
    };

    ws.onclose = () => {
      state.connected = false;
      stopHeartbeat();
      // Reconnect
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        if (state.sessionId) connectControlWs();
      }, 1000);
    };

    ws.onerror = () => {};
  }

  function handleControlMessage(msg) {
    // Check if this is a response to a pending request
    if (msg._req_id && pendingRequests[msg._req_id]) {
      pendingRequests[msg._req_id](msg);
      delete pendingRequests[msg._req_id];
      // Still process the message for side effects
    }

    switch (msg.type) {
      case 'connected':
        state.serverVersion = msg.version || '';
        state.wsReady = (state.wsReady || 0) + 1;  // reactive trigger for llming loading
        requestTargets();
        requestTerminalList();
        sendControl({ type: 'tunnel_status' });
        // Notify extensions
        if (typeof LlmingClient !== 'undefined') LlmingClient.notifyConnect();
        break;
      case 'pulse':
        // Server-pushed pulse event → route to subscribed card instances
        if (typeof LlmingClient !== 'undefined' && msg.channel && msg.data) {
          for (const [, inst] of LlmingClient.getRegistry()) {
            const active = LlmingClient.get(inst.id || '');
            if (active && active._handlePulse) {
              active._handlePulse(msg.channel, msg.data);
            }
          }
        }
        break;
      case 'vault.update':
        // Server-pushed vault change → route to vaultRef watchers
        if (typeof LlmingClient !== 'undefined' && msg.owner && msg.key && msg.data) {
          LlmingClient._notifyVaultUpdate(msg.owner, msg.key, msg.data);
        }
        break;
      case 'stream.frame':
        // Server-pushed frame stream → route to useStream subscribers
        if (typeof LlmingClient !== 'undefined' && msg.channel) {
          LlmingClient._handleStreamFrame(msg.channel, msg.data);
        }
        break;
      case 'stream.chunk':
        // Server-pushed continuous stream chunk
        if (typeof LlmingClient !== 'undefined' && msg.channel) {
          LlmingClient._handleStreamFrame(msg.channel, msg.data);
        }
        break;
      case 'demo.toggle':
        // Debug API triggered demo mode toggle
        if (typeof HortDemo !== 'undefined') {
          HortDemo.toggle();
        }
        break;
      case 'windows_list':
        handleWindowsList(msg);
        break;
      case 'thumbnail':
        handleThumbnail(msg);
        break;
      case 'status':
        state.observerCount = msg.observers || 0;
        break;
      case 'spaces':
        handleSpaces(msg);
        break;
      case 'space_switched':
        if (msg.ok) {
          requestSpaces();
          requestWindows();
        }
        break;
      case 'stream_config_ack':
        break;
      case 'codec_change':
        // Server switched codec — reset client frame tracking (seq restarts from 0)
        console.log('[codec_change] → ' + msg.codec + ', resetting seq from ' + _lastRenderedSeq);
        _lastRenderedSeq = -1;
        _pendingFrame = null;
        _clientStreamStart = 0;
        _serverTimeOffset = 0;
        break;
      case 'source_dims':
        // Server tells us the native source dimensions (before crop)
        state.srcNatW = msg.width;
        state.srcNatH = msg.height;
        // Auto-fit viewport to source aspect ratio
        if (_vp.zoom <= 1) { _resetViewport(); applyTransform(); }
        break;
      case 'stream_error':
        handleStreamError(msg);
        break;
      case 'targets_list':
        state.targets = msg.targets || [];
        state.activeTarget = msg.active || 'all';
        break;
      case 'target_changed':
        // Server acknowledges target change — already handled client-side
        break;
      case 'terminal_spawned':
        state.terminals.push({
          terminal_id: msg.terminal_id,
          target_id: msg.target_id,
          title: msg.title,
          alive: true,
        });
        LlmingClient.openTerminal(msg.terminal_id);
        break;
      case 'terminal_list':
        state.terminals = msg.terminals || [];
        /* tmux debug logging removed */
        break;
      case 'terminal_closed':
        state.terminals = state.terminals.filter(t => t.terminal_id !== msg.terminal_id);
        if (state.activeTerminalId === msg.terminal_id) {
          state.activeTerminalId = null;
          if (state.view === 'terminal') HortRouter.push('/');
        }
        break;
      case 'tunnel_status':
        state.connectors.cloud = {
          active: msg.active || false,
          server_url: msg.server_url || '',
        };
        break;
      case 'token_created':
      case 'token_list':
      case 'token_verified':
      case 'tokens_revoked':
        // Handled by extension/plugin that requested them
        break;
      case 'heartbeat_ack':
        break;
      case 'ui_action':
        _handleUIAction(msg);
        break;
    }
  }

  // ── Console capture (for debug.console API) ──
  const _origLog = console.log, _origWarn = console.warn, _origErr = console.error;
  const _consoleLogs = [];
  console.log = function(...a) { _origLog.apply(console, a); _consoleLogs.push({level:'log',ts:Date.now(),msg:a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' ')}); if(_consoleLogs.length>500)_consoleLogs.shift(); };
  console.warn = function(...a) { _origWarn.apply(console, a); _consoleLogs.push({level:'warn',ts:Date.now(),msg:a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' ')}); if(_consoleLogs.length>500)_consoleLogs.shift(); };
  console.error = function(...a) { _origErr.apply(console, a); _consoleLogs.push({level:'error',ts:Date.now(),msg:a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' ')}); if(_consoleLogs.length>500)_consoleLogs.shift(); };

  function _handleUIAction(msg) {
    switch (msg.action) {
      case 'run_js': try { new Function(msg.code)(); } catch(e) { console.error('[run_js]', e.message); } break;
      case 'eval_js': try { const r = new Function('return (' + msg.code + ')')(); sendControl({type:'ui_action_response',action:'eval_js',result:JSON.stringify(r)}); } catch(e) { sendControl({type:'ui_action_response',action:'eval_js',error:e.message}); } break;
      case 'get_console_logs': { let l=_consoleLogs.slice(); if(msg.level)l=l.filter(x=>x.level===msg.level); if(msg.since)l=l.filter(x=>x.ts>msg.since); if(msg.pattern){try{const re=new RegExp(msg.pattern,'i');l=l.filter(x=>re.test(x.msg));}catch(e){}} sendControl({type:'ui_action_response',action:'get_console_logs',logs:l.slice(-100),total:_consoleLogs.length}); break; }

  function _initMSE(initData) {
    const video = document.getElementById('mse-video');

    // Clean up previous MSE

      try { _mediaSource.endOfStream(); } catch(e) {}

    _sourceBuffer = null;
    _mseQueue = [];
    _mseReady = false;

    const codec = state.codec === 'vp9' ? 'vp9' : 'vp8';
    _mediaSource = new MediaSource();
    video.src = URL.createObjectURL(_mediaSource);

    _mediaSource.addEventListener('sourceopen', () => {
      try {
        _sourceBuffer = _mediaSource.addSourceBuffer('video/webm; codecs="' + codec + '"');
        _sourceBuffer.mode = 'sequence';
        _sourceBuffer.addEventListener('updateend', () => {
          // Priority: append queued frames as fast as possible
          if (_mseQueue.length > 0 && !_sourceBuffer.updating) {
            try { _sourceBuffer.appendBuffer(_mseQueue.shift()); }
            catch (e) { _mseQueue = []; }
          }
        });
        _sourceBuffer.appendBuffer(initData);
        _mseReady = true;
        state.mseActive = true;

        // Track video dimensions (but never reset viewport — that's only
        // done on source_dims message, not on MSE reinit)
        video.addEventListener('loadedmetadata', () => {
          if (video.videoWidth && video.videoHeight) {
            state.imgNatW = video.videoWidth;
            state.imgNatH = video.videoHeight;
          }
        }, { once: true });

        // Live-edge seeker — keeps video within 0.3s of the live edge
        // Uses playbackRate adjustment instead of seeking (smoother)
        const liveSeeker = setInterval(() => {
          if (!_mseReady || !video.buffered.length) return;
          try {
            const liveEdge = video.buffered.end(video.buffered.length - 1);
            const lag = liveEdge - video.currentTime;
            if (lag > 2.0) {
              // Way behind — hard seek
              video.currentTime = liveEdge - 0.1;
              video.playbackRate = 1.0;
            } else if (lag > 0.8) {
              // Behind — speed up proportionally to catch up
              video.playbackRate = 1.0 + Math.min(lag, 2.0);
            } else if (lag > 0.3) {
              video.playbackRate = 1.2;
            } else {
              video.playbackRate = 1.0;
            }
          } catch(e) {}
        }, 200);
        video._liveSeeker = liveSeeker;
      } catch (e) {
        console.error('MSE init error:', e);
      }
    });
  }

  function connectStreamWs() {
    disconnectStreamWs();
    const gen = ++_streamGeneration;
    const ws = new WebSocket(wsUrl(`/ws/stream/${state.sessionId}`));
    ws.binaryType = 'arraybuffer';
    state.streamWs = ws;

    ws.onopen = () => {
      startFpsCounter();
      // Reset timestamp sync for new stream
      _clientStreamStart = 0;
      _serverTimeOffset = 0;
      _lastRenderedSeq = -1;
      _pendingFrame = null;
      _droppedStale = 0;
      // Send pending stream config now that WS is open
      if (state._pendingStreamWindow) {
        const { windowId, targetId } = state._pendingStreamWindow;
        state._pendingStreamWindow = null;

    };

    // Frame handling differs by codec:
    // JPEG/WebP: drop-safe — only render latest frame per rAF
    // VP8/VP9: ordered — append every frame to MSE SourceBuffer

    ws.onmessage = (e) => {
      if (!(e.data instanceof ArrayBuffer) || e.data.byteLength < 10) return;

      const hdr = new DataView(e.data, 0, 10);
      const streamId = hdr.getUint16(0);
      const seq = hdr.getUint32(2);
      const serverTs = hdr.getUint32(6);
      const payload = e.data.slice(10);
      const b = new Uint8Array(payload);

      if (_clientStreamStart === 0) {

      const clientElapsed = performance.now() - _clientStreamStart;
      const serverElapsed = serverTs - _serverTimeOffset;

      const isEBML = b.length > 4 && b[0] === 0x1A && b[1] === 0x45 && b[2] === 0xDF && b[3] === 0xA3;
      const isCluster = b.length > 4 && b[0] === 0x1F && b[1] === 0x43 && b[2] === 0xB6 && b[3] === 0x75;
      const isVideo = isEBML || isCluster;

      if (isVideo) {
        if (isEBML) {
          _initMSE(payload);
        } else {
          // Always queue, let updateend drain as fast as possible
          // Keep max 30 frames (~2s at 15fps) — drop oldest if full
          if (_mseQueue.length >= 30) _mseQueue.shift();
          _mseQueue.push(payload);
          // Kick the drain if SourceBuffer is idle
          if (_sourceBuffer && !_sourceBuffer.updating && _mseQueue.length > 0) {
            try { _sourceBuffer.appendBuffer(_mseQueue.shift()); }

        state.frameCount++;

        sendControl({ type: 'stream_ack', stream_id: streamId, seq: seq });

            try { _mediaSource.endOfStream(); } catch(e) {}
          }
          _mediaSource = null; _sourceBuffer = null; _mseQueue = []; _mseReady = false;
          state.mseActive = false;
        }
        // Drop stale, render latest via rAF
        if (frameAge > STALE_THRESHOLD_MS) {
          _droppedStale++;
          sendControl({ type: 'stream_ack', stream_id: streamId, seq: seq });
          return;
        }
        if (seq <= _lastRenderedSeq) return;

        _pendingFrame = { streamId, seq, payload };
        if (!_renderScheduled) {
          _renderScheduled = true;
          requestAnimationFrame(() => {
            _renderScheduled = false;
            if (!_pendingFrame) return;
            const { streamId: sid, seq: s, payload: p } = _pendingFrame;
            _pendingFrame = null;
            const blob = new Blob([p], { type: 'image/webp' });
            const url = URL.createObjectURL(blob);
            if (state.prevBlobUrl) URL.revokeObjectURL(state.prevBlobUrl);
            state.prevBlobUrl = state.streamBlobUrl;
            state.streamBlobUrl = url;
            _lastRenderedSeq = s;
            state.frameCount++;
    
            sendControl({ type: 'stream_ack', stream_id: sid, seq: s });
          });
        }
      }
    };

    ws.onclose = () => {
      // Only reconnect if this WS is still current (not superseded)
      if (gen === _streamGeneration && state.view === 'viewer' && currentWindow()) {
        setTimeout(connectStreamWs, 1000);
      }
    };
  }

  function disconnectStreamWs() {

  // Viewport state: what portion of the screen is visible (0-1 normalized)
  // zoom=1 → full screen, zoom=2 → 50% of screen visible, etc.
  const _vp = { x: 0, y: 0, w: 1, h: 1, zoom: 1 };

  function _computeViewport() {
    return {
      vp_x: Math.round(_vp.x * 1000) / 1000,
      vp_y: Math.round(_vp.y * 1000) / 1000,
      vp_w: Math.round(_vp.w * 1000) / 1000,
      vp_h: Math.round(_vp.h * 1000) / 1000,
    };
  }

  function _zoomViewport(delta, centerX, centerY) {
    const oldW = _vp.w, oldH = _vp.h;
    const newZoom = _vp.zoom * (1 + delta * 0.05);
    if (newZoom < 1.01) { _resetViewport(); return; }
    _vp.zoom = Math.min(5, newZoom);

    // Viewport crop must match client's aspect ratio in source coordinates
    // so the zoomed content fills the screen without padding/distortion.
    const srcW = state.srcNatW || 5120;
    const srcH = state.srcNatH || 1440;
    const clientAr = (window.innerWidth || 1) / (window.innerHeight || 1);
    const vpAr = clientAr * srcH / srcW;

    let newH = 1 / _vp.zoom;
    let newW = newH * vpAr;
    if (newW > 1) { newW = 1; newH = newW / vpAr; }
    _vp.w = Math.min(1, Math.max(0.01, newW));
    _vp.h = Math.min(1, Math.max(0.01, newH));

    // Zoom toward cursor (centerX/Y are 0-1 within the displayed image)
    _vp.x = Math.max(0, Math.min(1 - _vp.w, _vp.x + centerX * (oldW - _vp.w)));
    _vp.y = Math.max(0, Math.min(1 - _vp.h, _vp.y + centerY * (oldH - _vp.h)));
  }

    // dx/dy are pixel deltas, convert to viewport fraction
    _vp.x = Math.max(0, Math.min(1 - _vp.w, _vp.x - dx * _vp.w));
    _vp.y = Math.max(0, Math.min(1 - _vp.h, _vp.y - dy * _vp.h));
  }

  // asks every iframe of `id` for permission (timeout 250 ms, default =
  // allow, so a missing or buggy handler can never trap the user).
  // When the app handled its own confirm and is ready to close, it calls
  // $llming.closeSelf() — the bridge sets a one-shot bypass flag so the
  // beforeClose negotiation is skipped on the next call.
  //
  // Once permission is granted: if we pushed the URL ourselves

  window.__hortCloseApp = async function (id) {

    // URL deep-link key need an explicit close — the URL parser only

    // idempotent for sandboxed apps too (the parser's close is a no-op).
    if (id && typeof LlmingClient !== 'undefined' && LlmingClient.closeFloat) {

      document.addEventListener('touchmove', onMove, { passive: false });

    };
    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart, { passive: false });

  const HortGroupModal = {

            <button class="modal-save" @click="save">Save</button>
          </div>
        </div>
      </div>
    `,
    setup() {
      const nameInput = ref(null);

      watch(() => state.groupModalOpen, (open) => {
        if (open) nextTick(() => { if (nameInput.value) nameInput.value.focus(); });
      });

      function save() {
        const n = state.groupModalName.trim();
        if (!n) return;
        if (state.groupModalCallback) {
          state.groupModalCallback(n);
          closeModal();
          return;
        }
        const g = loadGroups();
        if (state.groupModalEditing && state.groupModalEditing !== n) {
          g[n] = g[state.groupModalEditing] || [];
          delete g[state.groupModalEditing];
          if (state.navMode === state.groupModalEditing) state.navMode = n;
        } else if (!state.groupModalEditing) {
          g[n] = [];
        }
        saveGroups(g);
        closeModal();
        computeNavWindows();
      }

      function doDelete() {
        if (!state.groupModalEditing) return;
        const g = loadGroups();
        delete g[state.groupModalEditing];
        saveGroups(g);
        if (state.navMode === state.groupModalEditing) state.navMode = 'all';
        closeModal();
        computeNavWindows();
      }

      function cancel() {
        closeModal();
      }

      function closeModal() {
        state.groupModalOpen = false;
        state.groupModalEditing = null;
        state.groupModalCallback = null;

  // =============================================
  // COMPONENT: hort-viewer

  const HortViewer = {
    template: `
      <div class="llming-view viewer-llming" :class="{ visible: state.view === 'viewer', 'active-mode': state.activeMode }"
           ref="viewerEl">
        <!-- Toolbar is rendered by the unified toolbar in HortApp -->

        <!-- Hidden input for mobile keyboard — triggers on-screen keyboard -->
        <input ref="mobileKeyInput" class="mobile-key-input"
               @input="onMobileKeyInput" @keydown="onMobileKeyDown"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">

        <!-- Nav arrows -->
        <button class="nav-arrow prev" @click="navPrevWindow"><i class="ph-bold ph-caret-left"></i></button>
        <button class="nav-arrow next" @click="navNextWindow"><i class="ph-bold ph-caret-right"></i></button>

        <!-- Stream container -->
        <div class="stream-container" ref="streamContainer"
             @mousedown="onMouseDown" @dblclick="onDblClick"
             @click="onStreamClick" @contextmenu="onContextMenu"
             @wheel.prevent="onWheel">
          <img v-show="!state.mseActive && state.streamBlobUrl" class="stream-img" ref="streamImg" alt=""
               :src="state.streamBlobUrl"
               @load="onImgLoad">
          <video v-show="state.mseActive" id="mse-video" class="stream-img"
                 autoplay playsinline muted @loadeddata="onImgLoad"></video>
          <div class="remote-cursor" ref="remoteCursor">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 4L10.5 20L13 13L20 10.5L4 4Z" fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="click-ripple" ref="clickRipple"></div>
        </div>

        <div class="screen-nav" v-show="state.vpZoomed" ref="minimapEl"
             @mousedown.stop="onNavDragStart">
          <div class="screen-nav-header">
            <span>Navigator</span>
            <button class="screen-nav-close" @click="applyAutoFit">
              <i class="ph-bold ph-corners-out" style="font-size:12px"></i>
            </button>
          </div>
          <div class="screen-nav-map" ref="minimapWrap" @mousedown.stop="onMinimapClick">
            <div class="screen-nav-source" :style="{ paddingBottom: ((state.srcNatH || 1440) / (state.srcNatW || 5120) * 100) + '%' }">
              <img v-if="state.navThumb" class="screen-nav-thumb" :src="state.navThumb" alt="">
            </div>
            <div class="screen-nav-viewport" :style="minimapViewportStyle"></div>
          </div>
        </div>

        <!-- Settings panel -->
        <hort-settings></hort-settings>

        <hort-overview @switch-window="doSwitchWindow"></hort-overview>
      </div>

    setup() {
      const viewerEl = ref(null);
      const streamContainer = ref(null);
      const mobileKeyInput = ref(null);
      const streamImg = ref(null);
      const remoteCursor = ref(null);
      const clickRipple = ref(null);
      const minimapEl = ref(null);
      const minimapWrap = ref(null);
      const minimapImg = ref(null);

      // Touch/gesture state
      let lastDist = 0, lastMid = null;
      let isPanning = false, panStartX = 0, panStartY = 0;
      let lastTapTime = 0;
      let swipeStartX = 0, swipeStartY = 0, swipeStartTime = 0;
      let mousePanning = false, mousePanStartX = 0, mousePanStartY = 0;
      let _zoomCooldown = false;
      let touchMoved = false;
      let isStreamWsConnected = false;

      const groups = computed(() => loadGroups());

      const curWindow = computed(() => currentWindow());

      const viewerTitle = computed(() => {
        const w = currentWindow();
        return w ? `${w.owner_name} — ${w.window_name || '(untitled)'}` : '';
      });

      const navCounterText = computed(() => {
        if (state.navWindows.length === 0) return '';

      const observerText = computed(() => {
        return state.observerCount + (state.observerCount === 1 ? ' viewer' : ' viewers');
      });

      // Navigator computations (use reactive state.vp* for Vue reactivity)
      const minimapViewportStyle = computed(() => {
        const srcW = state.srcNatW || 5120;
        const srcH = state.srcNatH || 1440;
        const srcAr = srcW / srcH;
        const mmW = 200;
        const mmH = mmW / srcAr;
        return {
          left: (state.vpX * mmW) + 'px',
          top: (state.vpY * mmH) + 'px',
          width: (state.vpW * mmW) + 'px',
          height: (state.vpH * mmH) + 'px',
        };
      });

      function getContainerSize() {
        if (!streamContainer.value) return { w: 0, h: 0 };
        const r = streamContainer.value.getBoundingClientRect();
        return { w: r.width, h: r.height };
      }

      function applyTransform() {
        // Sync _vp to reactive state (drives minimap/navigator UI)
        state.vpZoomed = _vp.zoom > 1;
        state.vpX = _vp.x; state.vpY = _vp.y;
        state.vpW = _vp.w; state.vpH = _vp.h;
        _sendViewportUpdate();
      }

      function applyAutoFit() {
        _resetViewport();
        state.fitMode = 'auto';
        applyTransform();
      }

      function applyFitVertical() {
        _resetViewport();
        state.fitMode = 'auto';
        applyTransform();
      }

      function jumpTo(position) {
        // Jump to left/center/right of the image at current zoom
        if (_vp.zoom <= 1) return;
        if (position === 'left') _vp.x = 0;
        else if (position === 'right') _vp.x = 1 - _vp.w;
        else _vp.x = (1 - _vp.w) / 2;
        applyTransform();
      }

      function onImgLoad() {
        if (state.prevBlobUrl) {
          URL.revokeObjectURL(state.prevBlobUrl);
          state.prevBlobUrl = null;
        }
        // Track dimensions for input coordinate mapping
        const prevW = state.imgNatW, prevH = state.imgNatH;
        if (state.mseActive) {
          const vid = document.getElementById('mse-video');
          if (vid) { state.imgNatW = vid.videoWidth; state.imgNatH = vid.videoHeight; }
        } else if (streamImg.value) {
          state.imgNatW = streamImg.value.naturalWidth;
          state.imgNatH = streamImg.value.naturalHeight;
        }
        // Auto-fit viewport when we first learn the source dimensions
        if (prevW === 0 && state.imgNatW > 0 && _vp.zoom <= 1) {
          _resetViewport();
          applyTransform();
        }
      }

      function doSwitchWindow(index) {
        if (state.navWindows.length === 0) return;
        // Save state of previous window
        const cur = currentWindow();
        if (cur) saveWindowState(cur.window_id);

        state.navIndex = ((index % state.navWindows.length) + state.navWindows.length) % state.navWindows.length;
        const win = state.navWindows[state.navIndex];

        localStorage.setItem('llming-current-window', JSON.stringify({
          window_id: win.window_id, owner_name: win.owner_name,
          window_name: win.window_name,

        const qp = win.target_id ? '?target=' + encodeURIComponent(win.target_id) : '';

        if (_curRoute?.name) {
          HortRouter.replace('/llming/' + _curRoute.provider + '/' + _curRoute.name + '/screens/' + win.window_id + qp);
        }

        state.overviewOpen = false;
        state.fitMode = 'auto';
        state.imgNatW = 0;
        state.imgNatH = 0;
        _resetViewport();

        requestSpaces();

        // Always reconnect the stream WS to ensure a clean connection
        isStreamWsConnected = true;
        state._pendingStreamWindow = { windowId: win.window_id, targetId: win.target_id };
        connectStreamWs();

        startThumbRefresh();
      }

      // Open a window directly by ID — called by the router's onNavigate
      function openWindowDirect(windowId, targetId) {

        const synth = {
          window_id: windowId,
          owner_name: windowId === -1 ? 'Desktop' : 'Window',
          window_name: windowId === -1 ? 'Full Screen' : String(windowId),
          target_id: targetId || '',
          bounds: { x: 0, y: 0, width: 1920, height: 1080 },
        };
        if (!state.navWindows.find(w => w.window_id === windowId)) {
          state.navWindows.push(synth);
        }
        const idx = state.navWindows.findIndex(w => w.window_id === windowId);
        doSwitchWindow(idx);
      }
      if (window.__hort) window.__hort.openWindow = openWindowDirect;
      // Expose viewer cleanup for the router's onNavigate
      if (window.__hort) {

          if (cur) saveWindowState(cur.window_id);
          sendControl({ type: 'stream_stop' });
          disconnectStreamWs();
          isStreamWsConnected = false;
          state.overviewOpen = false;
          state.settingsOpen = false;
          state.activeMode = false;
          localStorage.removeItem('llming-current-window');
          stopThumbRefresh();

        window.__hort.viewerApplyAutoFit = applyAutoFit;
        window.__hort.viewerApplyFitVertical = applyFitVertical;
        window.__hort.viewerToggleMobileKeyboard = toggleMobileKeyboard;
      }

      function navPrevWindow() { doSwitchWindow(state.navIndex - 1); }
      function navNextWindow() { doSwitchWindow(state.navIndex + 1); }

      function goBack() {
        // Viewer cleanup is handled by onNavigate when the route changes.
        // Just go back — the history stack handles returning to the right view
        // (picker, spirit-fullscreen, etc.) automatically.
        HortRouter.back();

      function toggleActiveMode() {

      function toggleSettings(e) {

      function toggleMobileKeyboard() {

      function onMobileKeyDown(e) {

      }

      function spacePrev() {
        const target = state.spacesData.current > 1 ? state.spacesData.current - 1 : state.spacesData.count;
        switchSpace(target);
      }

      function spaceNext() {
        const target = state.spacesData.current < state.spacesData.count ? state.spacesData.current + 1 : 1;
        switchSpace(target);
      }

      function onNavModeChange(e) {
        state.navMode = e.target.value;
        const cur = currentWindow();
        computeNavWindows();
        if (cur) {
          const idx = state.navWindows.findIndex(w => w.window_id === cur.window_id);
          if (idx >= 0) state.navIndex = idx;
          else state.navIndex = 0;
        }
        // Scheduler handles thumbnail rotation — no bulk request needed
        subscribeThumbnails();
      }

      // ===== COORDS =====
      function _activeStreamEl() {
        // Return the currently visible stream element (img for WebP, video for VP8/VP9)
        return state.mseActive ? document.getElementById('mse-video') : streamImg.value;
      }

      function imgCoordsFromEvent(e) {
        // Map click on the image to screen-normalized coordinates (0-1).
        // The image shows the viewport region, so we need to account for
        // the current viewport offset and size.
        const el = _activeStreamEl();
        if (!el) return { nx: 0, ny: 0, screenX: 0, screenY: 0 };

        const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
        const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
        // Position within the displayed image (0-1)
        const imgNx = (clientX - rect.left) / rect.width;
        const imgNy = (clientY - rect.top) / rect.height;
        // Map to screen coordinates using the current viewport
        const vp = _computeViewport();
        return {
          nx: Math.max(0, Math.min(1, vp.vp_x + imgNx * vp.vp_w)),
          ny: Math.max(0, Math.min(1, vp.vp_y + imgNy * vp.vp_h)),
          screenX: clientX - rect.left,
          screenY: clientY - rect.top,
        };
      }

      function moveCursorTo(cx, cy) {
        if (remoteCursor.value) {
          remoteCursor.value.style.left = cx + 'px';
          remoteCursor.value.style.top = cy + 'px';
        }
      }

      function showClickRipple(cx, cy) {
        const el = clickRipple.value;
        if (!el) return;
        el.style.display = 'block';
        el.style.left = cx + 'px';
        el.style.top = cy + 'px';
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = '';
        setTimeout(() => { el.style.display = 'none'; }, 400);

      // ===== MOUSE =====
      function onMouseDown(e) {
        if (e.button !== 0 || state.activeMode) return;
        if (_vp.zoom <= 1) return;  // no panning when not zoomed
        mousePanning = true;
        mousePanStartX = e.clientX;
        mousePanStartY = e.clientY;
        if (streamContainer.value) streamContainer.value.style.cursor = 'grabbing';
        e.preventDefault();
      }

      function onWindowMouseMove(e) {
        if (state.activeMode && streamContainer.value && state.view === 'viewer') {
          const rect = streamContainer.value.getBoundingClientRect();
          moveCursorTo(e.clientX - rect.left, e.clientY - rect.top);
        }
        if (!mousePanning) return;
        const el = _activeStreamEl();
        const rect = el ? el.getBoundingClientRect() : { width: 1, height: 1 };
        const dx = (e.clientX - mousePanStartX) / rect.width;
        const dy = (e.clientY - mousePanStartY) / rect.height;
        mousePanStartX = e.clientX;
        mousePanStartY = e.clientY;
        _panViewport(dx, dy);
        applyTransform();
      }

      function onWindowMouseUp() {
        mousePanning = false;
        if (streamContainer.value) streamContainer.value.style.cursor = '';
      }

      function onDblClick(e) {
        e.preventDefault();
        if (state.activeMode && state.imgNatW) {
          const { nx, ny } = imgCoordsFromEvent(e);
          sendInput({ event_type: 'double_click', nx, ny });
          return;
        }
        if (_vp.zoom > 1) {
          // Zoomed in — reset to full view
          _resetViewport();
        } else {
          // Zoom in 2.5x centered on cursor
          const el = _activeStreamEl();
          const rect = el ? el.getBoundingClientRect() : { left: 0, top: 0, width: 1, height: 1 };
          const cx = (e.clientX - rect.left) / rect.width;
          const cy = (e.clientY - rect.top) / rect.height;
          _zoomViewport(15, cx, cy);  // 15 * 0.1 factor → ~2.5x zoom
        }
        applyTransform();
      }

      function onStreamClick(e) {
        if (!state.activeMode || !state.imgNatW) return;
        const { nx, ny, screenX, screenY } = imgCoordsFromEvent(e);
        showClickRipple(screenX, screenY);
        sendInput({ event_type: 'click', nx, ny });
      }

      function onContextMenu(e) {
        if (!state.activeMode || !state.imgNatW) return;
        e.preventDefault();
        const { nx, ny, screenX, screenY } = imgCoordsFromEvent(e);
        showClickRipple(screenX, screenY);
        sendInput({ event_type: 'right_click', nx, ny });
      }

      function onWheel(e) {
        e.preventDefault();
        if (state.activeMode) {
          // Active mode: forward scroll to remote machine
          const { nx, ny } = imgCoordsFromEvent(e);
          sendInput({ event_type: 'scroll', nx, ny, dx: Math.round(e.deltaX / 30), dy: Math.round(e.deltaY / 30) });
          return;
        }
        // Zoom: fixed step + cooldown to tame macOS smooth scrolling inertia
        if (_zoomCooldown) return;
        const delta = e.deltaY < 0 ? 1 : -1;
        if (delta < 0 && _vp.zoom <= 1) return;
        _zoomCooldown = true;
        setTimeout(() => { _zoomCooldown = false; }, 80);
        const el = state.mseActive ? document.getElementById('mse-video') : streamImg.value;
        const rect = el ? el.getBoundingClientRect() : null;
        const cx = (rect && rect.width > 0) ? (e.clientX - rect.left) / rect.width : 0.5;
        const cy = (rect && rect.height > 0) ? (e.clientY - rect.top) / rect.height : 0.5;
        _zoomViewport(delta, Math.max(0, Math.min(1, cx)), Math.max(0, Math.min(1, cy)));
        applyTransform();
      }

      // ===== TOUCH =====
      function dist(a, b) { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }

          isPanning = false;
          touchMoved = true;
        } else if (e.touches.length === 1) {
          touchMoved = false;
          swipeStartX = e.touches[0].clientX;
          swipeStartY = e.touches[0].clientY;
          swipeStartTime = Date.now();

          if (state.activeMode) return;

          const now = Date.now();
          if (now - lastTapTime < 300) {
            e.preventDefault();
            if (_vp.zoom > 1) {
              _resetViewport();
            } else {
              // Zoom in 2.5x centered on tap
              const el = _activeStreamEl();
              const rect = el ? el.getBoundingClientRect() : { left: 0, top: 0, width: 1, height: 1 };
              const cx = (e.touches[0].clientX - rect.left) / rect.width;
              const cy = (e.touches[0].clientY - rect.top) / rect.height;
              _zoomViewport(15, cx, cy);
            }
            applyTransform();
            lastTapTime = 0;
            return;
          }
          lastTapTime = now;
          if (_vp.zoom > 1) {
            isPanning = true;
            panStartX = e.touches[0].clientX;
            panStartY = e.touches[0].clientY;
          }
        }

      function onTouchMove(e) {
        touchMoved = true;
        if (state.activeMode) return;

          e.preventDefault();
          const d = dist(e.touches[0], e.touches[1]);
          const mid = midpoint(e.touches[0], e.touches[1]);
          // Pinch zoom: compute scale factor relative to last distance
          const scaleFactor = d / lastDist;
          const el = _activeStreamEl();
          const rect = el ? el.getBoundingClientRect() : { left: 0, top: 0, width: 1, height: 1 };
          const cx = (mid.x - rect.left) / rect.width;
          const cy = (mid.y - rect.top) / rect.height;
          // Convert scale factor to zoom delta (scaleFactor=1.1 → delta≈1)
          const delta = (scaleFactor - 1) * 10;
          _zoomViewport(delta, cx, cy);
          // Pan from midpoint movement
          if (lastMid) {
            const panDx = (mid.x - lastMid.x) / rect.width;
            const panDy = (mid.y - lastMid.y) / rect.height;
            _panViewport(panDx, panDy);
          }
          lastDist = d;
          lastMid = mid;
          applyTransform();
        } else if (e.touches.length === 1 && isPanning) {
          e.preventDefault();
          const el = _activeStreamEl();
          const rect = el ? el.getBoundingClientRect() : { width: 1, height: 1 };
          const dx = (e.touches[0].clientX - panStartX) / rect.width;
          const dy = (e.touches[0].clientY - panStartY) / rect.height;
          panStartX = e.touches[0].clientX;
          panStartY = e.touches[0].clientY;
          _panViewport(dx, dy);

          const endY = e.changedTouches[0].clientY;
          const dx = endX - swipeStartX;
          const dy = endY - swipeStartY;
          const dt = Date.now() - swipeStartTime;

          if (state.activeMode && !touchMoved && state.imgNatW) {

            if (!el) return;
            const rect = el.getBoundingClientRect();
            const imgNx = (endX - rect.left) / rect.width;
            const imgNy = (endY - rect.top) / rect.height;
            const vp = _computeViewport();
            const nx = Math.max(0, Math.min(1, vp.vp_x + imgNx * vp.vp_w));
            const ny = Math.max(0, Math.min(1, vp.vp_y + imgNy * vp.vp_h));

        _stopNavThumbRefresh();

      function _stopNavThumbRefresh() {

        const startX = e.clientX, startY = e.clientY;

        const onMove = (ev) => {
          el.style.right = 'auto';

          el.style.left = (origLeft + ev.clientX - startX) + 'px';

        const onUp = () => { el.style.transition = ''; window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        e.preventDefault();

      function onKeyDown(e) {
        if (state.groupModalOpen) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (state.view !== 'viewer') return;

        if (e.key === 'i' && !state.activeMode) {
          toggleActiveMode();
          e.preventDefault();
          return;
        }

        if (state.activeMode) {
          if (e.key === 'Escape') { toggleActiveMode(); e.preventDefault(); return; }
          const modifiers = [];
          if (e.shiftKey) modifiers.push('shift');
          if (e.ctrlKey) modifiers.push('ctrl');
          if (e.altKey) modifiers.push('alt');
          if (e.metaKey) modifiers.push('cmd');
          sendInput({ event_type: 'key', key: e.key, modifiers });
          e.preventDefault();
          return;
        }

        if (state.overviewOpen) {
          if (e.key === 'Escape' || e.key === 'g') { state.overviewOpen = false; HortRouter.back(); }

          case 'ArrowLeft': case 'a': navPrevWindow(); e.preventDefault(); break;
          case 'ArrowRight': case 'd': navNextWindow(); e.preventDefault(); break;
          case 'Escape': HortRouter.back(); e.preventDefault(); break;

          case '2': jumpTo('center'); e.preventDefault(); break;

          streamContainer.value.removeEventListener('touchmove', onTouchMove);
          streamContainer.value.removeEventListener('touchend', onTouchEnd);
        }

                    style="font-size:10px;padding:3px 8px;background:rgba(34,197,94,0.1);border-radius:6px;color:var(--el-success)">
                    <i class="ph ph-play-circle"></i> {{ j }}

              </div>
            </div>
          </div>
        </div>

        <!-- Llming launcher dialog -->
        <div v-if="launcherOpen" class="llming-launcher-overlay" @click.self="launcherOpen = false">
          <div class="llming-launcher">
            <div class="llming-launcher-header">
              <h3>Launch Llming</h3>
              <input v-model="launcherSearch" placeholder="Search llmings..." class="llming-launcher-search" autofocus>
              <button class="llming-launcher-close" @click="launcherOpen = false"><i class="ph ph-x"></i></button>
            </div>
            <div class="llming-launcher-grid">

                <i :class="p.icon" class="llming-option-icon"></i>
                <div class="llming-option-label">{{ p.label }}</div>
                <div v-if="p.desc" class="llming-option-desc">{{ p.desc }}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `,
    emits: ['select-window'],
    setup() {
      const demoEpoch = Vue.inject('demoEpoch', ref(0));
      const groupsList = computed(() => loadGroups());

      function isInAnyGroup(win) {

      }

      function onAppFilterChange(e) {
        state.appFilter = e.target.value;
        state.navMode = 'all';

      }

      function setNavMode(mode) {
        state.navMode = mode;
        state.activeGroupName = null;

      function toggleGroup(name) {

      function editGroup(name) {
