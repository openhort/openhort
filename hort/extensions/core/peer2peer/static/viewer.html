<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>openhort</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --fg: #e0e0e0;
    --accent: #7c4dff;
    --success: #66bb6a;
    --error: #ef5350;
    --muted: #666;
    --surface: #16213e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  h1 { font-size: 20px; margin-bottom: 8px; }
  .status {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: center;
  }
  .status .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot.connecting { background: #ffa726; animation: pulse 1s infinite; }
  .dot.connected { background: var(--success); }
  .dot.failed { background: var(--error); }
  .dot.idle { background: var(--muted); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .log {
    margin-top: 12px;
    width: 100%;
    max-width: 800px;
    max-height: 360px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border-radius: 6px;
    padding: 8px;
  }
  .log div { margin-bottom: 2px; }
  .log .err { color: var(--error); }
  .log .ok { color: var(--success); }
  /* SPA container — fills entire viewport once loaded */
  #spa-container { display: none; width: 100vw; height: 100vh; }
  #spa-container iframe { width: 100%; height: 100%; border: none; }
  #connect-ui { width: 100%; max-width: 400px; text-align: center; }
</style>
</head>
<body>

<div id="connect-ui">
  <h1>openhort</h1>
  <div class="status">
    <span class="dot idle" id="dot"></span>
    <span id="state">Connecting...</span>
  </div>
  <div class="log" id="log"></div>
</div>

<div id="spa-container"></div>

<script>
// ====== Config ======
const tg = window.Telegram && window.Telegram.WebApp;
const params = new URLSearchParams(location.search);
const signalMode = params.get('signal') || 'http';
const serverUrl = params.get('server') || '';
const relayUrl = params.get('relay') || 'wss://relay.openhort.ai';
const roomId = params.get('room') || '';
const authToken = params.get('token') || '';

if (tg) {
  tg.ready();
  tg.expand();
  if (tg.themeParams.bg_color) {
    document.documentElement.style.setProperty('--bg', tg.themeParams.bg_color);
    document.documentElement.style.setProperty('--fg', tg.themeParams.text_color || '#fff');
  }
}

// ====== Logging ======
const logEl = document.getElementById('log');
function log(msg, cls) {
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

// ====== State ======
let pc = null;
let dc = null;
let relayWs = null;

// Pending HTTP requests waiting for responses
const pendingRequests = new Map(); // id → {resolve, reject}
// Pending WebSocket connections
const pendingWsConnections = new Map(); // id → {resolve, onmessage, onclose}
// Active proxied WebSocket instances
const activeWs = new Map(); // id → FakeWebSocket

let requestCounter = 0;
let wsCounter = 0;
let lastRtt = 0;
let pingInterval = null;

function setState(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('state').textContent = text;
}

// ====== DataChannel message handler ======
function handleDcMessage(evt) {
  if (typeof evt.data !== 'string') {
    // Binary — WebSocket binary frame
    // First 4 bytes = ws ID
    const buf = new Uint8Array(evt.data);
    const idBytes = buf.slice(0, 4);
    const wsId = new TextDecoder().decode(idBytes).replace(/\0/g, '');
    const payload = buf.slice(4);
    const ws = activeWs.get(wsId);
    if (ws && ws._onmessage) {
      ws._onmessage({ data: payload.buffer });
    }
    return;
  }

  let msg;
  try { msg = JSON.parse(evt.data); } catch (e) { return; }

  if (msg.type === 'pong') {
    lastRtt = performance.now() - msg.ts;
    window._p2pRtt = lastRtt;
    window._p2pHealthy = lastRtt < 2000;
    window._p2pConnected = true;
    if (window._p2pUpdatePong) window._p2pUpdatePong();
    if (window.__hortState) {
      window.__hortState.p2pRttMs = Math.round(lastRtt);
      window.__hortState.p2pHealthy = lastRtt < 2000;
      window.__hortState.p2pConnected = true;
    }
    // Store reconnect token in sessionStorage (survives page reload within tab)
    if (msg.reconnect_token) {
      sessionStorage.setItem('p2p_reconnect_token', msg.reconnect_token);
      sessionStorage.setItem('p2p_reconnect_room', roomId);
      sessionStorage.setItem('p2p_reconnect_relay', relayUrl);
      sessionStorage.setItem('p2p_reconnect_time', String(Date.now()));
    }
    return;
  } else if (msg.type === 'http_response') {
    const pending = pendingRequests.get(msg.id);
    if (pending) {
      pendingRequests.delete(msg.id);
      pending.resolve(msg);
    }
  } else if (msg.type === 'ws_ready') {
    const pending = pendingWsConnections.get(msg.id);
    if (pending) {
      pendingWsConnections.delete(msg.id);
      pending.resolve();
    }
  } else if (msg.type === 'ws_text') {
    const ws = activeWs.get(msg.id);
    if (ws && ws._onmessage) {
      ws._onmessage({ data: msg.data });
    }
  } else if (msg.type === 'ws_close') {
    const ws = activeWs.get(msg.id);
    if (ws) {
      activeWs.delete(msg.id);
      ws._readyState = 3; // CLOSED
      if (ws._onclose) ws._onclose({ code: 1000, reason: msg.reason || '' });
    }
  }
}

// ====== Client-side Cache (Cache API) ======
// Static assets (/static/*, /ext/*) cached with content hash validation.
// On reconnect over LTE, ~2MB of JS/CSS loads from cache instead of DataChannel.
// Max 20MB total cache. Files >2MB are not cached. Content hash detects changes.
const CACHE_NAME = 'openhort-p2p-v1';
const CACHE_MAX_BYTES = 20 * 1024 * 1024;  // 20MB total
const CACHE_MAX_FILE = 2 * 1024 * 1024;    // 2MB per file
const CACHEABLE_PREFIXES = ['/static/', '/ext/'];

function isCacheable(path, method) {
  return method === 'GET' && CACHEABLE_PREFIXES.some(p => path.startsWith(p));
}

async function hashContent(data) {
  // SHA-256 hash of response body for change detection
  const buf = typeof data === 'string' ? new TextEncoder().encode(data) : new Uint8Array(data);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
}

async function getCached(path) {
  try {
    const cache = await caches.open(CACHE_NAME);
    const resp = await cache.match(path);
    return resp || null;
  } catch (e) { return null; }
}

// Critical files — never evicted, always cached first
const PRIORITY_FILES = ['vue.global', 'quasar.umd', 'quasar.prod.css'];

function isPriority(path) {
  return PRIORITY_FILES.some(f => path.includes(f));
}

async function putCache(path, response, bodyForHash) {
  try {
    const blob = await response.clone().blob();
    if (blob.size > CACHE_MAX_FILE) return;

    const hash = await hashContent(bodyForHash);
    const headers = new Headers(response.headers);
    headers.set('x-p2p-hash', hash);
    headers.set('x-p2p-time', String(Date.now()));  // LRU timestamp
    headers.set('x-p2p-priority', isPriority(path) ? '1' : '0');
    const cachedResp = new Response(blob, { status: response.status, headers });

    const cache = await caches.open(CACHE_NAME);

    // Evict if over size limit — remove oldest non-priority first
    await evictIfNeeded(cache, blob.size);

    await cache.put(path, cachedResp);
  } catch (e) { /* Cache API not available */ }
}

async function evictIfNeeded(cache, newSize) {
  try {
    const keys = await cache.keys();
    let totalSize = newSize;
    const entries = [];

    for (const req of keys) {
      const resp = await cache.match(req);
      if (!resp) continue;
      const blob = await resp.blob();
      totalSize += blob.size;
      entries.push({
        url: req.url,
        size: blob.size,
        time: parseInt(resp.headers.get('x-p2p-time') || '0', 10),
        priority: resp.headers.get('x-p2p-priority') === '1',
      });
    }

    if (totalSize <= CACHE_MAX_BYTES) return;

    // Sort: non-priority first, then oldest first
    entries.sort((a, b) => {
      if (a.priority !== b.priority) return a.priority ? 1 : -1;
      return a.time - b.time;
    });

    // Evict until under limit
    for (const entry of entries) {
      if (totalSize <= CACHE_MAX_BYTES) break;
      await cache.delete(entry.url);
      totalSize -= entry.size;
    }
  } catch (e) { /* best effort */ }
}

async function validateCache(path, freshBody) {
  // Check if cached version matches fresh content
  try {
    const cache = await caches.open(CACHE_NAME);
    const cached = await cache.match(path);
    if (!cached) return false;
    const cachedHash = cached.headers.get('x-p2p-hash');
    if (!cachedHash) return false;
    const freshHash = await hashContent(freshBody);
    return cachedHash === freshHash;
  } catch (e) { return false; }
}

// ====== Proxied fetch() ======
function proxyFetch(input, init) {
  const url = typeof input === 'string' ? input : input.url;
  const parsed = new URL(url, 'http://localhost');
  const method = (init && init.method) || 'GET';
  const path = parsed.pathname + parsed.search;

  // Check client-side cache first for static assets
  if (isCacheable(path, method)) {
    return getCached(path).then(cached => {
      if (cached) return cached;
      return _proxyFetchDC(path, method, init).then(async resp => {
        // Cache the fresh response (clone since Response can only be read once)
        const body = await resp.clone().arrayBuffer();
        putCache(path, resp, body);
        return resp;
      });
    });
  }

  return _proxyFetchDC(path, method, init);
}

// Invalidate cache when server version changes
async function checkCacheVersion() {
  try {
    const resp = await _proxyFetchDC('/api/hash', 'GET');
    const data = await resp.json();
    const serverHash = data.hash || '';
    const storedHash = localStorage.getItem('p2p-server-hash') || '';
    if (storedHash && storedHash !== serverHash) {
      // Server changed — clear cache
      await caches.delete(CACHE_NAME);
      log('Cache cleared (server updated)');
    }
    localStorage.setItem('p2p-server-hash', serverHash);
  } catch (e) { /* ignore — hash endpoint not critical */ }
}

function _proxyFetchDC(path, method, init) {
  const headers = {};
  if (init && init.headers) {
    const h = init.headers instanceof Headers ? init.headers : new Headers(init.headers);
    h.forEach((v, k) => { headers[k] = v; });
  }

  const reqId = 'r' + (++requestCounter);

  return new Promise(async (resolve, reject) => {
    let body = null;
    if (init && init.body) {
      body = typeof init.body === 'string' ? init.body : await new Response(init.body).text();
    }

    pendingRequests.set(reqId, {
      resolve: (resp) => {
        let bodyContent = resp.body || '';
        if (resp.binary) {
          const raw = atob(bodyContent);
          const arr = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
          bodyContent = arr.buffer;
        }
        const response = new Response(bodyContent, {
          status: resp.status,
          headers: resp.headers,
        });

        // Cache static assets
        if (isCacheable(path, method) && resp.status === 200) {
          putCache(path, response);
        }

        resolve(response);
      },
      reject,
    });

    dc.send(JSON.stringify({
      id: reqId,
      type: 'http',
      method,
      path,
      headers,
      body,
    }));
  });
}

// ====== Proxied WebSocket ======
class ProxiedWebSocket {
  constructor(url) {
    const parsed = new URL(url, 'http://localhost');
    this._id = 'w' + (++wsCounter);
    this._readyState = 0; // CONNECTING
    this._onopen = null;
    this._onmessage = null;
    this._onclose = null;
    this._onerror = null;
    this._path = parsed.pathname + parsed.search;

    activeWs.set(this._id, this);

    // Request WS open via DataChannel
    const openPromise = new Promise((resolve) => {
      pendingWsConnections.set(this._id, { resolve });
    });

    dc.send(JSON.stringify({
      id: this._id,
      type: 'ws_open',
      path: this._path,
    }));

    openPromise.then(() => {
      this._readyState = 1; // OPEN
      if (this._onopen) this._onopen({});
    });
  }

  get readyState() { return this._readyState; }
  get CONNECTING() { return 0; }
  get OPEN() { return 1; }
  get CLOSING() { return 2; }
  get CLOSED() { return 3; }

  set onopen(fn) { this._onopen = fn; if (this._readyState === 1 && fn) fn({}); }
  set onmessage(fn) { this._onmessage = fn; }
  set onclose(fn) { this._onclose = fn; }
  set onerror(fn) { this._onerror = fn; }

  get onopen() { return this._onopen; }
  get onmessage() { return this._onmessage; }
  get onclose() { return this._onclose; }
  get onerror() { return this._onerror; }

  send(data) {
    if (this._readyState !== 1) return;
    if (typeof data === 'string') {
      dc.send(JSON.stringify({ id: this._id, type: 'ws_text', data }));
    } else {
      // Binary: prepend 4-byte ws ID
      const idBytes = new TextEncoder().encode(this._id.padEnd(4, '\0')).slice(0, 4);
      const payload = new Uint8Array(data instanceof ArrayBuffer ? data : data.buffer);
      const frame = new Uint8Array(4 + payload.length);
      frame.set(idBytes, 0);
      frame.set(payload, 4);
      dc.send(frame.buffer);
    }
  }

  close(code, reason) {
    if (this._readyState >= 2) return;
    this._readyState = 2; // CLOSING
    dc.send(JSON.stringify({ id: this._id, type: 'ws_close' }));
    activeWs.delete(this._id);
    this._readyState = 3;
    if (this._onclose) this._onclose({ code: code || 1000, reason: reason || '' });
  }

  addEventListener(type, fn) {
    if (type === 'open') this._onopen = fn;
    else if (type === 'message') this._onmessage = fn;
    else if (type === 'close') this._onclose = fn;
    else if (type === 'error') this._onerror = fn;
  }

  removeEventListener() {}
}

// ====== Signaling ======
function signalingHttp(offer) {
  return fetch(serverUrl + '/api/p2p/offer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sdp: offer, session_id: 'p2p' }),
  }).then(r => r.json()).then(d => {
    if (d.error) throw new Error(d.error);
    return d.sdp;
  });
}

function signalingWs(offer) {
  return new Promise((resolve, reject) => {
    const room = roomId || 'r-' + Math.random().toString(36).substring(2, 10);
    const wsUrl = relayUrl + '/' + room;
    log('Relay: ' + wsUrl);
    const ws = new WebSocket(wsUrl);
    relayWs = ws;
    let answered = false;
    ws.onopen = () => {
      log('Relay connected');
      const reconnectToken = sessionStorage.getItem('p2p_reconnect_token') || '';
      ws.send(JSON.stringify({
        type: 'offer', sdp: offer,
        token: authToken,
        reconnect_token: reconnectToken,
      }));
      const authMethod = reconnectToken ? 'reconnect' : (authToken ? 'token' : 'none');
      log('SDP offer sent (' + authMethod + ')');
    };
    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'answer' && msg.sdp && !answered) {
          answered = true;
          log('SDP answer received via relay');
          ws.close();
          relayWs = null;
          resolve(msg.sdp);
        } else if (msg.type === 'error') {
          answered = true;
          ws.close();
          relayWs = null;
          reject(new Error(msg.message || 'Connection rejected'));
        }
      } catch (e) {}
    };
    ws.onerror = () => reject(new Error('Relay connection failed'));
    ws.onclose = () => { if (!answered) reject(new Error('Relay closed before answer')); };
    setTimeout(() => { if (!answered) { ws.close(); reject(new Error('Relay timeout')); } }, 30000);
  });
}

// ====== WebRTC + SPA loading ======
async function startConnection() {
  setState('connecting', 'Connecting...');
  log('Starting P2P connection (signal=' + signalMode + ')');

  try {
    pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    pc.oniceconnectionstatechange = () => {
      log('ICE: ' + pc.iceConnectionState);
      if (pc.iceConnectionState === 'failed') {
        setState('failed', 'Connection failed');
      }
    };

    dc = pc.createDataChannel('hort', { ordered: true });
    dc.binaryType = 'arraybuffer';

    dc.onopen = () => {
      // Cancel any pending reconnect timer and hide overlay
      if (_reconnectTimer) { clearInterval(_reconnectTimer); _reconnectTimer = null; }
      _hideReconnectOverlay();
      log('DataChannel open', 'ok');
      setState('connected', 'Connected — loading UI...');
      // Ping/pong heartbeat (30s) + dead connection detection
      // Send first ping immediately to get reconnect token
      let _lastPongTime = performance.now();
      if (dc && dc.readyState === 'open') {
        dc.send(JSON.stringify({ type: 'ping', ts: performance.now() }));
      }
      pingInterval = setInterval(() => {
        if (dc && dc.readyState === 'open') {
          dc.send(JSON.stringify({ type: 'ping', ts: performance.now() }));
          const sinceLastPong = performance.now() - _lastPongTime;
          if (sinceLastPong > 60000 && window.__hortState) {
            window.__hortState.p2pHealthy = false;
            window.__hortState.p2pRttMs = Math.round(sinceLastPong);
          }
        }
      }, 30000);
      // Update _lastPongTime when pong arrives
      window._p2pUpdatePong = () => { _lastPongTime = performance.now(); };
      // Check if server changed (busts stale cache)
      checkCacheVersion().then(() => loadSPA());
    };

    dc.onmessage = handleDcMessage;

    dc.onclose = () => {
      log('DataChannel closed');
      // Try to reconnect if we have a valid reconnect token
      const rToken = sessionStorage.getItem('p2p_reconnect_token');
      const rTime = parseInt(sessionStorage.getItem('p2p_reconnect_time') || '0', 10);
      const tokenAge = Date.now() - rTime;
      const TOKEN_TTL = 240000; // 4 minutes

      if (rToken && tokenAge < TOKEN_TTL) {
        log('Reconnecting (token valid for ' + Math.round((TOKEN_TTL - tokenAge) / 1000) + 's)...');
        setState('connecting', 'Reconnecting...');
        _showReconnectOverlay(TOKEN_TTL - tokenAge);
        _autoReconnect(TOKEN_TTL - tokenAge);
      } else {
        setState('failed', 'Disconnected — send /p2p for new link');
        _showReconnectOverlay(0); // show expired
        sessionStorage.removeItem('p2p_reconnect_token');
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIceGathering(pc, 3000);

    log('SDP offer ready (' + pc.localDescription.sdp.length + ' bytes)');

    let answerSdp;
    if (signalMode === 'ws' || signalMode === 'telegram') {
      answerSdp = await signalingWs(pc.localDescription.sdp);
    } else {
      answerSdp = await signalingHttp(pc.localDescription.sdp);
    }

    log('SDP answer received (' + answerSdp.length + ' bytes)');
    setState('connecting', 'ICE negotiation...');

    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answerSdp }));
    log('ICE negotiation started');

  } catch (err) {
    log('Error: ' + err.message, 'err');
    if (err.message.includes('invalid') || err.message.includes('expired') || err.message.includes('rejected')) {
      // Check if we have a reconnect token to retry
      const rToken = sessionStorage.getItem('p2p_reconnect_token');
      const rTime = parseInt(sessionStorage.getItem('p2p_reconnect_time') || '0', 10);
      const tokenAge = Date.now() - rTime;
      if (rToken && tokenAge < 240000) {
        log('Retrying with reconnect token...');
        setState('connecting', 'Reconnecting...');
        _autoReconnect(240000 - tokenAge);
      } else {
        setState('failed', 'Link expired. Send /p2p again.');
        sessionStorage.removeItem('p2p_reconnect_token');
      }
    } else {
      setState('failed', err.message);
    }
  }
}

let _reconnectTimer = null;
let _overlayTimer = null;

function _showReconnectOverlay(remainingMs) {
  _hideReconnectOverlay();
  const overlay = document.createElement('div');
  overlay.id = 'p2p-reconnect-overlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;' +
    'background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;' +
    'justify-content:center;font-family:-apple-system,sans-serif;color:#e0e0e0;';

  const icon = document.createElement('div');
  icon.style.cssText = 'font-size:48px;margin-bottom:16px;animation:spin 2s linear infinite;';
  icon.textContent = '⟳';
  overlay.appendChild(icon);

  const msg = document.createElement('div');
  msg.id = 'p2p-reconnect-msg';
  msg.style.cssText = 'font-size:18px;margin-bottom:8px;';
  msg.textContent = remainingMs > 0 ? 'Reconnecting...' : 'Connection lost';
  overlay.appendChild(msg);

  const sub = document.createElement('div');
  sub.id = 'p2p-reconnect-sub';
  sub.style.cssText = 'font-size:13px;color:#999;';
  sub.textContent = remainingMs > 0 ? Math.round(remainingMs / 1000) + 's remaining' : 'Send /p2p for a new link';
  overlay.appendChild(sub);

  const style = document.createElement('style');
  style.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
  overlay.appendChild(style);

  document.body.appendChild(overlay);

  // Update countdown
  if (remainingMs > 0) {
    const start = Date.now();
    _overlayTimer = setInterval(() => {
      const left = Math.max(0, Math.round((remainingMs - (Date.now() - start)) / 1000));
      const subEl = document.getElementById('p2p-reconnect-sub');
      if (subEl) subEl.textContent = left + 's remaining';
      if (left <= 0) {
        clearInterval(_overlayTimer);
        const msgEl = document.getElementById('p2p-reconnect-msg');
        if (msgEl) msgEl.textContent = 'Session expired';
        if (subEl) subEl.textContent = 'Send /p2p for a new link';
      }
    }, 1000);
  }
}

function _hideReconnectOverlay() {
  if (_overlayTimer) { clearInterval(_overlayTimer); _overlayTimer = null; }
  const el = document.getElementById('p2p-reconnect-overlay');
  if (el) el.remove();
}

function _autoReconnect(remainingMs) {
  if (_reconnectTimer) clearInterval(_reconnectTimer);

  let elapsed = 0;
  const interval = 5000; // retry every 5s

  _reconnectTimer = setInterval(() => {
    elapsed += interval;
    if (elapsed > remainingMs) {
      clearInterval(_reconnectTimer);
      _reconnectTimer = null;
      setState('failed', 'Session expired. Send /p2p again.');
      sessionStorage.removeItem('p2p_reconnect_token');
      return;
    }

    const remaining = Math.round((remainingMs - elapsed) / 1000);
    log('Reconnect attempt (' + remaining + 's remaining)...');
    setState('connecting', 'Reconnecting (' + remaining + 's)...');

    // Try to reconnect — startConnection will use the reconnect token from sessionStorage
    startConnection();
  }, interval);
}

function waitForIceGathering(pc, timeout) {
  return new Promise((resolve) => {
    if (pc.iceGatheringState === 'complete') return resolve();
    const timer = setTimeout(resolve, timeout);
    pc.onicegatheringstatechange = () => {
      if (pc.iceGatheringState === 'complete') { clearTimeout(timer); resolve(); }
    };
  });
}

function disconnect() {
  if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
  if (relayWs) { relayWs.close(); relayWs = null; }
  for (const [id, ws] of activeWs) { ws.close(); }
  activeWs.clear();
  pendingRequests.clear();
  pendingWsConnections.clear();
  if (dc) dc.close();
  if (pc) pc.close();
  pc = null; dc = null;
  showConnectUI();
  setState('idle', 'Disconnected');
  log('Disconnected');
}

// ====== CSS url() inlining ======
// Font and image references inside CSS use url() which the browser resolves
// relative to the stylesheet origin (openhort.ai) — not through fetch().
// We rewrite them to base64 data URIs fetched through the DataChannel.

async function inlineCssUrls(css, basePath) {
  const urlRe = /url\(["']?([^"')]+)["']?\)/g;
  const matches = [...css.matchAll(urlRe)];
  const seen = new Map();

  for (const m of matches) {
    const ref = m[1];
    if (ref.startsWith('data:') || ref.startsWith('http://') || ref.startsWith('https://') || seen.has(ref)) continue;

    // Resolve relative path
    let fullPath;
    if (ref.startsWith('/')) {
      fullPath = ref;
    } else {
      fullPath = basePath + ref;
    }
    // Normalize ../ segments
    fullPath = new URL(fullPath, 'http://localhost').pathname;

    try {
      const r = await proxyFetch(fullPath);
      const buf = await r.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      const b64 = btoa(binary);

      // Guess MIME type from extension
      const ext = fullPath.split('.').pop().toLowerCase();
      const mimeMap = {woff2:'font/woff2', woff:'font/woff', ttf:'font/ttf', eot:'application/vnd.ms-fontobject', svg:'image/svg+xml', png:'image/png', jpg:'image/jpeg', gif:'image/gif'};
      const mime = mimeMap[ext] || 'application/octet-stream';

      seen.set(ref, 'data:' + mime + ';base64,' + b64);
    } catch (e) {
      seen.set(ref, ref); // keep original on failure
    }
  }

  // Replace all url() references with data URIs
  for (const [ref, dataUri] of seen) {
    css = css.replaceAll('url("' + ref + '")', 'url("' + dataUri + '")');
    css = css.replaceAll("url('" + ref + "')", "url('" + dataUri + "')");
    css = css.replaceAll('url(' + ref + ')', 'url(' + dataUri + ')');
  }

  return css;
}

// ====== Transparent Proxy ======
// Once DataChannel is open, override fetch/WebSocket globally on THIS page,
// then fetch the full app HTML through the proxy and replace the entire page.
// All subsequent resource loads (JS, CSS, images) go through proxyFetch.
// The viewer becomes invisible — everything you see comes from the home machine.

async function loadSPA() {
  log('Establishing proxy...');

  try {
    // Override fetch globally — ALL requests go through DataChannel
    const _origFetch = window.fetch;
    window.fetch = function(input, init) {
      return proxyFetch(input, init);
    };

    // Override WebSocket globally — ALL WebSockets go through DataChannel
    window.WebSocket = function(url, protocols) {
      return new ProxiedWebSocket(url);
    };
    window.WebSocket.CONNECTING = 0;
    window.WebSocket.OPEN = 1;
    window.WebSocket.CLOSING = 2;
    window.WebSocket.CLOSED = 3;

    // Intercept dynamic <script src> and <link href> assignments.
    // The SPA's plugin loader creates script elements with src pointing to
    // local paths. The browser would try to load from openhort.ai (404).
    // We intercept the src setter so the load never starts.

    const _origScriptSrcDesc = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
    Object.defineProperty(HTMLScriptElement.prototype, 'src', {
      set(val) {
        try {
          const url = new URL(val, location.href);
          if (url.pathname.startsWith('/ext/') || url.pathname.startsWith('/static/')) {
            const path = url.pathname;
            const el = this;
            // Prevent native load
            proxyFetch(path).then(r => r.text()).then(code => {
              el.textContent = code;
              // Trigger onload if set
              if (el.onload) el.onload();
            }).catch(() => {
              if (el.onerror) el.onerror();
            });
            return;
          }
        } catch (e) {}
        // Non-local script — use original setter
        _origScriptSrcDesc.set.call(this, val);
      },
      get() {
        return _origScriptSrcDesc.get.call(this);
      },
      configurable: true,
    });

    // Fetch the main page from the home machine
    log('Loading app...');
    const resp = await proxyFetch('/viewer');
    const html = await resp.text();

    // Parse the HTML to extract CSS links, scripts, and body
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Load all CSS files through the proxy, inlining font/image url() references
    const cssLinks = doc.querySelectorAll('link[rel="stylesheet"], link[href$=".css"]');
    for (const link of cssLinks) {
      const href = link.getAttribute('href');
      if (href) {
        try {
          const path = href.startsWith('/') ? href : '/' + href;
          const basePath = path.substring(0, path.lastIndexOf('/') + 1);
          const r = await proxyFetch(path);
          let css = await r.text();
          css = await inlineCssUrls(css, basePath);
          const style = document.createElement('style');
          style.textContent = css;
          document.head.appendChild(style);
        } catch (e) { /* skip failed CSS */ }
      }
    }

    // Replace document body with the fetched content
    document.body.innerHTML = doc.body.innerHTML;
    document.title = doc.title || 'openhort';

    // Copy head meta/title tags
    for (const meta of doc.querySelectorAll('head meta')) {
      document.head.appendChild(meta.cloneNode(true));
    }

    // Load and execute all scripts in order through the proxy
    const scripts = doc.querySelectorAll('script');
    for (const script of scripts) {
      const src = script.getAttribute('src');
      if (src) {
        // External script — fetch through proxy and execute
        try {
          const path = src.startsWith('/') ? src : '/' + src;
          const r = await proxyFetch(path);
          const code = await r.text();
          const s = document.createElement('script');
          s.textContent = code;
          document.body.appendChild(s);
        } catch (e) { /* skip failed scripts */ }
      } else if (script.textContent.trim()) {
        // Inline script — execute directly
        const s = document.createElement('script');
        s.textContent = script.textContent;
        document.body.appendChild(s);
      }
    }

  } catch (err) {
    document.body.innerHTML = '<h1 style="color:#ef5350;padding:20px;">Failed to load: ' + err.message + '</h1>';
  }
}

// ====== Init ======
log('openhort P2P viewer loaded');
log('Signal mode: ' + signalMode + (signalMode === 'ws' ? ' (relay: ' + relayUrl + ')' : ''));
if (tg) log('Running inside Telegram (' + tg.platform + ')');

// Always auto-connect
startConnection();
</script>
